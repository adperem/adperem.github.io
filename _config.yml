# ── Site ──────────────────────────────────────────
title: Adperem
tagline: Cybersecurity Research & Tools
description: >-
  Cybersecurity research, writeups, and open-source tools by Adperem.
url: "https://adperem.github.io"
baseurl: ""

# ── Author ───────────────────────────────────────
author:
  name: Adperem
  email: adperem@proton.me

social:
  github:    https://github.com/adperem
  linkedin:  https://www.linkedin.com/in/adrian-perez-moreno
  hackthebox: https://app.hackthebox.com/users/738315
  tryhackme: https://tryhackme.com/p/adperem
  email:     adperem@proton.me

# ── Build ────────────────────────────────────────
timezone: Europe/Madrid
lang: en

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: false

sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# ── Permalinks ───────────────────────────────────
permalink: /posts/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true

# ── SEO / Analytics ─────────────────────────────
google_site_verification: 8s5oLHEhOziP4VnLDtXIlQA-SvO_20iBkt31-ilT1yU
google_analytics: G-XHSHZJQBW2

avatar: /assets/img/avatar.jpg

# ── Exclude ──────────────────────────────────────
exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - Gemfile.lock
  - node_modules
  - vendor
  - sanvalentin
  - skills-lock.json
  - .claude
  - .agents
  - SEO-PLAN.md
  - CLAUDE.md
