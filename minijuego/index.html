<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />
  <title>Minijuegos de salud para niños — explora el cuerpo humano en 3D</title>
  <meta name="description" content="Aprende sobre el cuerpo humano jugando: minijuegos interactivos en 3D sobre ojos, cerebro, estómago, pulmones y corazón. Educación en salud para niños, en español." />
  <link rel="canonical" href="https://adperem.github.io/minijuego/" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="es_ES" />
  <meta property="og:site_name" content="Adperem" />
  <meta property="og:title" content="Minijuegos de salud para niños — explora el cuerpo humano en 3D" />
  <meta property="og:description" content="Minijuegos interactivos en 3D sobre el cuerpo humano: ojos, cerebro, estómago, pulmones y corazón. Educación en salud para niños." />
  <meta property="og:url" content="https://adperem.github.io/minijuego/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Minijuegos de salud para niños — cuerpo humano en 3D" />
  <meta name="twitter:description" content="Minijuegos interactivos en 3D sobre el cuerpo humano para niños, en español." />
  <style>
    :root{
      --shadow: 0 18px 45px rgba(0,0,0,0.18);
      --shadow-soft: 0 10px 25px rgba(0,0,0,0.14);
      --ring: rgba(6,182,212,0.35);
    }
    *{ box-sizing: border-box; }
    html, body{
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b1220;
    }

    /* FONDO DIFUMINADO (MISMA IMAGEN) */
    body::before{
      content:"";
      position: fixed;
      inset: -40px;
      background-image: url("assets/home_mapa.png");
      background-size: cover;
      background-position: center;
      filter: blur(18px) saturate(1.15);
      transform: scale(1.10);
      z-index: -2;
    }
    body::after{
      content:"";
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.10);
      z-index: -1;
    }

    .stage{
      width: 100vw;
      height: 100vh;
      padding: 18px;
      display: grid;
      place-items: center;
    }

    /* CONTENEDOR CON LA MISMA PROPORCIÓN QUE LA IMAGEN (2048x1365) */
    .mapWrap{
      width: min(1280px, calc(100vw - 36px));
      height: min(720px, calc(100vh - 36px));
      display: grid;
      place-items: center;
    }

    .map{
      width: 100%;
      height: 100%;
      aspect-ratio: 2048 / 1365;
      max-width: 100%;
      max-height: 100%;
      border-radius: 34px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 2px solid rgba(255,255,255,0.70);
      background: url("assets/home_mapa.png") center / cover no-repeat;
      position: relative;
      touch-action: none;
    }

    /* HOTSPOTS: CÍRCULOS INVISIBLES (AJUSTADOS A LOS CHECKPOINTS) */
    .hs{
      position: absolute;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      touch-action: manipulation;
      width: var(--hsSize);
      height: var(--hsSize);
      transform: translate(-50%, -50%);
    }
    .hs:active{ transform: translate(-50%, -50%) translateY(1px); }
    .hs:focus-visible{ outline: 0; box-shadow: 0 0 0 10px rgba(6,182,212,0.18); }

    /* DEBUG: ?DEBUG=1 PARA VER LOS HOTSPOTS */
    body.debug .hs{
      background: rgba(6,182,212,0.10);
      outline: 4px dashed rgba(6,182,212,0.55);
    }

    /* TAMAÑO DEL ÁREA TÁCTIL (CÍRCULO) */
    .map{ --hsSize: 240px; }
    @media (max-width: 1400px){ .map{ --hsSize: 200px; } }
    @media (max-width: 1100px){ .map{ --hsSize: 180px; } }

    /* CENTROS (EN %) SOBRE LA IMAGEN 2048x1365 */
    .hs-vista    { left: 15.14%; top: 19.05%; }
    .hs-cerebro  { left: 71.78%; top: 18.32%; }
    .hs-pulmones { left: 81.54%; top: 45.42%; }
    .hs-oido     { left: 40.04%; top: 43.96%; }
    .hs-estomago { left: 25.39%; top: 77.66%; }
    .hs-corazon  { left: 68.36%; top: 79.12%; }
/* PEQUEÑO BOTÓN DE AYUDA (ICONO) */
    .miniBar{
      position: absolute;
      left: 16px;
      top: 16px;
      display: flex;
      gap: 10px;
      z-index: 5;
    }
    .miniBtn{
      width: 66px;
      height: 66px;
      border-radius: 22px;
      border: 2px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.85);
      box-shadow: var(--shadow-soft);
      display: grid;
      place-items: center;
      font-size: 30px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .miniBtn:active{ transform: translateY(1px); }

    /* TEXTO MUY PEQUEÑO (OPCIONAL) */
    .hint{
      position: absolute;
      right: 16px;
      top: 16px;
      padding: 12px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      border: 2px solid rgba(255,255,255,0.65);
      box-shadow: var(--shadow-soft);
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: rgba(20,40,60,0.85);
      font-size: 18px;
    }
    @media (max-width: 1200px){
      .hint{ font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="mapWrap">
      <div class="map" id="map" aria-label="Mapa de órganos">
        <div class="miniBar">
          <button class="miniBtn" id="btnDebug" type="button" aria-label="Mostrar zonas">🧩</button>
        </div>

        <div class="hint">TOCA UN ÓRGANO</div>

        <button class="hs hs-vista"    data-go="activities/vista/"    aria-label="VISTA"></button>
        <button class="hs hs-oido"     data-go="activities/oido/"     aria-label="OÍDO"></button>
        <button class="hs hs-cerebro"  data-go="activities/cerebro/"  aria-label="CEREBRO"></button>
        <button class="hs hs-pulmones" data-go="activities/pulmones/" aria-label="PULMONES"></button>
        <button class="hs hs-corazon"  data-go="activities/corazon/"  aria-label="CORAZÓN"></button>
        <button class="hs hs-estomago" data-go="activities/estomago/" aria-label="ESTÓMAGO"></button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      function go(path){
        if(!path) return;
        location.href = path;
      }

      // TOQUES
      document.querySelectorAll(".hs").forEach(function(b){
        b.addEventListener("pointerdown", function(ev){
          ev.preventDefault();
          go(b.getAttribute("data-go"));
        }, { passive: false });
      });

      // DEBUG TOGGLE
      var btnDebug = document.getElementById("btnDebug");
      btnDebug.addEventListener("click", function(){
        document.body.classList.toggle("debug");
      });

      // ?DEBUG=1
      var params = new URLSearchParams(location.search);
      if(params.has("debug")) document.body.classList.add("debug");
    })();
  </script>
<script src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script>
(function(){
  var _opts={folder:'svg',ext:'.svg'};
  function _p(el){try{twemoji.parse(el,_opts);}catch(e){}}
  if(document.readyState!=='loading')_p(document.body);
  else document.addEventListener('DOMContentLoaded',function(){_p(document.body);});
  new MutationObserver(function(ms){ms.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType===1)_p(n);else if(n.nodeType===3&&n.parentNode&&n.parentNode.nodeType===1)_p(n.parentNode);});});}).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>
</body>
</html>
