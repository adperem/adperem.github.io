<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SIGUE EL CAMINO</title>
  <style>
    :root{
      --ink:#16324f;
      --muted:#5a6b7a;
      --card: rgba(255,255,255,.88);
      --shadow: 0 18px 40px rgba(0,0,0,.12);
      --shadow2: 0 10px 24px rgba(0,0,0,.10);
      --radius: 26px;
      --radius2: 20px;
      --line: rgba(0,0,0,.10);
      --accent:#ffd77a;
      --accent2:#9fe7ff;
      --good:#2ad39c;
      --bad:#ff6b6b;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--ink);
      overflow:hidden;
      user-select:none;
      -webkit-user-select:none;
    }
    body::before{
      content:"";
      position:fixed;
      inset:-40px;
      background: url("assets/fondo_parque.webp") center/cover no-repeat;
      filter: blur(12px);
      transform: scale(1.05);
      z-index:-2;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background: linear-gradient(180deg, rgba(255,255,255,.25), rgba(255,255,255,.10));
      z-index:-1;
    }

    .cloud{
      position:fixed;
      top:14px;
      width:220px;
      height:90px;
      background: rgba(255,255,255,.55);
      border-radius: 999px;
      box-shadow: 0 12px 28px rgba(0,0,0,.10);
      z-index:0;
      pointer-events:none;
    }
    .cloud::before,.cloud::after{
      content:"";
      position:absolute;
      background: rgba(255,255,255,.62);
      border-radius: 999px;
    }
    .cloud::before{ width:100px; height:70px; left:24px; top:-18px; }
    .cloud::after{ width:120px; height:80px; right:26px; top:-26px; }
    .cloud.c1{ left:18px; }
    .cloud.c2{ right:18px; top:34px; width:260px; height:98px; opacity:.85; }

    .wrap{
      height:100%;
      padding:18px 18px 14px;
      display:flex;
      flex-direction:column;
      gap:14px;
      position:relative;
      z-index:1;
    }

    .topRow{
      display:grid;
      grid-template-columns: 1fr 380px;
      gap:14px;
      align-items:stretch;
      min-height:92px;
    }
    .titleCard{
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow2);
      padding:16px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border: 1px solid rgba(255,255,255,.65);
    }
    .titleLeft{ display:flex; flex-direction:column; gap:4px; }
    .h1{ font-weight:900; letter-spacing:.8px; font-size: 34px; line-height:1.05; }
    .sub{ font-weight:800; letter-spacing:.9px; color:var(--muted); font-size: 14px; }
    .pill{
      background: #ffe9aa;
      border: 2px solid rgba(0,0,0,.08);
      padding:10px 16px;
      border-radius: 999px;
      font-weight:900;
      letter-spacing:1px;
      box-shadow: 0 10px 18px rgba(0,0,0,.08);
      min-width: 150px;
      text-align:center;
    }

    .scoreCard{
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow2);
      padding:14px 16px;
      border: 1px solid rgba(255,255,255,.65);
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:10px;
    }
    .scoreRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-weight:900;
      letter-spacing:1px;
    }
    .counter{
      min-width: 56px;
      background: rgba(255,255,255,.9);
      border: 2px solid rgba(0,0,0,.08);
      border-radius: 999px;
      padding:6px 10px;
      text-align:center;
      box-shadow: 0 10px 18px rgba(0,0,0,.06);
    }

    .panel{
      flex:1;
      background: rgba(255,255,255,.55);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.65);
      padding:14px;
      min-height:0;
      overflow:hidden;
      position:relative;
    }
    .panelInner{
      height:100%;
      background: rgba(255,255,255,.78);
      border-radius: var(--radius2);
      border: 1px solid rgba(0,0,0,.06);
      padding:14px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.35);
      position:relative;
      overflow:hidden;
    }

    .mazeBox{
      height:100%;
      width:100%;
      background: rgba(255,255,255,.92);
      border-radius: 22px;
      border: 2px solid rgba(0,0,0,.08);
      box-shadow: 0 18px 24px rgba(0,0,0,.08);
      position:relative;
      overflow:hidden;
    }

    .tag{
      position:absolute;
      top:12px;
      background: rgba(255,255,255,.92);
      border: 2px solid rgba(0,0,0,.08);
      border-radius: 999px;
      padding:6px 12px;
      font-weight:900;
      letter-spacing:1px;
      font-size: 12px;
      box-shadow: 0 10px 18px rgba(0,0,0,.06);
      z-index:5;
    }
    .tag.left{ left:12px; }
    .tag.right{ right:12px; }

    #mazeSvg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
    }

    .marker{
      position:absolute;
      width: 60px;
      height: 60px;
      border-radius: 999px;
      background: rgba(255,255,255,.96);
      border: 3px solid rgba(0,0,0,.10);
      box-shadow: 0 18px 26px rgba(0,0,0,.16);
      display:grid;
      place-items:center;
      font-size: 34px;
      z-index:10;
      transform: translate(-50%,-50%);
      touch-action:none;
      cursor:grab;
    }
    .marker:active{ cursor:grabbing; }
    .flashBad{
      position:absolute;
      inset:0;
      background: rgba(255,107,107,.12);
      opacity:0;
      pointer-events:none;
      z-index:20;
      transition: opacity .12s ease;
    }
    .flashBad.on{ opacity:1; }

    .bottomBar{
      height: 86px;
      background: rgba(255,255,255,.82);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.65);
      padding: 12px 14px;
      display:flex;
      align-items:center;
      gap:14px;
    }
    .progressBox{ flex:1; display:flex; flex-direction:column; gap:8px; }
    .progressTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-weight: 950;
      letter-spacing: 1px;
      font-size: 13px;
    }
    .bar{
      height: 18px;
      background: rgba(0,0,0,.08);
      border-radius: 999px;
      overflow:hidden;
      border: 1px solid rgba(0,0,0,.08);
    }
    .bar > div{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, #2ad39c, #9fe7ff);
      border-radius: 999px;
      transition: width .25s ease;
    }
    .btnRow{ display:flex; gap:12px; align-items:center; }
    .btn{
      height: 58px;
      min-width: 210px;
      border-radius: 18px;
      border: 2px solid rgba(0,0,0,.10);
      font-weight: 950;
      letter-spacing: 1px;
      font-size: 14px;
      box-shadow: 0 16px 22px rgba(0,0,0,.10);
      cursor:pointer;
      background: var(--accent);
    }
    .btn.secondary{ background: var(--accent2); min-width: 200px; }
    .btn:active{ transform: translateY(1px); }

    .sticker{
      position:absolute;
      left: 16px;
      bottom: 16px;
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: rgba(255,210,246,.70);
      border: 2px solid rgba(0,0,0,.08);
      box-shadow: 0 12px 18px rgba(0,0,0,.10);
      display:grid;
      place-items:center;
      font-size: 30px;
      pointer-events:none;
      transform: rotate(-6deg);
      z-index:30;
    }
  </style>
</head>
<body>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>

  <div class="wrap">
    <div class="topRow">
      <div class="titleCard">
        <div class="titleLeft">
          <div class="h1">SIGUE EL CAMINO</div>
          <div class="sub">ARRASTRA LA CARITA POR EL CAMINO SIN SALIRTE</div>
        </div>
        <div class="pill" id="levelPill">NIVEL 1</div>
      </div>

      <div class="scoreCard">
        <div class="scoreRow">
          <div>NIVEL</div>
          <div class="counter" id="levelCount">1</div>
        </div>
        <div class="scoreRow">
          <div>FALLOS</div>
          <div class="counter" id="failCount">0</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panelInner">
        <div class="mazeBox" id="mazeBox">
          <div class="tag left">INICIO</div>
          <div class="tag right">META</div>

          <svg id="mazeSvg" viewBox="0 0 1000 500" preserveAspectRatio="none" aria-hidden="true"></svg>

          <div class="marker" id="marker" aria-label="CARITA">🙂</div>
          <div class="flashBad" id="flashBad"></div>

          <div class="sticker" aria-hidden="true">🟦</div>
        </div>
      </div>
    </div>

    <div class="bottomBar">
      <div class="progressBox">
        <div class="progressTop">
          <div>PROGRESO</div>
          <div id="progressText">0 DE 5</div>
        </div>
        <div class="bar"><div id="barFill"></div></div>
      </div>
      <div class="btnRow">
        <button class="btn" id="btnReset">REINICIAR OTRA VEZ</button>
        <button class="btn secondary" id="btnBack">VOLVER MENÚ</button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      var okAudio = new Audio("/asstests/aplausos.mp4");
      var badAudio = new Audio("/asstests/ohh.mp4");
      okAudio.preload = "auto";
      badAudio.preload = "auto";
      function playOk(){ try{ okAudio.currentTime=0; okAudio.play(); }catch(e){} }
      function playBad(){ try{ badAudio.currentTime=0; badAudio.play(); }catch(e){} }

      var mazeSvg = document.getElementById("mazeSvg");
      var mazeBox = document.getElementById("mazeBox");
      var marker = document.getElementById("marker");
      var flashBad = document.getElementById("flashBad");

      var levelPill = document.getElementById("levelPill");
      var levelCount = document.getElementById("levelCount");
      var failCount = document.getElementById("failCount");
      var progressText = document.getElementById("progressText");
      var barFill = document.getElementById("barFill");

      var btnReset = document.getElementById("btnReset");
      var btnBack = document.getElementById("btnBack");
      btnBack.addEventListener("click", function(){ location.href="index.html"; });

      var levels = [
        { pts: [ [120,360],[240,330],[360,260],[520,260],[680,310],[820,220] ] },
        { pts: [ [120,260],[220,220],[320,240],[420,310],[520,320],[640,250],[760,260],[880,180] ] },
        { pts: [ [120,360],[220,300],[320,340],[420,220],[520,260],[620,220],[720,300],[880,280] ] },
        { pts: [ [120,220],[240,260],[360,220],[480,260],[600,220],[720,260],[840,220] ] },
        { pts: [ [120,320],[260,220],[400,300],[540,200],[680,300],[820,220] ] }
      ];

      var state = {
        level: 1,
        total: levels.length,
        fails: 0,
        dragging: false,
        pointerId: null,
        viewW: 1000,
        viewH: 500,
        trackHalf: 42,
        start: null,
        goal: null,
        poly: null
      };

      function setHud(){
        levelPill.textContent = "NIVEL " + String(state.level);
        levelCount.textContent = String(state.level);
        failCount.textContent = String(state.fails);
        progressText.textContent = (state.level-1) + " DE " + state.total;
        var pct = Math.floor(((state.level-1)/state.total)*100);
        barFill.style.width = String(pct) + "%";
      }

      function buildSvgForLevel(lvl){
        var pts = levels[lvl-1].pts;

        state.start = pts[0];
        state.goal = pts[pts.length-1];
        state.poly = pts;

        var d = "M " + pts[0][0] + " " + pts[0][1];
        var i;
        for(i=1;i<pts.length;i++){
          d += " L " + pts[i][0] + " " + pts[i][1];
        }

        mazeSvg.innerHTML = "" +
          '<path d="' + d + '" stroke="rgba(0,0,0,.10)" stroke-width="110" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>' +
          '<path d="' + d + '" stroke="#9fe7ff" stroke-width="94" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".9"></path>' +
          '<path d="' + d + '" stroke="rgba(22,50,79,.22)" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".45"></path>' +
          '<circle cx="' + state.start[0] + '" cy="' + state.start[1] + '" r="30" fill="#ffe9aa" stroke="rgba(0,0,0,.16)" stroke-width="6"></circle>' +
          '<circle cx="' + state.goal[0] + '" cy="' + state.goal[1] + '" r="30" fill="#a8f0d5" stroke="rgba(0,0,0,.16)" stroke-width="6"></circle>';
      }

      function viewToPx(pt){
        var rect = mazeBox.getBoundingClientRect();
        var x = (pt[0] / state.viewW) * rect.width;
        var y = (pt[1] / state.viewH) * rect.height;
        return [x,y];
      }

      function pxToView(x,y){
        var rect = mazeBox.getBoundingClientRect();
        var vx = (x / rect.width) * state.viewW;
        var vy = (y / rect.height) * state.viewH;
        return [vx,vy];
      }

      function placeMarkerAtView(pt){
        var p = viewToPx(pt);
        marker.style.left = String(p[0]) + "px";
        marker.style.top = String(p[1]) + "px";
      }

      function distPointToSegment(px,py, ax,ay, bx,by){
        var abx = bx-ax;
        var aby = by-ay;
        var apx = px-ax;
        var apy = py-ay;
        var ab2 = abx*abx + aby*aby;
        var t = 0;
        if(ab2 > 0){
          t = (apx*abx + apy*aby) / ab2;
        }
        if(t < 0) t = 0;
        if(t > 1) t = 1;
        var cx = ax + t*abx;
        var cy = ay + t*aby;
        var dx = px-cx;
        var dy = py-cy;
        return Math.sqrt(dx*dx + dy*dy);
      }

      function isOnTrack(viewPt){
        var px = viewPt[0], py = viewPt[1];
        var pts = state.poly;
        var i;
        var best = 1e9;
        for(i=0;i<pts.length-1;i++){
          var d = distPointToSegment(px,py, pts[i][0],pts[i][1], pts[i+1][0],pts[i+1][1]);
          if(d < best) best = d;
        }
        return best <= state.trackHalf;
      }

      function reachedGoal(viewPt){
        var dx = viewPt[0] - state.goal[0];
        var dy = viewPt[1] - state.goal[1];
        return (dx*dx + dy*dy) <= (36*36);
      }

      function flashError(){
        flashBad.classList.add("on");
        setTimeout(function(){ flashBad.classList.remove("on"); }, 140);
      }

      function failAndReset(){
        state.fails += 1;
        setHud();
        playBad();
        flashError();
        placeMarkerAtView(state.start);
      }

      function nextLevel(){
        playOk();
        if(state.level >= state.total){
          barFill.style.width = "100%";
          progressText.textContent = state.total + " DE " + state.total;
          levelPill.textContent = "¡HECHO!";
          return;
        }
        state.level += 1;
        setHud();
        buildSvgForLevel(state.level);
        placeMarkerAtView(state.start);
      }

      function localXYFromEvent(e){
        var rect = mazeBox.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        return [x,y];
      }

      marker.addEventListener("pointerdown", function(e){
        state.dragging = true;
        state.pointerId = e.pointerId;
        marker.setPointerCapture(state.pointerId);
        e.preventDefault();
      });

      marker.addEventListener("pointermove", function(e){
        if(!state.dragging) return;
        if(e.pointerId !== state.pointerId) return;

        var xy = localXYFromEvent(e);
        marker.style.left = String(xy[0]) + "px";
        marker.style.top = String(xy[1]) + "px";

        var viewPt = pxToView(xy[0], xy[1]);

        if(!isOnTrack(viewPt)){
          failAndReset();
          return;
        }
        if(reachedGoal(viewPt)){
          nextLevel();
          return;
        }
      });

      function endDrag(e){
        if(!state.dragging) return;
        if(e.pointerId !== state.pointerId) return;
        state.dragging = false;
        try{ marker.releasePointerCapture(state.pointerId); }catch(err){}
        state.pointerId = null;
      }

      marker.addEventListener("pointerup", endDrag);
      marker.addEventListener("pointercancel", endDrag);

      function resetGame(){
        state.level = 1;
        state.fails = 0;
        setHud();
        buildSvgForLevel(state.level);
        placeMarkerAtView(state.start);
      }

      btnReset.addEventListener("click", function(){ resetGame(); });

      resetGame();
    })();
  </script>
<script src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script>
(function(){
  var _opts={folder:'svg',ext:'.svg'};
  function _p(el){try{twemoji.parse(el,_opts);}catch(e){}}
  if(document.readyState!=='loading')_p(document.body);
  else document.addEventListener('DOMContentLoaded',function(){_p(document.body);});
  new MutationObserver(function(ms){ms.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType===1)_p(n);else if(n.nodeType===3&&n.parentNode&&n.parentNode.nodeType===1)_p(n.parentNode);});});}).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>
</body>
</html>
