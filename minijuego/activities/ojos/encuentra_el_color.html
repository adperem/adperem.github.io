<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENCUENTRA EL COLOR (VISTA)</title>
<style>
  :root{
    --panel: rgba(255,255,255,.88);
    --panel2: rgba(255,255,255,.75);
    --shadow: 0 14px 34px rgba(31,41,55,.16);
    --ink: #1f2a37;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0;width:100%;height:100%;font-family:Arial,Helvetica,sans-serif;overflow:hidden;background:#dff1ff;}
  body{text-transform:uppercase;color:var(--ink);}
  .bg{
    position:fixed; inset:0;
    background:url('assets/fondo_parque.webp') center/cover no-repeat;
    filter:blur(10px) saturate(1.05);
    transform:scale(1.05);
  }
  .bg::after{
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(circle at 12% 14%, rgba(255,255,255,.62), transparent 34%),
      radial-gradient(circle at 82% 18%, rgba(255,255,255,.4), transparent 30%),
      linear-gradient(to bottom, rgba(255,255,255,.22), rgba(255,255,255,.08));
  }
  .app{
    position:relative; z-index:1; height:100%; width:100%;
    display:grid; grid-template-rows:150px 1fr 130px; gap:12px;
    padding:16px 22px 18px;
  }
  .top{
    background:var(--panel); border-radius:30px; box-shadow:var(--shadow);
    display:grid; grid-template-columns: 140px 1fr 230px; align-items:center;
    padding:14px 18px; border:2px solid rgba(255,255,255,.8);
  }
  .mascot{
    width:112px;height:112px;border-radius:24px;display:flex;align-items:center;justify-content:center;
    font-size:64px;background:linear-gradient(180deg,#eef8ff,#dff0ff); border:3px solid rgba(105,184,255,.35);
    box-shadow: inset 0 8px 14px rgba(255,255,255,.75);
  }
  h1{margin:0;font-size:58px;line-height:1.02;letter-spacing:1px;}
  .subtitle{
    margin-top:10px; display:inline-block; padding:8px 14px; border-radius:16px;
    background:rgba(255,255,255,.8); font-size:24px; font-weight:900;
  }
  .chipbox{display:flex; flex-direction:column; align-items:flex-end; gap:10px;}
  .chip{
    border-radius:16px; padding:8px 12px; background:rgba(255,255,255,.85);
    border:2px solid rgba(124,156,255,.25); font-weight:900; font-size:20px; box-shadow:var(--shadow);
  }

  .play{
    min-height:0;
    display:grid; grid-template-columns: 36% 64%; gap:16px;
  }
  .left, .right{
    background:var(--panel2); border-radius:30px; box-shadow:var(--shadow);
    border:2px solid rgba(255,255,255,.8); padding:16px; min-height:0;
  }
  .left{
    display:grid; grid-template-rows: auto auto 1fr auto; gap:12px;
    align-content:start;
  }
  .panel-title{
    font-size:32px; font-weight:900; margin:0;
    background:rgba(255,255,255,.78); border-radius:18px; padding:10px 14px;
  }
  .color-card{
    background:rgba(255,255,255,.95); border-radius:26px; padding:18px;
    border:3px solid rgba(124,156,255,.2); box-shadow:var(--shadow);
    display:grid; grid-template-rows:auto auto auto; gap:12px; text-align:center;
  }
  .color-circle{
    width:180px; height:180px; border-radius:50%; margin:4px auto;
    border:8px solid rgba(255,255,255,.95);
    box-shadow:inset 0 8px 15px rgba(255,255,255,.5), 0 8px 18px rgba(0,0,0,.08);
    background:#f87171;
  }
  .color-name{font-size:46px; font-weight:900; line-height:1;}
  .instruction{
    font-size:24px; font-weight:900; color:#475569;
    background:rgba(240,248,255,.95); border-radius:18px; padding:10px 12px;
  }
  .round-pill{
    background:rgba(255,255,255,.9); border-radius:999px; padding:8px 14px; display:inline-block;
    border:2px solid rgba(124,156,255,.22); font-size:22px; font-weight:900;
  }
  .mini-legend{
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }
  .legend-box{
    background:rgba(255,255,255,.85); border-radius:18px; padding:12px; text-align:center;
    border:2px solid rgba(255,255,255,.95);
    font-weight:900; font-size:18px;
  }
  .legend-box span{
    display:block; margin-top:6px; font-size:26px;
  }

  .grid-head{
    display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px;
  }
  .grid-head h2{margin:0;font-size:34px;}
  .grid-head .sub{
    background:rgba(255,255,255,.9); border-radius:999px; padding:8px 14px; font-size:20px; font-weight:900;
    border:2px solid rgba(124,156,255,.2);
  }
  .grid{
    height:calc(100% - 56px);
    display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap:14px;
    align-content:stretch;
  }
  .tile{
    position:relative;
    background:rgba(255,255,255,.95); border-radius:24px; box-shadow:var(--shadow);
    border:3px solid rgba(255,255,255,.95);
    display:grid; place-items:center;
    touch-action:manipulation; cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease, opacity .12s ease;
    min-height:135px;
  }
  .tile:active{transform:scale(.98);}
  .shape{
    width:72%; height:72%; display:grid; place-items:center;
    font-size:54px; border-radius:20px;
    box-shadow:inset 0 10px 18px rgba(255,255,255,.35);
  }
  .tile.ok{border-color:rgba(64,196,99,.8); box-shadow:0 0 0 5px rgba(64,196,99,.12), var(--shadow);}
  .tile.bad{border-color:rgba(255,107,107,.8); box-shadow:0 0 0 5px rgba(255,107,107,.12), var(--shadow);}
  .tile.done{opacity:.55;}
  .tile.done::after{
    content:'✓'; position:absolute; right:8px; top:4px; font-size:28px; font-weight:900; color:#0d8a3d;
    background:rgba(255,255,255,.92); border-radius:999px; width:36px; height:36px; display:grid; place-items:center;
    border:2px solid rgba(64,196,99,.35);
  }
  .target-glow{
    animation:pulse .8s ease-in-out infinite;
  }
  @keyframes pulse{
    0%{box-shadow:inset 0 8px 15px rgba(255,255,255,.5), 0 0 0 0 rgba(104,184,255,.35);}
    70%{box-shadow:inset 0 8px 15px rgba(255,255,255,.5), 0 0 0 20px rgba(104,184,255,0);}
    100%{box-shadow:inset 0 8px 15px rgba(255,255,255,.5), 0 0 0 0 rgba(104,184,255,0);}
  }

  .bottom{
    background:var(--panel); border-radius:28px; box-shadow:var(--shadow);
    border:2px solid rgba(255,255,255,.8);
    display:grid; grid-template-columns: 1fr 190px 190px; gap:12px; align-items:center;
    padding:14px;
  }
  .progress-wrap{
    background:rgba(255,255,255,.78); border-radius:22px; padding:10px 14px; border:2px solid rgba(255,255,255,.9);
  }
  .progress-top{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:8px; font-size:22px; font-weight:900;}
  .bar{height:24px; background:#e7edf5; border-radius:999px; overflow:hidden; border:2px solid rgba(0,0,0,.03);}
  .bar span{display:block; height:100%; width:0%; background:linear-gradient(90deg,#7dd3fc,#60a5fa,#86efac); transition:width .2s ease; border-radius:999px;}
  button{
    border:0; border-radius:22px; height:86px; font-size:27px; font-weight:900; color:#123;
    box-shadow:var(--shadow); cursor:pointer; border:3px solid rgba(124,156,255,.2);
  }
  button.primary{background:linear-gradient(180deg,#ffe7a7,#ffd36d);}
  button.secondary{background:linear-gradient(180deg,#e6f4ff,#cde9ff);}
  button:active{transform:translateY(2px);}

  .feedback{
    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(.9);
    z-index:100; pointer-events:none; opacity:0;
    background:rgba(255,255,255,.96); border-radius:24px; padding:14px 22px;
    font-size:34px; font-weight:900; box-shadow:0 24px 50px rgba(0,0,0,.18);
    border:3px solid rgba(255,255,255,.95);
    transition:opacity .18s ease, transform .18s ease;
  }
  .feedback.show{opacity:1; transform:translate(-50%,-50%) scale(1);}
  .feedback.ok{border-color:rgba(64,196,99,.72); color:#176a2f;}
  .feedback.err{border-color:rgba(255,107,107,.72); color:#9f1d1d;}

  @media (max-width: 1400px){
    .app{grid-template-rows:130px 1fr 118px;}
    h1{font-size:42px}
    .subtitle{font-size:20px}
    .color-circle{width:130px;height:130px}
    .color-name{font-size:34px}
    .instruction{font-size:18px}
    .panel-title{font-size:24px}
    .tile{min-height:100px}
    .shape{font-size:38px}
    button{height:74px;font-size:22px}
  }
</style>
</head>
<body>
<div class="bg"></div>

<audio id="audioOk" preload="none" data-src="/asstests/aplausos.mp4" ></audio>
<audio id="audioErr" preload="none" data-src="/asstests/ohh.mp4" ></audio>

<div class="app">
  <div class="top">
    <div class="mascot">🌈</div>
    <div>
      <h1>ENCUENTRA EL COLOR</h1>
      <div class="subtitle">TOCA TODOS LOS DIBUJOS DEL COLOR INDICADO</div>
    </div>
    <div class="chipbox">
      <div class="chip">VISTA 👀</div>
      <div class="chip">COLORES 🎨</div>
    </div>
  </div>

  <div class="play">
    <section class="left">
      <div class="panel-title">COLOR QUE BUSCAMOS</div>
      <div class="color-card">
        <div class="color-circle target-glow" id="targetCircle"></div>
        <div class="color-name" id="targetName">ROJO</div>
        <div class="instruction" id="instructionText">TOCA TODOS LOS DIBUJOS DE ESTE COLOR</div>
      </div>
      <div class="mini-legend">
        <div class="legend-box">ACIERTOS<span id="hitsText">0</span></div>
        <div class="legend-box">FALTAN<span id="leftText">0</span></div>
      </div>
      <div class="round-pill" id="roundPill">RONDA 1 / 6</div>
    </section>

    <section class="right">
      <div class="grid-head">
        <h2>TABLERO</h2>
        <div class="sub" id="roundState">TOCA LAS OPCIONES CORRECTAS</div>
      </div>
      <div class="grid" id="grid"></div>
    </section>
  </div>

  <div class="bottom">
    <div class="progress-wrap">
      <div class="progress-top">
        <div>PROGRESO</div>
        <div id="progressText">0 / 6</div>
      </div>
      <div class="bar"><span id="progressBar"></span></div>
    </div>
    <button class="primary" id="btnReset">REINICIAR</button>
    <button class="secondary" id="btnBack">VOLVER</button>
  </div>
</div>

<div class="feedback" id="feedback">¡MUY BIEN!</div>

<script>
(function(){
  var COLORS = [
    {key:'rojo', name:'ROJO', value:'#f87171'},
    {key:'azul', name:'AZUL', value:'#60a5fa'},
    {key:'verde', name:'VERDE', value:'#4ade80'},
    {key:'amarillo', name:'AMARILLO', value:'#facc15'},
    {key:'morado', name:'MORADO', value:'#a78bfa'},
    {key:'naranja', name:'NARANJA', value:'#fb923c'}
  ];
  var SHAPES = ['●','★','◆','⬟','⬢','♥','☀','✿','⬤','⬥'];
  var TOTAL_ROUNDS = 6;

  var state = {
    roundIndex: 0,
    target: null,
    tiles: [],
    foundThisRound: 0,
    needThisRound: 0,
    completedRounds: 0
  };

  var grid = document.getElementById('grid');
  var targetCircle = document.getElementById('targetCircle');
  var targetName = document.getElementById('targetName');
  var hitsText = document.getElementById('hitsText');
  var leftText = document.getElementById('leftText');
  var roundPill = document.getElementById('roundPill');
  var roundState = document.getElementById('roundState');
  var progressBar = document.getElementById('progressBar');
  var progressText = document.getElementById('progressText');
  var feedback = document.getElementById('feedback');
  var audioOk = document.getElementById('audioOk');
  var audioErr = document.getElementById('audioErr');

  function playSound(a){
    try{
      a.pause(); a.currentTime = 0;
      var p = a.play();
      if (p && p.catch){ p.catch(function(){}); }
    }catch(e){}
  }

  function showFeedback(text, kind){
    feedback.textContent = text;
    feedback.className = 'feedback ' + (kind === 'ok' ? 'ok' : 'err') + ' show';
    clearTimeout(showFeedback.t);
    showFeedback.t = setTimeout(function(){ feedback.className = 'feedback'; }, 650);
  }

  function updateMainProgress(){
    progressText.textContent = state.completedRounds + ' / ' + TOTAL_ROUNDS;
    progressBar.style.width = (state.completedRounds / TOTAL_ROUNDS * 100) + '%';
  }

  function updateRoundUI(){
    targetCircle.style.background = state.target.value;
    targetName.textContent = state.target.name;
    hitsText.textContent = String(state.foundThisRound);
    leftText.textContent = String(Math.max(0, state.needThisRound - state.foundThisRound));
    roundPill.textContent = 'RONDA ' + (state.roundIndex + 1) + ' / ' + TOTAL_ROUNDS;
    roundState.textContent = 'TOCA LAS OPCIONES CORRECTAS';
  }

  function makeTile(tileData){
    var el = document.createElement('button');
    el.type = 'button';
    el.className = 'tile';
    el.setAttribute('aria-label', 'OPCIÓN DE COLOR');
    el.setAttribute('data-color', tileData.color.key);
    el.setAttribute('data-target', tileData.isTarget ? '1' : '0');

    var shape = document.createElement('div');
    shape.className = 'shape';
    shape.textContent = tileData.symbol;
    shape.style.background = tileData.color.value;
    shape.style.color = 'rgba(255,255,255,.96)';
    el.appendChild(shape);

    el.addEventListener('click', function(){
      if (el.classList.contains('done')) { return; }

      var isTarget = tileData.isTarget;
      if (isTarget){
        el.classList.remove('bad');
        el.classList.add('ok','done');
        state.foundThisRound += 1;
        hitsText.textContent = String(state.foundThisRound);
        leftText.textContent = String(Math.max(0, state.needThisRound - state.foundThisRound));
        playSound(audioOk);
        showFeedback('¡BIEN!', 'ok');

        if (state.foundThisRound >= state.needThisRound){
          state.completedRounds += 1;
          updateMainProgress();
          roundState.textContent = 'RONDA SUPERADA';
          setTimeout(function(){
            if (state.completedRounds >= TOTAL_ROUNDS){
              showFeedback('¡GENIAL! JUEGO COMPLETADO', 'ok');
              roundState.textContent = 'JUEGO COMPLETADO';
              playSound(audioOk);
            } else {
              nextRound();
            }
          }, 700);
        }
      } else {
        el.classList.remove('ok');
        el.classList.add('bad');
        setTimeout(function(){ el.classList.remove('bad'); }, 300);
        roundState.textContent = 'ESE COLOR NO ES';
        playSound(audioErr);
        showFeedback('PRUEBA OTRA VEZ', 'err');
      }
    });

    return el;
  }

  function buildRound(){
    grid.innerHTML = '';

    var targetIndex = state.roundIndex % COLORS.length;
    state.target = COLORS[targetIndex];
    state.foundThisRound = 0;

    var targetCount = 4;
    state.needThisRound = targetCount;

    var choices = [];
    var i;

    for (i = 0; i < targetCount; i++){
      choices.push({
        color: state.target,
        isTarget: true,
        symbol: SHAPES[(state.roundIndex + i) % SHAPES.length]
      });
    }

    var otherColors = COLORS.filter(function(c){ return c.key !== state.target.key; });
    for (i = 0; i < 8; i++){
      var c = otherColors[(i + state.roundIndex) % otherColors.length];
      choices.push({
        color: c,
        isTarget: false,
        symbol: SHAPES[(i + 3 + state.roundIndex) % SHAPES.length]
      });
    }

    choices.sort(function(){ return Math.random() - 0.5; });
    state.tiles = choices;
    for (i = 0; i < choices.length; i++){
      grid.appendChild(makeTile(choices[i]));
    }

    updateRoundUI();
  }

  function nextRound(){
    state.roundIndex += 1;
    buildRound();
  }

  function resetGame(){
    state.roundIndex = 0;
    state.completedRounds = 0;
    updateMainProgress();
    buildRound();
    showFeedback('ACTIVIDAD REINICIADA', 'ok');
  }

  document.getElementById('btnReset').addEventListener('click', function(){
    resetGame();
  });

  document.getElementById('btnBack').addEventListener('click', function(){
    if (window.history.length > 1){
      window.history.back();
    } else {
      window.location.href = './';
    }
  });

  updateMainProgress();
  buildRound();
})();
</script>
<script src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script>
(function(){
  var _opts={folder:'svg',ext:'.svg'};
  function _p(el){try{twemoji.parse(el,_opts);}catch(e){}}
  if(document.readyState!=='loading')_p(document.body);
  else document.addEventListener('DOMContentLoaded',function(){_p(document.body);});
  new MutationObserver(function(ms){ms.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType===1)_p(n);else if(n.nodeType===3&&n.parentNode&&n.parentNode.nodeType===1)_p(n.parentNode);});});}).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>
</body>
</html>
