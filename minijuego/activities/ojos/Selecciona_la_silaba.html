<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOCA LA SÍLABA</title>
  <style>
    :root{
      --panel-bg: rgba(255,255,255,0.82);
      --panel-border: rgba(255,255,255,0.9);
      --shadow: 0 12px 30px rgba(33, 54, 90, 0.18);
      --text: #1f2a44;
      --accent: #7c9cff;
      --accent2: #ffa7d8;
      --good: #36b37e;
      --bad: #ef5350;
      --warm: #ffca6b;
      --btn: #ffffff;
      --btn-border: #dce7ff;
      --footer-h: 120px;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "Trebuchet MS", "Arial Rounded MT Bold", Arial, sans-serif;
      color: var(--text);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    body {
      position: relative;
      background: #dfeeff;
    }

    /* FONDO FIJO DIFUMINADO */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("assets/fondo_parque.webp") center center / cover no-repeat;
      filter: blur(7px) saturate(1.05);
      transform: scale(1.03);
      z-index: -3;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 12%, rgba(255,255,255,0.55) 0 80px, transparent 81px),
        radial-gradient(circle at 85% 15%, rgba(255,255,255,0.5) 0 95px, transparent 96px),
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.25));
      z-index: -2;
      pointer-events: none;
    }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr var(--footer-h);
      gap: 14px;
      padding: 18px 18px 0;
    }

    .top-panel {
      position: relative;
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 14px 22px 16px;
      min-height: 150px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      overflow: hidden;
    }

    .top-panel::before,
    .top-panel::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      opacity: 0.35;
      pointer-events: none;
    }

    .top-panel::before {
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, #ffd6ea 0%, #ffd6ea 55%, transparent 60%);
      right: 150px;
      top: -40px;
    }

    .top-panel::after {
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, #d9f0ff 0%, #d9f0ff 55%, transparent 60%);
      right: -30px;
      bottom: -70px;
    }

    .header-text {
      position: relative;
      z-index: 1;
    }

    .title {
      margin: 0;
      font-size: clamp(32px, 3vw, 54px);
      line-height: 1.05;
      letter-spacing: 1.4px;
      font-weight: 900;
      text-transform: uppercase;
      color: #27406b;
      text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    }

    .subtitle {
      margin-top: 8px;
      font-size: clamp(18px, 1.35vw, 28px);
      font-weight: 800;
      letter-spacing: 0.8px;
      color: #45628f;
      text-transform: uppercase;
    }

    .prompt-card {
      position: relative;
      z-index: 1;
      min-width: min(42vw, 520px);
      background: rgba(255,255,255,0.9);
      border: 3px solid #e7eeff;
      border-radius: 24px;
      padding: 10px 18px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      flex-wrap: wrap;
    }

    .prompt-label {
      font-size: clamp(26px, 1.8vw, 40px);
      font-weight: 900;
      color: #48638f;
      text-transform: uppercase;
    }
    .target-chip {
      min-width: 120px;
      padding: 8px 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, #fff5cc, #ffe59e);
      border: 2px solid #ffd15e;
      color: #614500;
      font-size: clamp(28px, 2vw, 40px);
      font-weight: 900;
      letter-spacing: 1px;
      box-shadow: 0 6px 14px rgba(255, 202, 107, 0.35);
      text-transform: uppercase;
    }

    .main-panel {
      position: relative;
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      min-height: 0;
      overflow: hidden;
    }

    .mini-info {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.85);
      border: 2px solid #e7eeff;
      font-size: clamp(16px, 1.05vw, 22px);
      font-weight: 900;
      color: #35517b;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .feedback {
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.8);
      border: 2px dashed #d8e6ff;
      font-size: clamp(18px, 1.2vw, 26px);
      font-weight: 900;
      letter-spacing: 0.5px;
      color: #4a6693;
      text-transform: uppercase;
    }

    .feedback.good {
      border-style: solid;
      border-color: rgba(54,179,126,0.45);
      background: rgba(54,179,126,0.12);
      color: #15764f;
      animation: pulseGood 320ms ease;
    }

    .feedback.bad {
      border-style: solid;
      border-color: rgba(239,83,80,0.45);
      background: rgba(239,83,80,0.12);
      color: #b22a27;
      animation: shakeBad 280ms ease;
    }

    .choices-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
      position: relative;
    }

    .choices-grid {
      width: min(100%, 1200px);
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 18px;
      align-content: stretch;
      justify-content: stretch;
      min-height: 360px;
      max-height: 100%;
    }

    .choice-btn {
      position: relative;
      border: 3px solid var(--btn-border);
      background: linear-gradient(180deg, #ffffff, #f6f9ff);
      border-radius: 24px;
      box-shadow: 0 8px 18px rgba(45, 80, 140, 0.12);
      font-size: clamp(46px, 4vw, 74px);
      font-weight: 900;
      letter-spacing: 2px;
      color: #294572;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      height: 100%;
      min-height: 150px;
      touch-action: manipulation;
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
      outline: none;
    }

    .choice-btn::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 18px;
      border: 2px dashed rgba(124,156,255,0.16);
      pointer-events: none;
    }

    .choice-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(45, 80, 140, 0.16);
    }

    .choice-btn:active,
    .choice-btn.pressing {
      transform: scale(0.985);
      box-shadow: 0 6px 12px rgba(45, 80, 140, 0.12);
    }

    .choice-btn.correct {
      border-color: rgba(54,179,126,0.9);
      background: linear-gradient(180deg, #ecfff6, #dcf7ea);
      color: #116f49;
      animation: popCorrect 280ms ease;
    }

    .choice-btn.wrong {
      border-color: rgba(239,83,80,0.9);
      background: linear-gradient(180deg, #fff1f1, #ffe5e5);
      color: #a52a2a;
      animation: shakeBad 260ms ease;
    }

    .choice-btn.dim {
      opacity: 0.65;
      filter: saturate(0.8);
    }

    .helper-note {
      text-align: center;
      font-size: clamp(16px, 1vw, 20px);
      font-weight: 800;
      color: #5875a2;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding-top: 4px;
    }

    .sticker-eye {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, #ffffff 0 45%, #dceaff 46% 100%);
      border: 3px solid #c9ddff;
      box-shadow: 0 6px 14px rgba(55, 95, 150, 0.15);
      position: relative;
      flex: 0 0 auto;
    }

    .sticker-eye::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4d6dd1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: inset -3px -2px 0 rgba(255,255,255,0.25);
    }

    .sticker-eye::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      top: 23px;
      left: 31px;
    }

    .footer-bar {
      background: rgba(255,255,255,0.88);
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 22px 22px 0 0;
      box-shadow: 0 -8px 20px rgba(45, 80, 140, 0.08);
      display: grid;
      grid-template-columns: minmax(260px, 1.3fr) 3fr auto auto;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
    }

    .progress-label {
      font-size: clamp(18px, 1.2vw, 24px);
      font-weight: 900;
      color: #35517b;
      text-transform: uppercase;
      text-align: center;
      background: rgba(255,255,255,0.95);
      border: 2px solid #e7eeff;
      border-radius: 16px;
      padding: 12px 14px;
      white-space: nowrap;
    }

    .progress-wrap {
      height: 28px;
      background: #edf3ff;
      border-radius: 999px;
      border: 2px solid #d7e4ff;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #7c9cff, #7fe0ff, #8ee7b8);
      transition: width 280ms ease;
      box-shadow: inset 0 -2px 0 rgba(255,255,255,0.35);
    }

    .footer-btn {
      border: 3px solid #dce7ff;
      background: linear-gradient(180deg, #ffffff, #f6f9ff);
      color: #294572;
      border-radius: 18px;
      padding: 0 18px;
      min-width: 180px;
      height: 84px;
      font-size: clamp(20px, 1.2vw, 26px);
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(45, 80, 140, 0.10);
      transition: transform 120ms ease, box-shadow 120ms ease;
      touch-action: manipulation;
    }

    .footer-btn:hover { transform: translateY(-1px); }
    .footer-btn:active { transform: scale(0.985); }

    .footer-btn.restart {
      border-color: #ffd59a;
      background: linear-gradient(180deg, #fffaf0, #ffefcf);
      color: #7c5300;
    }

    .footer-btn.back {
      border-color: #f6c5de;
      background: linear-gradient(180deg, #fff5fb, #ffe3f2);
      color: #8a2d62;
    }

    .overlay-complete {
      position: absolute;
      inset: 0;
      background: rgba(240, 248, 255, 0.72);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 10;
    }

    .overlay-complete.show { display: flex; }

    .complete-card {
      width: min(900px, 95%);
      background: rgba(255,255,255,0.95);
      border: 3px solid #e3ecff;
      border-radius: 28px;
      box-shadow: 0 18px 34px rgba(35, 60, 100, 0.16);
      padding: 24px;
      text-align: center;
    }

    .complete-title {
      margin: 0;
      font-size: clamp(34px, 2.6vw, 56px);
      font-weight: 900;
      letter-spacing: 1.4px;
      color: #215a3d;
      text-transform: uppercase;
    }

    .complete-subtitle {
      margin-top: 10px;
      font-size: clamp(20px, 1.3vw, 28px);
      font-weight: 800;
      color: #466790;
      text-transform: uppercase;
    }

    .complete-actions {
      margin-top: 18px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .complete-actions button {
      min-width: 210px;
      height: 76px;
      border-radius: 18px;
      border: 3px solid #dce7ff;
      background: #fff;
      font-size: clamp(18px, 1.1vw, 24px);
      font-weight: 900;
      color: #294572;
      cursor: pointer;
      text-transform: uppercase;
      touch-action: manipulation;
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sparkles i {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 4px;
      background: rgba(255,255,255,0.9);
      opacity: 0;
      transform: translateY(8px) scale(0.6) rotate(0deg);
      animation: sparkle 700ms ease forwards;
    }

    @keyframes sparkle {
      0%   { opacity: 0; transform: translateY(10px) scale(0.6) rotate(0deg); }
      20%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-30px) scale(1.15) rotate(90deg); }
    }

    @keyframes popCorrect {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    @keyframes shakeBad {
      0% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }

    @keyframes pulseGood {
      0% { transform: scale(1); }
      50% { transform: scale(1.015); }
      100% { transform: scale(1); }
    }

    @media (max-width: 1200px) {
      .footer-bar {
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
        height: auto;
        padding-bottom: 18px;
        border-radius: 22px;
      }
      .app {
        grid-template-rows: auto 1fr auto;
      }
      .footer-btn, .complete-actions button { width: 100%; min-width: 0; }
      .prompt-card {
        position: relative;
        z-index: 1;
        min-width: 0;
        width: 100%;
        max-width: 760px;
        background: rgba(255,255,255,0.9);
        border: 3px solid #e7eeff;
        border-radius: 24px;
        padding: 14px 22px;
        box-shadow: inset 0 0 0 2px rgba(255,255,255,0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        text-align: center;
        flex-wrap: wrap;

        /* LO MUEVE UN POCO HACIA EL CENTRO */
        justify-self: center;
        transform: translateX(-35px);
      }
      .top-panel {
        grid-template-columns: 1fr;
      }
      .choices-grid {
        gap: 12px;
      }
      .choice-btn {
        min-height: 120px;
      }
    }

    @media (max-height: 800px) {
      :root { --footer-h: 104px; }
      .top-panel {
        position: relative;
        background: var(--panel-bg);
        border: 2px solid var(--panel-border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 14px 22px 16px;
        min-height: 150px;
        display: grid;
        grid-template-columns: 1fr minmax(560px, 760px);
        align-items: center;
        gap: 20px;
        overflow: hidden;
      }
      .main-panel { gap: 10px; padding: 14px; }
      .choice-btn { min-height: 110px; }
    }
  </style>
</head>
<body>
  <audio id="audioSuccess" preload="none" data-src="/asstests/aplausos.mp4" ></audio>
  <audio id="audioError" preload="none" data-src="/asstests/ohh.mp4" ></audio>

  <div class="app">
    <section class="top-panel" aria-label="CABECERA">
      <div class="header-text">
        <h1 class="title">TOCA LA SÍLABA</h1>
        <div class="subtitle">MIRA EL ENUNCIADO Y TOCA LA OPCIÓN CORRECTA</div>
      </div>

      <div class="prompt-card" aria-live="polite">
        <div class="sticker-eye" aria-hidden="true"></div>
        <div class="prompt-label">TOCA</div>
        <div class="target-chip" id="targetSyllable">PA</div>
      </div>
    </section>

    <section class="main-panel" aria-label="JUEGO">
      <div class="mini-info">
        <div class="badge" id="roundBadge">RONDA 1</div>
        <div class="feedback" id="feedbackBox">ELIGE LA SÍLABA CORRECTA</div>
        <div class="badge" id="scoreBadge">ACIERTOS 0</div>
      </div>

      <div class="choices-wrap">
        <div class="choices-grid" id="choicesGrid" role="group" aria-label="OPCIONES">
          <!-- BOTONES DINÁMICOS -->
        </div>
        <div class="sparkles" id="sparklesLayer" aria-hidden="true"></div>
      </div>

      <div class="helper-note">TOCA UNA TARJETA GRANDE PARA RESPONDER</div>

      <div class="overlay-complete" id="completeOverlay" aria-hidden="true">
        <div class="complete-card">
          <h2 class="complete-title">¡MUY BIEN!</h2>
          <div class="complete-subtitle" id="completeText">HAS TERMINADO EL JUEGO</div>
          <div class="complete-actions">
            <button id="btnPlayAgain">JUGAR OTRA VEZ</button>
            <button id="btnBackOverlay">VOLVER</button>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer-bar" aria-label="BARRA INFERIOR">
      <div class="progress-label" id="progressLabel">PROGRESO 0 / 0</div>
      <div class="progress-wrap" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <button class="footer-btn restart" id="btnRestart">REINICIAR</button>
      <button class="footer-btn back" id="btnBack">VOLVER</button>
    </footer>
  </div>

  <script>
    (() => {
      "use strict";

      // LISTA EXACTA SEGÚN TU MENSAJE (INCLUYE "U")
      // SI QUIERES CAMBIAR "U" POR "SU", EDITA SOLO ESTA LISTA.
      const SYLLABLES = [
        "PA","PE","PI","PO","PU",
        "LA","LE","LI","LO","LU",
        "MA","ME","MI","MO","MU",
        "SA","SE","SI","SO","SU"
      ];

      const TOTAL_ROUNDS = SYLLABLES.length;
      const OPTIONS_PER_ROUND = 4;

      const state = {
        order: [],
        roundIndex: 0,
        target: "",
        choices: [],
        correctCount: 0,
        locked: false,
        finished: false
      };

      const els = {
        targetSyllable: document.getElementById("targetSyllable"),
        choicesGrid: document.getElementById("choicesGrid"),
        feedbackBox: document.getElementById("feedbackBox"),
        roundBadge: document.getElementById("roundBadge"),
        scoreBadge: document.getElementById("scoreBadge"),
        progressLabel: document.getElementById("progressLabel"),
        progressFill: document.getElementById("progressFill"),
        btnRestart: document.getElementById("btnRestart"),
        btnBack: document.getElementById("btnBack"),
        completeOverlay: document.getElementById("completeOverlay"),
        completeText: document.getElementById("completeText"),
        btnPlayAgain: document.getElementById("btnPlayAgain"),
        btnBackOverlay: document.getElementById("btnBackOverlay"),
        sparklesLayer: document.getElementById("sparklesLayer"),
        audioSuccess: document.getElementById("audioSuccess"),
        audioError: document.getElementById("audioError")
      };

      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function sampleUnique(source, count, exclude = []) {
        const excluded = new Set(exclude);
        const pool = source.filter(x => !excluded.has(x));
        return shuffle(pool).slice(0, count);
      }

      function safePlay(audioEl) {
        if (!audioEl) return;
        try {
          audioEl.pause();
          audioEl.currentTime = 0;
          const p = audioEl.play();
          if (p && typeof p.catch === "function") p.catch(() => {});
        } catch (_) {}
      }

      function setFeedback(message, type = "") {
        els.feedbackBox.textContent = message.toUpperCase();
        els.feedbackBox.classList.remove("good", "bad");
        if (type === "good") els.feedbackBox.classList.add("good");
        if (type === "bad") els.feedbackBox.classList.add("bad");
      }

      function updateHUD() {
        const roundShown = Math.min(state.roundIndex + 1, TOTAL_ROUNDS);
        els.roundBadge.textContent = `RONDA ${state.finished ? TOTAL_ROUNDS : roundShown}`;
        els.scoreBadge.textContent = `ACIERTOS ${state.correctCount}`;
        const completed = state.finished ? TOTAL_ROUNDS : state.roundIndex;
        els.progressLabel.textContent = `PROGRESO ${completed} / ${TOTAL_ROUNDS}`;
        const percent = (completed / TOTAL_ROUNDS) * 100;
        els.progressFill.style.width = `${percent}%`;
      }

      function createSparklesAround(targetEl) {
        const parentRect = els.choicesGrid.getBoundingClientRect();
        const rect = targetEl.getBoundingClientRect();
        const cx = rect.left - parentRect.left + rect.width / 2;
        const cy = rect.top - parentRect.top + rect.height / 2;

        const colors = [
          "rgba(255,255,255,0.95)",
          "rgba(255,236,171,0.95)",
          "rgba(214,247,255,0.95)",
          "rgba(197,255,227,0.95)"
        ];

        for (let i = 0; i < 10; i++) {
          const s = document.createElement("i");
          s.style.left = `${cx + (Math.random() * 80 - 40)}px`;
          s.style.top = `${cy + (Math.random() * 40 - 20)}px`;
          s.style.background = colors[Math.floor(Math.random() * colors.length)];
          s.style.animationDelay = `${Math.random() * 80}ms`;
          s.style.transform = `translateY(10px) scale(${0.6 + Math.random() * 0.7}) rotate(${Math.random()*60}deg)`;
          els.sparklesLayer.appendChild(s);
          setTimeout(() => s.remove(), 760);
        }
      }

      function buildChoices(target) {
        const distractors = sampleUnique(SYLLABLES, OPTIONS_PER_ROUND - 1, [target]);
        return shuffle([target, ...distractors]);
      }

      function renderRound() {
        state.locked = false;
        state.finished = false;
        state.target = state.order[state.roundIndex];
        state.choices = buildChoices(state.target);

        els.targetSyllable.textContent = state.target;
        els.choicesGrid.innerHTML = "";
        els.completeOverlay.classList.remove("show");
        els.completeOverlay.setAttribute("aria-hidden", "true");

        state.choices.forEach(choice => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "choice-btn";
          btn.textContent = choice;
          btn.setAttribute("aria-label", `SÍLABA ${choice}`);
          btn.dataset.value = choice;

          btn.addEventListener("pointerdown", () => {
            if (state.locked) return;
            btn.classList.add("pressing");
          });

          btn.addEventListener("pointerup", () => {
            btn.classList.remove("pressing");
          });

          btn.addEventListener("pointercancel", () => {
            btn.classList.remove("pressing");
          });

          btn.addEventListener("click", () => onChoice(btn));

          els.choicesGrid.appendChild(btn);
        });

        setFeedback("ELIGE LA SÍLABA CORRECTA");
        updateHUD();
      }

      function lockChoicesVisual(correctBtn, wrongBtn = null) {
        const buttons = [...els.choicesGrid.querySelectorAll(".choice-btn")];
        buttons.forEach(btn => {
          if (btn === correctBtn) {
            btn.classList.add("correct");
          } else if (wrongBtn && btn === wrongBtn) {
            btn.classList.add("wrong");
          } else {
            btn.classList.add("dim");
          }
          btn.disabled = true;
        });
      }

      function onChoice(btn) {
        if (state.locked || state.finished) return;
        state.locked = true;

        const value = btn.dataset.value;
        const isCorrect = value === state.target;
        const buttons = [...els.choicesGrid.querySelectorAll(".choice-btn")];
        const correctBtn = buttons.find(b => b.dataset.value === state.target);

        if (isCorrect) {
          state.correctCount += 1;
          lockChoicesVisual(correctBtn);
          setFeedback(`¡MUY BIEN! HAS TOCADO ${state.target}`, "good");
          safePlay(els.audioSuccess);
          if (correctBtn) createSparklesAround(correctBtn);

          setTimeout(nextRound, 700);
        } else {
          lockChoicesVisual(correctBtn, btn);
          setFeedback(`NO ES ${value}. TOCA ${state.target}`, "bad");
          safePlay(els.audioError);

          setTimeout(() => {
            // PERMITIMOS SEGUIR A LA SIGUIENTE RONDA TRAS MOSTRAR LA RESPUESTA CORRECTA
            nextRound();
          }, 950);
        }

        updateHUD();
      }

      function nextRound() {
        state.roundIndex += 1;

        if (state.roundIndex >= TOTAL_ROUNDS) {
          finishGame();
          return;
        }

        renderRound();
      }

      function finishGame() {
        state.finished = true;
        state.locked = true;
        updateHUD();
        els.progressLabel.textContent = `PROGRESO ${TOTAL_ROUNDS} / ${TOTAL_ROUNDS}`;
        els.progressFill.style.width = "100%";

        const score = state.correctCount;
        const total = TOTAL_ROUNDS;
        els.completeText.textContent = `HAS TERMINADO. ACIERTOS ${score} DE ${total}`;
        els.completeOverlay.classList.add("show");
        els.completeOverlay.setAttribute("aria-hidden", "false");

        if (score >= Math.ceil(total * 0.7)) {
          setFeedback("¡GENIAL! JUEGO TERMINADO", "good");
          safePlay(els.audioSuccess);
        } else {
          setFeedback("JUEGO TERMINADO. ¡VAMOS OTRA VEZ!", "");
        }
      }

      function startGame() {
        state.order = shuffle(SYLLABLES);
        state.roundIndex = 0;
        state.correctCount = 0;
        state.locked = false;
        state.finished = false;
        renderRound();
      }

      function goBack() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          // Fallback útil para GitHub Pages
          window.location.href = "./";
        }
      }

      // BOTONES
      els.btnRestart.addEventListener("click", startGame);
      els.btnBack.addEventListener("click", goBack);
      els.btnPlayAgain.addEventListener("click", startGame);
      els.btnBackOverlay.addEventListener("click", goBack);

      // INICIO
      startGame();
    })();
  </script>
<script src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script>
(function(){
  var _opts={folder:'svg',ext:'.svg'};
  function _p(el){try{twemoji.parse(el,_opts);}catch(e){}}
  if(document.readyState!=='loading')_p(document.body);
  else document.addEventListener('DOMContentLoaded',function(){_p(document.body);});
  new MutationObserver(function(ms){ms.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType===1)_p(n);else if(n.nodeType===3&&n.parentNode&&n.parentNode.nodeType===1)_p(n.parentNode);});});}).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>
