<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CORAZÓN</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    /* ── RESPONSIVE FIX ── */
    :root {
      --bottom-h: min(112px, 13vh);
    }

    /* HEADER */
    .top { padding: clamp(6px,1vh,12px) clamp(8px,1vw,12px); }
    .badge-title { font-size: clamp(13px,1.6vw,16px); }
    .badge-sub   { font-size: clamp(10px,1.2vw,13px); }
    .h1 { font-size: clamp(14px,1.8vw,22px); }
    .h2 { font-size: clamp(10px,1.2vw,14px); }
    .btn { font-size: clamp(11px,1.3vw,14px); padding: clamp(7px,1vh,10px) clamp(10px,1vw,14px); }

    /* MAIN */
    .main { height: calc(100% - clamp(46px,7vh,72px)); }

    /* ZONAS */
    .zones       { gap: clamp(6px,1vw,12px); }
    .zone        { padding: clamp(8px,1vh,12px); gap: clamp(4px,0.6vh,6px); }
    .zone-title  { font-size: clamp(14px,1.8vh,20px); }
    .zone-big    { font-size: clamp(38px,7vh,92px); margin-top: clamp(2px,0.5vh,6px); line-height: 1; }
    .zone-hint   { font-size: clamp(10px,1.3vh,14px); }
    .drop-area   { padding: clamp(6px,0.8vh,10px); gap: clamp(6px,0.8vh,10px); margin-top: clamp(4px,0.8vh,10px); }

    /* PANEL TARJETAS */
    .cards-panel  { padding: clamp(6px,0.8vh,10px); }
    .cards-title  { font-size: clamp(11px,1.4vh,16px); margin-bottom: clamp(4px,0.6vh,8px); }
    .cards        { gap: clamp(6px,0.8vh,10px); max-height: clamp(130px,22vh,210px); }

    /* TARJETAS */
    .card       { width: clamp(120px,15vw,185px); padding: clamp(6px,0.8vh,10px); border-radius: 14px; }
    .card-emoji { font-size: clamp(26px,4vh,44px); }
    .card-text  { font-size: clamp(11px,1.5vh,16px); margin-top: 4px; }
    .card-mini  { font-size: clamp(9px,1.1vh,12px); }

    /* TOAST */
    .toast { font-size: clamp(12px,1.8vh,17px) !important; padding: 8px 16px !important; top: 70px; }

    /* PANTALLA FINAL */
    .finish-card  { padding: clamp(16px,2.5vh,28px) clamp(14px,2vw,20px); }
    .finish-title { font-size: clamp(20px,3.5vh,28px); }
    .finish-text  { font-size: clamp(12px,1.6vh,15px); }

    @media (max-width: 900px) {
      .zones { grid-template-columns: 1fr 1fr; }
      .card  { width: calc(50% - 5px); min-width: 110px; }
    }
    @media (max-height: 700px) {
      .zone-big   { font-size: clamp(28px,5vh,55px); }
      .card-emoji { font-size: clamp(22px,3.5vh,36px); }
      .cards      { max-height: clamp(100px,18vh,150px); }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-left">
      <div class="badge">
        <div class="badge-title">CORAZÓN</div>
        <div class="badge-sub" id="counter">BUENAS: 0 DE 0</div>
      </div>
    </div>

    <div class="top-center">
      <div class="h1">ARRASTRA LO BUENO A BIEN</div>
      <div class="h2">LO QUE NO AYUDA, A MAL</div>
    </div>

    <div class="top-right">
      <button class="btn" id="btnReset" type="button">REINICIAR</button>
      <a class="btn btn-ghost" href="index.html">VOLVER</a>
    </div>
  </header>

  <main class="main" id="main">
    <div class="bg-scene"   aria-hidden="true"></div>
    <div class="bg-overlay" aria-hidden="true"></div>
    <div class="bg-animal"  aria-hidden="true"></div>

    <div class="decor decor-cloud cloud-1" aria-hidden="true"></div>
    <div class="decor decor-cloud cloud-2" aria-hidden="true"></div>
    <div class="decor decor-sticker s1"   aria-hidden="true">💖</div>
    <div class="decor decor-sticker s2"   aria-hidden="true">⭐</div>
    <div class="decor decor-sticker s3"   aria-hidden="true">💙</div>

    <section class="zones">
      <div class="zone zone-good" id="goodZone" aria-label="BIEN">
        <div class="zone-title">BIEN</div>
        <div class="zone-big">❤️</div>
        <div class="zone-hint">AQUÍ VAN LAS BUENAS</div>
        <div class="drop-area" id="goodDrop"></div>
      </div>

      <div class="zone zone-bad" id="badZone" aria-label="MAL">
        <div class="zone-title">MAL</div>
        <div class="zone-big">❌</div>
        <div class="zone-hint">AQUÍ VAN LAS QUE NO AYUDAN</div>
        <div class="drop-area" id="badDrop"></div>
      </div>
    </section>

    <section class="cards-panel" aria-label="TARJETAS">
      <div class="cards-title">TARJETAS</div>
      <div class="cards" id="cards"></div>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <div class="finish" id="finish" aria-hidden="true">
      <div class="finish-card">
        <div class="finish-title">¡GENIAL!</div>
        <div class="finish-text">HAS CUIDADO EL CORAZÓN</div>
        <div class="finish-actions">
          <a class="btn btn-good" href="index.html">VOLVER AL MENÚ</a>
          <button class="btn" id="btnAgain" type="button">JUGAR OTRA VEZ</button>
        </div>
      </div>
    </div>

    <audio id="sndClap" preload="none" data-src="/asstests/aplausos.mp4"></audio>
    <audio id="sndOhh"  preload="none" data-src="/asstests/ohh.mp4"></audio>
  </main>

  <script src="./game.js" defer></script>
</body>
</html>
