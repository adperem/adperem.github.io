<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CORAZÓN: SEMÁFORO</title>
  <style>

    :root{
      --panel-bg: rgba(255,255,255,0.88);
      --panel-border: rgba(255,255,255,0.9);
      --shadow: 0 18px 45px rgba(0,0,0,0.18);
      --shadow-soft: 0 10px 25px rgba(0,0,0,0.14);
      --radius-xl: 28px;
      --ink: #1f2a37;
      --muted: #3b556f;
      --accent: rgba(124,58,237,1);
      --accent2: rgba(6,182,212,1);
      --good: rgba(34,197,94,1);
      --bad: rgba(239,68,68,1);
      --bottom-h: 112px;
    }

    *{ box-sizing: border-box; }
    html, body{
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      background: #0b1220;
    }

    body::before{
      content: "";
      position: fixed;
      inset: -40px;
      background-image: url("assets/fondo_parque.webp");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      filter: blur(14px) saturate(1.2);
      transform: scale(1.08);
      z-index: -2;
    }
    body::after{
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
      z-index: -1;
    }

    .stage{
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }
    .frame{
      width: min(1920px, 100vw);
      height: min(1080px, 100vh);
      position: relative;
      border-radius: 34px;
      overflow: hidden;
    }

    .cloud{
      position: absolute;
      width: 280px;
      height: 120px;
      background: rgba(255,255,255,0.70);
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
      border: 2px solid rgba(255,255,255,0.6);
      opacity: 0.9;
      pointer-events: none;
    }
    .cloud::before, .cloud::after{
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.72);
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.55);
    }
    .cloud::before{ width: 120px; height: 90px; left: 40px; top: -28px; }
    .cloud::after { width: 150px; height: 105px; left: 120px; top: -38px; }
    .cloud.c1{ left: 24px; top: 24px; transform: rotate(-2deg); }
    .cloud.c2{ right: 24px; top: 56px; transform: rotate(3deg) scale(0.95); }

    .sticker{
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 30px;
      background: rgba(255,255,255,0.62);
      box-shadow: var(--shadow-soft);
      border: 2px dashed rgba(255,255,255,0.65);
      display: grid;
      place-items: center;
      font-size: 60px;
      pointer-events: none;
      opacity: 0.9;
    }
    .st1{ left: 32px; bottom: calc(var(--bottom-h) + 18px); transform: rotate(-8deg); }
    .st2{ right: 38px; bottom: calc(var(--bottom-h) + 26px); transform: rotate(10deg); }
    .st3{ left: 260px; top: 54px; transform: rotate(7deg) scale(0.85); opacity: 0.85; }

    .header{
      position: absolute;
      left: 22px;
      right: 22px;
      top: 18px;
      padding: 14px 16px;
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.78);
      border: 2px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .title{
      font-size: 42px;
      font-weight: 1000;
      letter-spacing: 1px;
      line-height: 1.05;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }
    .hint{
      font-size: 20px;
      font-weight: 950;
      color: var(--muted);
      text-transform: uppercase;
      text-align: right;
      line-height: 1.1;
    }
    .badge{
      font-size: 18px;
      font-weight: 1000;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(124,58,237,0.12);
      border: 2px solid rgba(124,58,237,0.28);
      color: #3b2a8f;
      text-transform: uppercase;
      white-space: nowrap;
      min-width: 140px;
      text-align: center;
    }

    .toast{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 20px;
      border-radius: 22px;
      background: rgba(255,255,255,0.92);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow);
      font-size: 34px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 60;
      text-align: center;
      max-width: 86%;
    }
    .toast.show{
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.02);
    }
    .toast.good{ background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.28); color: #14532d; }
    .toast.bad{ background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.28); color: #7f1d1d; }

    .confetti{
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 55;
    }
    .confetti i{
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 4px;
      opacity: 0;
      animation: fall 900ms ease-out forwards;
    }
    @keyframes fall{
      0%{ transform: translateY(0) rotate(0deg) scale(0.9); opacity: 0; }
      10%{ opacity: 1; }
      100%{ transform: translateY(420px) rotate(360deg) scale(1.0); opacity: 0; }
    }

    .overlay{
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 80;
    }
    .overlay.show{
      opacity: 1;
      pointer-events: auto;
    }
    .modal{
      width: min(980px, 92%);
      border-radius: 30px;
      background: rgba(255,255,255,0.92);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow);
      padding: 22px 22px 18px 22px;
      text-align: center;
    }
    .modal h2{
      margin: 0 0 10px 0;
      font-size: 46px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .modal p{
      margin: 0 0 16px 0;
      font-size: 26px;
      font-weight: 950;
      text-transform: uppercase;
      color: #334155;
      line-height: 1.2;
    }
    .startBtn{
      height: 94px;
      width: 100%;
      border-radius: 24px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(124,58,237,0.14);
      color: #2f1d78;
      font-size: 34px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .startBtn:active{ transform: translateY(1px); }

    .bottomBar{
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--bottom-h);
      padding: 14px 18px;
      background: rgba(255,255,255,0.90);
      border-top: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 -18px 45px rgba(0,0,0,0.16);
      display: grid;
      grid-template-columns: 1fr 1fr 1.2fr;
      gap: 14px;
      align-items: center;
    }
    .btn{
      height: 78px;
      border-radius: 22px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(255,255,255,0.92);
      font-size: 28px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1f2a37;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 18px;
    }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      background: rgba(124,58,237,0.14);
      border-color: rgba(124,58,237,0.26);
      color: #2f1d78;
    }
    .btn.secondary{
      background: rgba(6,182,212,0.12);
      border-color: rgba(6,182,212,0.22);
      color: #0b5563;
    }
    .statusBox{
      height: 78px;
      border-radius: 22px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(255,255,255,0.92);
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      padding: 8px 14px;
      gap: 6px;
    }
    .statusTop{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 18px;
      font-weight: 1000;
      text-transform: uppercase;
      color: #334155;
    }
    .statusValue{
      font-size: 26px;
      font-weight: 1000;
      text-transform: uppercase;
      color: #111827;
      letter-spacing: 0.6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 1400px){
      .title{ font-size: 34px; }
      .hint{ font-size: 16px; }
    }


    .main{
      position: absolute;
      left: 22px;
      right: 22px;
      top: 112px;
      bottom: calc(var(--bottom-h) + 18px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .panel{
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .instruction{
      border-radius: 22px;
      background: rgba(255,255,255,0.74);
      border: 2px solid rgba(0,0,0,0.07);
      box-shadow: var(--shadow-soft);
      padding: 14px 16px;
      display: grid;
      align-content: center;
      gap: 6px;
      text-align: center;
      min-height: 92px;
    }
    .instruction .big{
      font-size: 34px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #22314a;
      line-height: 1.1;
    }
    .instruction .small{
      font-size: 18px;
      font-weight: 950;
      text-transform: uppercase;
      color: #334155;
      opacity: 0.94;
      line-height: 1.15;
    }

    .center{
      width: 100%;
      height: 100%;
      border-radius: 26px;
      background: rgba(255,255,255,0.62);
      border: 2px solid rgba(0,0,0,0.06);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.45);
      overflow: hidden;
      position: relative;
      padding: 14px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
    }

    .scene{
      border-radius: 28px;
      background: rgba(255,255,255,0.95);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: 0 16px 34px rgba(0,0,0,0.16);
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      overflow: hidden;
    }
    .sceneTitle{
      font-size: 28px;
      font-weight: 1000;
      text-transform: uppercase;
      color: #22314a;
      letter-spacing: 0.8px;
      text-align: center;
    }
    .sceneEmoji{
      font-size: 150px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 12px 14px rgba(0,0,0,0.10));
    }
    .sceneHint{
      font-size: 20px;
      font-weight: 950;
      text-transform: uppercase;
      color: #334155;
      text-align: center;
      opacity: 0.92;
      line-height: 1.15;
    }

    .buttons{
      border-radius: 28px;
      background: rgba(255,255,255,0.95);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: 0 16px 34px rgba(0,0,0,0.16);
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr 1fr auto;
      gap: 14px;
      align-items: center;
    }
    .question{
      font-size: 26px;
      font-weight: 1000;
      text-transform: uppercase;
      text-align: center;
      color: #111827;
      letter-spacing: 0.8px;
      line-height: 1.1;
      padding: 12px 12px;
      border-radius: 20px;
      background: rgba(124,58,237,0.08);
      border: 2px solid rgba(124,58,237,0.14);
    }

    .bigBtn{
      height: 120px;
      width: 100%;
      border-radius: 26px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(255,255,255,0.92);
      font-size: 34px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1f2a37;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 0 18px;
    }
    .bigBtn:active{ transform: translateY(1px); }
    .bigBtn.fast{
      background: rgba(239,68,68,0.14);
      border-color: rgba(239,68,68,0.26);
      color: #7f1d1d;
    }
    .bigBtn.slow{
      background: rgba(34,197,94,0.14);
      border-color: rgba(34,197,94,0.26);
      color: #14532d;
    }

    .heartBeat{
      height: 92px;
      border-radius: 22px;
      background: rgba(255,255,255,0.85);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      display: grid;
      grid-template-columns: 120px 1fr;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
    }
    .heartBeat .heart{
      font-size: 54px;
      display: grid;
      place-items: center;
    }
    .heartBeat .text{
      font-size: 22px;
      font-weight: 1000;
      text-transform: uppercase;
      color: #22314a;
    }
    .pulseFast .heart{ animation: pulse 420ms ease-in-out infinite; }
    .pulseSlow .heart{ animation: pulse 820ms ease-in-out infinite; }
    @keyframes pulse{
      0%{ transform: scale(1); }
      50%{ transform: scale(1.18); }
      100%{ transform: scale(1); }
    }

    @media (max-width: 1400px){
      .sceneEmoji{ font-size: 130px; }
      .bigBtn{ font-size: 28px; height: 108px; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="frame" id="frame">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="sticker st1">❤️</div>
      <div class="sticker st2">🚦</div>
      <div class="sticker st3">☁️</div>

      <header class="header">
        <div class="title"><span style="font-size:46px">❤️</span> CORAZÓN: SEMÁFORO</div>
        <div class="hint">
          ¿LATE RÁPIDO O LENTO?
          <div style="font-size:16px; font-weight:1000; opacity:0.9;">TOCA EL BOTÓN CORRECTO</div>
        </div>
        <div class="badge" id="badge">LISTO</div>
      </header>

      <main class="main">
        <section class="panel">
          <div class="instruction">
            <div class="big" id="instBig">TOCA EMPEZAR</div>
            <div class="small" id="instSmall">ELIGE RÁPIDO O LENTO</div>
          </div>
        </section>

        <section class="panel">
          <div class="center">
            <div class="scene">
              <div class="sceneTitle" id="sceneTitle">CORRER</div>
              <div class="sceneEmoji" id="sceneEmoji">🏃‍♂️</div>
              <div class="sceneHint" id="sceneHint">CUANDO CORREMOS, EL CORAZÓN VA MÁS...</div>
            </div>

            <div class="buttons">
              <div class="question">¿CÓMO LATE?</div>
              <button class="bigBtn fast" id="btnFast">RÁPIDO 💨</button>
              <button class="bigBtn slow" id="btnSlow">LENTO 🌙</button>

              <div class="heartBeat pulseSlow" id="beatBox">
                <div class="heart" id="heart">❤️</div>
                <div class="text" id="beatText">LATIDO: LENTO</div>
              </div>
            </div>

            <div class="confetti" id="confetti"></div>
            <div class="toast" id="toast"></div>

            <div class="overlay show" id="overlay">
              <div class="modal">
                <h2>¿LISTO?</h2>
                <p>MIRA LA ACCIÓN Y ELIGE SI EL CORAZÓN LATE RÁPIDO O LENTO</p>
                <button class="startBtn" id="btnStart">EMPEZAR</button>
              </div>
            </div>
          </div>
        </section>
      </main>

      <div class="bottomBar" aria-label="Barra inferior">
        <button class="btn primary" id="btnReset">REINICIAR</button>
        <button class="btn secondary" id="btnBack">VOLVER</button>
        <div class="statusBox" role="status" aria-live="polite">
          <div class="statusTop">
            <span>ESTADO</span>
            <span id="miniRight">ACIERTOS: 0</span>
          </div>
          <div class="statusValue" id="statusText">TOCA EMPEZAR</div>
        </div>
      </div>

      <audio id="sndOk" src="/asstests/aplausos.mp4" preload="auto"></audio>
      <audio id="sndBad" src="/asstests/ohh.mp4" preload="auto"></audio>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      var overlay = document.getElementById("overlay");
      var btnStart = document.getElementById("btnStart");
      var btnReset = document.getElementById("btnReset");
      var btnBack = document.getElementById("btnBack");

      var btnFast = document.getElementById("btnFast");
      var btnSlow = document.getElementById("btnSlow");

      var instBig = document.getElementById("instBig");
      var instSmall = document.getElementById("instSmall");
      var badge = document.getElementById("badge");
      var toast = document.getElementById("toast");
      var confetti = document.getElementById("confetti");
      var statusText = document.getElementById("statusText");
      var miniRight = document.getElementById("miniRight");

      var sceneTitle = document.getElementById("sceneTitle");
      var sceneEmoji = document.getElementById("sceneEmoji");
      var sceneHint = document.getElementById("sceneHint");

      var beatBox = document.getElementById("beatBox");
      var beatText = document.getElementById("beatText");

      var sndOk = document.getElementById("sndOk");
      var sndBad = document.getElementById("sndBad");

      var started = false;
      var allow = false;
      var correct = 0;

      var scenes = [
        { id:"CORRER", emoji:"🏃‍♂️", hint:"CUANDO CORREMOS, EL CORAZÓN VA MÁS...", answer:"RAPIDO" },
        { id:"DORMIR", emoji:"😴", hint:"CUANDO DORMIMOS, EL CORAZÓN VA MÁS...", answer:"LENTO" },
        { id:"SUBIR ESCALERAS", emoji:"🪜", hint:"CUANDO SUBIMOS, EL CORAZÓN VA MÁS...", answer:"RAPIDO" },
        { id:"VER LA TV", emoji:"📺", hint:"CUANDO DESCANSAMOS, EL CORAZÓN VA MÁS...", answer:"LENTO" },
        { id:"SALTAR", emoji:"🤸", hint:"CUANDO SALTAMOS, EL CORAZÓN VA MÁS...", answer:"RAPIDO" },
        { id:"RESPIRAR TRANQUILO", emoji:"🌬️", hint:"CUANDO ESTAMOS TRANQUILOS, VA MÁS...", answer:"LENTO" }
      ];

      var current = null;

      function setStatus(t){ statusText.textContent = t; }

      function showToast(text, kind){
        toast.textContent = text;
        toast.className = "toast show " + (kind || "");
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(function(){
          toast.className = "toast";
        }, 650);
      }

      function playSound(ok){
        try{
          var a = ok ? sndOk : sndBad;
          a.currentTime = 0;
          a.play();
        }catch(e){}
      }

      function popConfetti(count){
        confetti.innerHTML = "";
        var n = count || 18;
        var colors = [
          "rgba(124,58,237,0.9)",
          "rgba(6,182,212,0.9)",
          "rgba(34,197,94,0.9)",
          "rgba(251,191,36,0.9)",
          "rgba(255,255,255,0.9)"
        ];
        var rect = document.getElementById("frame").getBoundingClientRect();
        for(var i=0;i<n;i++){
          var piece = document.createElement("i");
          var x = rect.width*0.5 + (Math.random()*260 - 130);
          var y = rect.height*0.40 + (Math.random()*70 - 35);
          piece.style.left = x + "px";
          piece.style.top = y + "px";
          piece.style.background = colors[Math.floor(Math.random()*colors.length)];
          piece.style.transform = "translateY(0) rotate(" + (Math.random()*60) + "deg)";
          piece.style.animationDelay = (Math.random()*120) + "ms";
          confetti.appendChild(piece);
        }
        window.setTimeout(function(){ confetti.innerHTML = ""; }, 980);
      }

      function updateBeat(mode){
        beatBox.classList.remove("pulseFast", "pulseSlow");
        if(mode === "RAPIDO"){
          beatBox.classList.add("pulseFast");
          beatText.textContent = "LATIDO: RÁPIDO";
        }else{
          beatBox.classList.add("pulseSlow");
          beatText.textContent = "LATIDO: LENTO";
        }
      }

      function pickNew(){
        current = scenes[Math.floor(Math.random()*scenes.length)];
        sceneTitle.textContent = current.id;
        sceneEmoji.textContent = current.emoji;
        sceneHint.textContent = current.hint;
        badge.textContent = "LISTO";
        allow = true;
        setStatus("ELIGE RÁPIDO O LENTO");
        updateBeat("LENTO");
      }

      function answer(choice){
        if(!started || !allow || !current) return;
        allow = false;

        updateBeat(choice);

        if(choice === current.answer){
          correct += 1;
          miniRight.textContent = "ACIERTOS: " + correct;
          playSound(true);
          popConfetti(18);
          showToast("¡BIEN!", "good");
          badge.textContent = "CORRECTO";
          setStatus("¡GENIAL!");
          window.setTimeout(function(){
            pickNew();
          }, 800);
        }else{
          playSound(false);
          showToast("INTENTA OTRA VEZ", "bad");
          badge.textContent = "UPS";
          setStatus("PRUEBA DE NUEVO");
          allow = true;
        }
      }

      function reset(){
        started = false;
        allow = false;
        correct = 0;
        miniRight.textContent = "ACIERTOS: 0";
        badge.textContent = "LISTO";
        instBig.textContent = "TOCA EMPEZAR";
        instSmall.textContent = "ELIGE RÁPIDO O LENTO";
        setStatus("TOCA EMPEZAR");
        updateBeat("LENTO");
        overlay.classList.add("show");
      }

      function goBack(){
        var ok = false;
        try{
          if(document.referrer) ok = (new URL(document.referrer)).origin === location.origin;
        }catch(e){ ok = false; }
        if(ok) history.back();
        else location.href = "index.html";
      }

      btnStart.addEventListener("click", function(){
        overlay.classList.remove("show");
        started = true;
        instBig.textContent = "¿CÓMO LATE?";
        instSmall.textContent = "ELIGE EL BOTÓN CORRECTO";
        pickNew();
      });

      btnFast.addEventListener("click", function(){ answer("RAPIDO"); });
      btnSlow.addEventListener("click", function(){ answer("LENTO"); });

      btnReset.addEventListener("click", function(){ reset(); });
      btnBack.addEventListener("click", function(){ goBack(); });

      reset();
    })();
  </script>
</body>
</html>
