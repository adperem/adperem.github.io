<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CEREBRO · SÍLABAS</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    /* MEJORAS EXTRA */

    /* Barra de progreso */
    .progress-wrap { padding: 0 14px 6px; }
    .progress-track {
      height: 12px; background: rgba(255,255,255,0.55);
      border-radius: 999px; border: 2px solid rgba(255,255,255,0.9);
      overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.07);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #a8edea, #6ee7b7, #86efac);
      border-radius: 999px;
      transition: width 0.55s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* Emoji animado */
    .emoji.anim { animation: emojiPop 0.45s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes emojiPop {
      0%   { transform: scale(0.3) rotate(-15deg); opacity: 0; }
      100% { transform: scale(1)   rotate(0deg);   opacity: 1; }
    }
    /* Pic: layout horizontal palabra+emoji */
    .pic {
      width: min(560px, 94vw) !important;
      height: auto !important;
      flex-direction: row !important;
      gap: 24px !important;
      padding: 24px 32px !important;
    }

    /* Opciones hover + entrada */
    .opt {
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.15s, background 0.15s;
      animation: optIn 0.38s cubic-bezier(0.34,1.56,0.64,1) backwards;
    }
    @keyframes optIn {
      0%   { transform: scale(0.65) translateY(14px); opacity: 0; }
      100% { transform: scale(1)    translateY(0);    opacity: 1; }
    }
    .opt:hover:not(.disabled) {
      transform: translateY(-5px) scale(1.06);
      box-shadow: 0 16px 34px rgba(0,0,0,0.14);
      background: linear-gradient(180deg, #f0f9ff, #dbeafe);
      border-color: #7dd3fc;
    }
    .opt:active:not(.disabled) { transform: scale(0.93); }
    .opt.good {
      animation: correctBounce 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards !important;
      box-shadow: 0 14px 36px rgba(143,240,184,0.55) !important;
    }
    @keyframes correctBounce {
      0%  { transform: scale(1); }
      40% { transform: scale(1.18) rotate(4deg); }
      70% { transform: scale(0.98) rotate(-1deg); }
      100%{ transform: scale(1.06); }
    }

    /* Toast con slide-in */
    .toast {
      transform: translateX(-50%) translateY(-18px);
      transition: opacity 0.2s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      font-size: 18px !important;
    }
    .toast.on { transform: translateX(-50%) translateY(0); }

    /* Confeti */
    .confetti-layer { position:fixed; inset:0; pointer-events:none; z-index:200; overflow:hidden; }
    .cp {
      position: absolute;
      animation: cpFall linear forwards;
    }
    @keyframes cpFall {
      0%  { opacity:1; transform: translateY(-20px) rotate(0deg); }
      85% { opacity:1; }
      100%{ opacity:0; transform: translateY(110vh) rotate(800deg); }
    }

    /* Finish animado */
    .finish-card { animation: finishPop 0.5s cubic-bezier(0.34,1.56,0.64,1) !important; }
    @keyframes finishPop {
      0%  { transform: scale(0.4) rotate(-8deg); opacity:0; }
      100%{ transform: scale(1)   rotate(0deg);  opacity:1; }
    }
    .finish-stars { font-size:52px; display:block; margin-bottom:8px; animation: starSpin 0.65s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes starSpin {
      0%  { transform: scale(0) rotate(-200deg); }
      100%{ transform: scale(1) rotate(0deg); }
    }
    .finish-score { font-size:16px; font-weight:900; color:#16a34a; margin-top:6px; }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-left">
      <div class="badge">
        <div class="badge-title">🧠 CEREBRO</div>
        <div class="badge-sub" id="progress">1 DE 12</div>
      </div>
    </div>
    <div class="top-center">
      <div class="h1">TOCA LA SÍLABA CORRECTA</div>
      <div class="h2">MIRA LA IMAGEN Y ELIGE LA SÍLABA DEL INICIO</div>
    </div>
    <div class="top-right">
      <button class="btn" id="btnReset" type="button">🔄 REINICIAR</button>
      <a class="btn btn-ghost" href="index.html">← VOLVER</a>
    </div>
  </header>

  <!-- NUEVA: barra de progreso -->
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <main class="main" id="main">
    <div class="bg-scene" aria-hidden="true"></div>
    <div class="bg-overlay" aria-hidden="true"></div>
    <div class="bg-animal" aria-hidden="true"></div>
    <div class="decor cloud c1" aria-hidden="true"></div>
    <div class="decor cloud c2" aria-hidden="true"></div>
    <div class="decor sticker s1" aria-hidden="true">🧠</div>
    <div class="decor sticker s2" aria-hidden="true">⭐</div>
    <div class="decor sticker s3" aria-hidden="true">💖</div>

    <section class="panel">
      <div class="panel-title">¿QUÉ SÍLABA ES?</div>
      <div class="card">
        <div class="pic">
          <div class="pic-emoji-wrap">
            <div class="emoji" id="emoji">🧠</div>
          </div>
          <div class="word-label" id="wordLabel"></div>
        </div>
        <div class="hint" id="hint">TOCA LA SÍLABA</div>
        <div class="options" id="options" aria-label="OPCIONES"></div>
      </div>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <div class="finish" id="finish" aria-hidden="true">
      <div class="finish-card">
        <span class="finish-stars">🌟⭐🌟</span>
        <div class="finish-title">¡GENIAL!</div>
        <div class="finish-text">HAS COMPLETADO EL CEREBRO</div>
        <div class="finish-score" id="finishScore"></div>
        <div class="finish-actions">
          <a class="btn btn-good" href="index.html">🏠 MENÚ</a>
          <button class="btn" id="btnAgain" type="button">🔄 OTRA VEZ</button>
        </div>
      </div>
    </div>

    <audio id="sndClap" preload="none" data-src="/asstests/aplausos.mp4"></audio>
    <audio id="sndOhh"  preload="none" data-src="/asstests/ohh.mp4"></audio>
  </main>

  <!-- NUEVA: capa de confeti fuera de main -->
  <div class="confetti-layer" id="confettiLayer"></div>

  <script src="./game.js" defer></script>
<script src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script>
(function(){
  var _opts={folder:'svg',ext:'.svg'};
  function _p(el){try{twemoji.parse(el,_opts);}catch(e){}}
  if(document.readyState!=='loading')_p(document.body);
  else document.addEventListener('DOMContentLoaded',function(){_p(document.body);});
  new MutationObserver(function(ms){ms.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType===1)_p(n);else if(n.nodeType===3&&n.parentNode&&n.parentNode.nodeType===1)_p(n.parentNode);});});}).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>
</body>
</html>
