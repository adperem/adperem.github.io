<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CEREBRO</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="top">
    <div class="top-left">
      <div class="badge">
        <div class="badge-title">CEREBRO</div>
        <div class="badge-sub" id="progress">1 DE 12</div>
      </div>
    </div>

    <div class="top-center">
      <div class="h1">TOCA LA SÍLABA CORRECTA</div>
      <div class="h2">MIRA LA IMAGEN Y ELIGE LA SÍLABA DEL INICIO</div>
    </div>

    <div class="top-right">
      <button class="btn" id="btnReset" type="button">REINICIAR</button>
      <a class="btn btn-ghost" href="index.html">VOLVER</a>
    </div>
  </header>

  <main class="main" id="main">
    <div class="bg-scene" aria-hidden="true"></div>
    <div class="bg-overlay" aria-hidden="true"></div>
    <div class="bg-animal" aria-hidden="true"></div>

    <div class="decor cloud c1" aria-hidden="true"></div>
    <div class="decor cloud c2" aria-hidden="true"></div>
    <div class="decor sticker s1" aria-hidden="true">🧠</div>
    <div class="decor sticker s2" aria-hidden="true">⭐</div>
    <div class="decor sticker s3" aria-hidden="true">💖</div>

    <section class="panel">
      <div class="panel-title">¿QUÉ SÍLABA ES?</div>

      <div class="card">
        <div class="pic">
          <img id="img" alt=""  src="assets/placeholder.png" />
          <div class="emoji" id="emoji">🧠</div>
        </div>

        <div class="hint" id="hint">TOCA LA SÍLABA</div>

        <div class="options" id="options" aria-label="OPCIONES"></div>
      </div>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <div class="finish" id="finish" aria-hidden="true">
      <div class="finish-card">
        <div class="finish-title">¡GENIAL!</div>
        <div class="finish-text">HAS COMPLETADO EL CEREBRO</div>
        <div class="finish-actions">
          <a class="btn btn-good" href="index.html">VOLVER AL MENÚ</a>
          <button class="btn" id="btnAgain" type="button">JUGAR OTRA VEZ</button>
        </div>
      </div>
    </div>

    <audio id="sndClap" preload="none" data-src="/asstests/aplausos.mp4" ></audio>
    <audio id="sndOhh" preload="none" data-src="/asstests/ohh.mp4" ></audio>
  </main>

  <script src="./game.js" defer></script>
</body>
</html>
