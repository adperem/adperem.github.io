<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CEREBRO · LECTOESCRITURA</title>
  <link rel="stylesheet" href="cerebro_bolsas_styles.css" />
  <style>
    /* Una sola sección que ocupa todo el espacio */
    .content {
      grid-template-rows: 1fr !important;
    }

    /* Panel interior: fila → sílaba a la izquierda, canvas a la derecha */
    .activity-inner {
      height: 100%;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 24px;
      padding: 4px 0;
    }

    /* ── Columna izquierda: sílaba + pista ── */
    .syl-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .syllable-pill {
      font-size: clamp(56px, 9vw, 108px);
      font-weight: 1000;
      letter-spacing: 8px;
      background: linear-gradient(180deg, #ffffff, #dbeafe);
      border: 4px solid #93c5fd;
      border-radius: 28px;
      padding: 16px 52px;
      box-shadow: 0 14px 36px rgba(96,165,250,0.25);
      min-width: 200px;
      text-align: center;
      animation: syllableIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes syllableIn {
      0%   { transform: scale(0.55) rotate(-6deg); opacity: 0; }
      100% { transform: scale(1)    rotate(0deg);  opacity: 1; }
    }

    .round-label {
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.5px;
      color: #64748b;
    }

    .btn-hint {
      background: linear-gradient(180deg, #fffbe8, #fff3c4) !important;
      border-color: #fde68a !important;
      font-size: 16px !important;
    }

    /* Pista revelada */
    .hint-area {
      font-size: 16px;
      font-weight: 900;
      color: #92400e;
      text-align: center;
      max-width: 220px;
      letter-spacing: 1px;
      min-height: 24px;
      line-height: 1.3;
    }
    .hint-area.visible { animation: hintIn 0.3s ease; }
    @keyframes hintIn {
      0%   { opacity: 0; transform: translateY(-6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .hl {
      color: #1d4ed8;
      background: #dbeafe;
      border-radius: 5px;
      padding: 1px 4px;
    }

    /* ── Columna derecha: canvas + botones ── */
    .draw-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .canvas-wrap {
      flex: 1;
      position: relative;
      border: 4px solid #d8ecff;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.09);
      overflow: hidden;
      cursor: crosshair;
    }
    /* Líneas de pauta tenues (solo decorativas) */
    .canvas-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        180deg,
        transparent,
        transparent calc(25% - 1px),
        rgba(147,197,253,0.25) calc(25% - 1px),
        rgba(147,197,253,0.25) 25%
      );
      pointer-events: none;
      border-radius: 16px;
    }

    #drawCanvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* Fila de botones debajo del canvas */
    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn-clear {
      background: linear-gradient(180deg, #fff0f0, #ffd8d8) !important;
      border-color: #fca5a5 !important;
      font-size: 16px !important;
    }
    .btn-next {
      background: linear-gradient(180deg, #e8fff1, #bfffd9) !important;
      border-color: #6ee7b7 !important;
      font-size: 18px !important;
      min-width: 200px !important;
      font-weight: 1000 !important;
    }

    /* ── Responsive: en pantallas pequeñas apila verticalmente ── */
    @media (max-width: 700px) {
      .activity-inner {
        flex-direction: column;
        gap: 14px;
      }
      .syl-col {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }
      .syllable-pill {
        font-size: clamp(44px, 12vw, 72px);
        padding: 12px 32px;
        min-width: 0;
      }
      .draw-col {
        flex: 1 1 180px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="bg-scene"   aria-hidden="true"></div>
    <div class="bg-overlay" aria-hidden="true"></div>
    <div class="bg-animal"  aria-hidden="true"></div>

    <div class="decor cloud c1" aria-hidden="true"></div>
    <div class="decor cloud c2" aria-hidden="true"></div>
    <div class="decor sticker s1" aria-hidden="true">🧠</div>
    <div class="decor sticker s2" aria-hidden="true">⭐</div>
    <div class="decor sticker s3" aria-hidden="true">💖</div>

    <section class="content" aria-label="CONTENIDO">
      <section class="panel" aria-label="ACTIVIDAD">
        <div class="panel-title">ESCRIBE UNA PALABRA QUE TENGA ESTA SÍLABA</div>

        <div class="activity-inner">

          <!-- Columna izquierda: sílaba + pista -->
          <div class="syl-col">
            <div class="syllable-pill" id="syllable">MA</div>
            <div class="round-label"   id="roundLabel">1 DE 10</div>
            <button class="btn btn-hint" id="btnHint" type="button">💡 PISTA</button>
            <div class="hint-area" id="hintArea"></div>
          </div>

          <!-- Columna derecha: zona de dibujo + botones -->
          <div class="draw-col">
            <div class="canvas-wrap" id="canvasWrap">
              <canvas id="drawCanvas"></canvas>
            </div>
            <div class="btn-row">
              <button class="btn btn-clear" id="btnClear" type="button">🗑️ BORRAR</button>
              <button class="btn btn-next"  id="btnNext"  type="button">SIGUIENTE ▶</button>
            </div>
          </div>

        </div>
      </section>
    </section>

    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <!-- Pantalla final -->
    <div class="finish" id="finish" aria-hidden="true">
      <div class="finish-card">
        <div class="finish-stars">🌟⭐🌟</div>
        <div class="finish-title">¡GENIAL!</div>
        <div class="finish-text">HAS COMPLETADO ESTA ACTIVIDAD</div>
        <div class="finish-actions">
          <a    class="btn btn-good" href="index.html">VOLVER AL MENÚ</a>
          <button class="btn" id="btnAgain" type="button">JUGAR OTRA VEZ</button>
        </div>
      </div>
    </div>

    <!-- Barra inferior -->
    <footer class="bottomBar" aria-label="BARRA INFERIOR">
      <div class="bb-left">
        <div class="pill">CEREBRO</div>
        <div class="pill" id="counter">0 DE 10</div>
      </div>
      <div class="bb-right">
        <button class="btn"           id="btnReset" type="button">REINICIAR</button>
        <a      class="btn btn-ghost" href="index.html">VOLVER</a>
      </div>
    </footer>

    <audio id="sndClap" preload="none" data-src="/asstests/aplausos.mp4"></audio>
    <div class="confetti-container" id="confettiContainer"></div>
  </main>

  <script src="lectoescritura_game.js" defer></script>
  <script src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <script>
  (function(){
    var _opts={folder:'svg',ext:'.svg'};
    function _p(el){try{twemoji.parse(el,_opts);}catch(e){}}
    if(document.readyState!=='loading')_p(document.body);
    else document.addEventListener('DOMContentLoaded',function(){_p(document.body);});
    new MutationObserver(function(ms){ms.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType===1)_p(n);else if(n.nodeType===3&&n.parentNode&&n.parentNode.nodeType===1)_p(n.parentNode);});});}).observe(document.documentElement,{childList:true,subtree:true});
  })();
  </script>
</body>
</html>
