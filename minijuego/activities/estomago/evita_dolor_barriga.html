<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVITA EL DOLOR DE BARRIGA</title>
  <style>
    :root{
      --panel-bg: rgba(255,255,255,0.88);
      --panel-border: rgba(255,255,255,0.9);
      --shadow: 0 18px 45px rgba(0,0,0,0.18);
      --shadow-soft: 0 10px 25px rgba(0,0,0,0.14);
      --radius-xl: 28px;
      --ink: #1f2a37;
      --muted: #3b556f;
      --bottom-h: min(112px, 13vh);
    }

    *{ box-sizing: border-box; }
    html, body{
      width: 100%; height: 100%; margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink); overflow: hidden;
      user-select: none; -webkit-user-select: none;
      touch-action: none; background: #0b1220;
    }
    body::before{
      content: ""; position: fixed; inset: -40px;
      background-image: url("assets/fondo_parque.webp");
      background-size: cover; background-position: center;
      background-attachment: fixed;
      filter: blur(14px) saturate(1.2); transform: scale(1.08); z-index: -2;
    }
    body::after{
      content: ""; position: fixed; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
      z-index: -1;
    }

    .stage{
      width: 100vw; height: 100vh;
      display: flex; justify-content: center; align-items: center;
      padding: min(18px, 1.5vw);
    }
    .frame{
      width: min(1920px, 100vw); height: min(1080px, 100vh);
      position: relative; border-radius: 34px; overflow: hidden;
    }

    /* DECORACIÓN */
    .cloud{
      position: absolute; width: clamp(140px,18vw,280px); height: clamp(60px,9vw,120px);
      background: rgba(255,255,255,0.70); border-radius: 999px;
      box-shadow: var(--shadow-soft); border: 2px solid rgba(255,255,255,0.6);
      opacity: 0.9; pointer-events: none;
    }
    .cloud::before,.cloud::after{ content: ""; position: absolute;
      background: rgba(255,255,255,0.72); border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.55);
    }
    .cloud::before{ width: clamp(60px,9vw,120px); height: clamp(45px,7vw,90px); left: 20px; top: -14px; }
    .cloud::after { width: clamp(75px,11vw,150px); height: clamp(52px,8vw,105px); left: 60px; top: -19px; }
    .cloud.c1{ left: 24px; top: 24px; transform: rotate(-2deg); }
    .cloud.c2{ right: 24px; top: 56px; transform: rotate(3deg) scale(0.95); }

    .sticker{
      position: absolute; width: clamp(70px,9vw,130px); height: clamp(70px,9vw,130px);
      border-radius: 30px; background: rgba(255,255,255,0.62); box-shadow: var(--shadow-soft);
      border: 2px dashed rgba(255,255,255,0.65);
      display: grid; place-items: center; font-size: clamp(32px,4.5vw,60px);
      pointer-events: none; opacity: 0.9;
      animation: floaty 4s ease-in-out infinite;
    }
    @keyframes floaty{ 0%,100%{ transform: rotate(-8deg) translateY(0); } 50%{ transform: rotate(-8deg) translateY(-8px); } }
    .st1{ left: 32px; bottom: calc(var(--bottom-h) + 18px); }
    .st2{ right: 38px; bottom: calc(var(--bottom-h) + 26px); animation-duration: 5s; animation-delay: -2s; }
    .st3{ left: 260px; top: 54px; opacity: 0.85; animation-duration: 4.5s; }

    /* HEADER */
    .header{
      position: absolute; left: min(22px,1.5vw); right: min(22px,1.5vw); top: min(18px,1.5vh);
      padding: clamp(8px,1.2vh,14px) clamp(10px,1.2vw,16px);
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.82); border: 2px solid rgba(255,255,255,0.75);
      box-shadow: var(--shadow-soft);
      display: flex; align-items: center; justify-content: space-between; gap: clamp(8px,1vw,14px);
    }
    .title{
      font-size: clamp(16px,2.6vw,38px); font-weight: 1000; letter-spacing: 1px;
      line-height: 1.05; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px; white-space: nowrap;
    }
    .title span{ font-size: clamp(22px,3.2vw,44px) !important; }
    .hint{
      font-size: clamp(12px,1.4vw,18px); font-weight: 950; color: var(--muted);
      text-transform: uppercase; text-align: right; line-height: 1.1;
    }
    .badge{
      font-size: clamp(12px,1.3vw,17px); font-weight: 1000; padding: 7px 12px; border-radius: 999px;
      background: rgba(124,58,237,0.12); border: 2px solid rgba(124,58,237,0.28);
      color: #3b2a8f; text-transform: uppercase; white-space: nowrap;
      min-width: 0; text-align: center;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }
    .badge.ok { background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.35); color: #14532d; }
    .badge.bad{ background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.35); color: #7f1d1d; }

    /* MAIN */
    .main{
      position: absolute; left: min(22px,1.5vw); right: min(22px,1.5vw);
      top: clamp(80px,10vh,112px); bottom: calc(var(--bottom-h) + min(18px,1.5vh));
      display: grid; grid-template-rows: auto 1fr; gap: clamp(8px,1vh,14px);
    }

    .panel{
      background: var(--panel-bg); border: 2px solid var(--panel-border);
      border-radius: var(--radius-xl); box-shadow: var(--shadow);
      padding: clamp(10px,1.4vh,16px); position: relative; overflow: hidden;
    }

    /* REGLAS */
    .rules{
      display: grid; grid-template-columns: 1fr 1fr; gap: clamp(8px,1vw,12px);
    }
    .ruleCard{
      border-radius: 22px; background: rgba(255,255,255,0.74);
      border: 2px solid rgba(0,0,0,0.07); box-shadow: var(--shadow-soft);
      padding: clamp(8px,1vh,12px) clamp(10px,1.2vw,14px);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      min-height: clamp(64px,8vh,84px);
    }
    .ruleText{
      font-size: clamp(14px,1.8vw,22px); font-weight: 1000; text-transform: uppercase;
      letter-spacing: 0.7px; color: #22314a; line-height: 1.1; white-space: nowrap;
    }
    .chips{ display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .chip{
      font-size: clamp(13px,1.5vw,18px); font-weight: 1000; text-transform: uppercase;
      padding: 7px 10px; border-radius: 999px; border: 2px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.9); white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .chip.good{ background: rgba(34,197,94,0.14); border-color: rgba(34,197,94,0.25); color: #14532d; }
    .chip.bad { background: rgba(239,68,68,0.14); border-color: rgba(239,68,68,0.25); color: #7f1d1d; }

    /* ZONA DE JUEGO */
    .playPanel{ padding: clamp(10px,1.4vh,14px); display: grid; grid-template-rows: 1fr; }
    .playfield{
      position: relative; width: 100%; height: 100%; border-radius: 26px;
      background: rgba(255,255,255,0.62); border: 2px solid rgba(0,0,0,0.06);
      overflow: hidden; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.45);
      touch-action: none;
    }

    .stomachDecor{
      position: absolute; left: 50%; bottom: -40px; transform: translateX(-50%);
      width: clamp(300px,45vw,620px); aspect-ratio: 1.1 / 1;
      border-radius: 50% 44% 52% 48% / 58% 50% 50% 42%;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.85), rgba(255,255,255,0) 55%),
                  linear-gradient(180deg, rgba(255,150,170,0.92), rgba(255,110,140,0.92));
      box-shadow: 0 22px 55px rgba(0,0,0,0.20); border: 3px solid rgba(255,255,255,0.75);
      opacity: 0.55; pointer-events: none;
    }
    .stomachDecor::before{
      content:""; position:absolute; inset: 16px; border-radius: inherit;
      border: 2px solid rgba(0,0,0,0.07); opacity: 0.75;
    }

    .item{
      position: absolute; width: clamp(100px,9vw,132px); height: clamp(100px,9vw,132px);
      border-radius: 28px; display: grid; place-items: center;
      box-shadow: 0 16px 34px rgba(0,0,0,0.18); border: 2px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.95); will-change: transform;
      cursor: pointer; touch-action: none;
      transition: box-shadow 0.15s;
    }
    .item.good{ box-shadow: 0 16px 34px rgba(34,197,94,0.20), 0 8px 18px rgba(0,0,0,0.12); }
    .item.bad { box-shadow: 0 16px 34px rgba(239,68,68,0.20), 0 8px 18px rgba(0,0,0,0.12); }
    .emoji{
      font-size: clamp(44px,6vh,64px); line-height: 1;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,0.10));
    }
    .miniLabel{
      position: absolute; left: 50%; bottom: 10px; transform: translateX(-50%);
      font-size: clamp(12px,1.3vw,15px); font-weight: 1000; text-transform: uppercase;
      padding: 5px 7px; border-radius: 999px;
      background: rgba(255,255,255,0.85); border: 2px solid rgba(0,0,0,0.08);
      letter-spacing: 0.5px; max-width: 88%; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    .pop{ animation: pop 220ms ease-out forwards; }
    @keyframes pop{
      0%{ transform: translate(var(--x), var(--y)) scale(1); opacity: 1; }
      100%{ transform: translate(var(--x), var(--y)) scale(1.18); opacity: 0; }
    }

    /* OVERLAY / MODAL */
    .overlay{
      position: absolute; inset: 0; display: grid; place-items: center;
      background: rgba(255,255,255,0.35); backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none; transition: opacity 180ms ease; z-index: 30;
    }
    .overlay.show{ opacity: 1; pointer-events: auto; }
    .modal{
      width: min(920px, 92%); border-radius: 30px;
      background: rgba(255,255,255,0.94); border: 3px solid rgba(255,255,255,0.9);
      box-shadow: var(--shadow);
      padding: clamp(16px,2.5vh,26px) clamp(14px,2vw,24px); text-align: center;
      animation: modalPop 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modalPop{
      0%{ transform: scale(0.5) rotate(-5deg); opacity: 0; }
      100%{ transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .modal h2{
      margin: 0 0 10px; font-size: clamp(22px,4vh,46px); font-weight: 1000;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .modal p{
      margin: 0 0 16px; font-size: clamp(14px,2.2vh,26px); font-weight: 950;
      text-transform: uppercase; color: #334155; line-height: 1.2;
    }
    .bigBtn{
      height: min(94px,11vh); width: 100%; border-radius: 24px;
      border: 3px solid rgba(124,58,237,0.28); box-shadow: var(--shadow-soft);
      background: linear-gradient(145deg, rgba(124,58,237,0.14), rgba(124,58,237,0.22));
      color: #2f1d78; font-size: clamp(16px,2.5vh,34px); font-weight: 1000;
      text-transform: uppercase; letter-spacing: 1px; cursor: pointer; touch-action: manipulation;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
      animation: startPulse 2s ease-in-out infinite;
    }
    @keyframes startPulse{
      0%,100%{ box-shadow: var(--shadow-soft), 0 0 0 0 rgba(124,58,237,0); }
      50%{ box-shadow: var(--shadow-soft), 0 0 0 12px rgba(124,58,237,0.20); }
    }
    .bigBtn:hover{ transform: translateY(-3px) scale(1.02); }
    .bigBtn:active{ transform: scale(0.96); }

    /* TOAST */
    .toast{
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      padding: clamp(10px,1.5vh,16px) clamp(14px,2vw,20px); border-radius: 22px;
      background: rgba(255,255,255,0.92); border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow); font-size: clamp(18px,2.8vh,34px); font-weight: 1000;
      text-transform: uppercase; letter-spacing: 1px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 40; text-align: center; max-width: 86%;
    }
    .toast.show{ opacity: 1; transform: translate(-50%, -50%) scale(1); }
    .toast.good{ background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.28); color: #14532d; }
    .toast.bad{ background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.28); color: #7f1d1d; }

    /* CONFETI */
    .confetti{ position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 35; }
    .confetti i{
      position: absolute; width: 14px; height: 14px; border-radius: 4px;
      opacity: 0; animation: fall 900ms ease-out forwards;
    }
    @keyframes fall{
      0%{ transform: translateY(0) rotate(0deg) scale(0.9); opacity: 0; }
      10%{ opacity: 1; }
      100%{ transform: translateY(420px) rotate(360deg) scale(1.0); opacity: 0; }
    }

    /* SHAKE */
    .shake{ animation: shake 220ms ease-in-out; }
    @keyframes shake{
      0%{ transform: translateX(0); }
      20%{ transform: translateX(-10px); }
      40%{ transform: translateX(10px); }
      60%{ transform: translateX(-8px); }
      80%{ transform: translateX(8px); }
      100%{ transform: translateX(0); }
    }

    /* BARRA INFERIOR */
    .bottomBar{
      position: absolute; left: 0; right: 0; bottom: 0;
      height: var(--bottom-h); padding: clamp(8px,1vh,14px) clamp(10px,1.2vw,18px);
      background: rgba(255,255,255,0.90); border-top: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 -18px 45px rgba(0,0,0,0.16);
      display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: clamp(8px,1vw,14px); align-items: center;
    }
    .btn{
      height: min(78px,9.5vh); border-radius: 22px; border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      font-size: clamp(14px,1.8vw,26px); font-weight: 1000; text-transform: uppercase;
      letter-spacing: 1px; color: #1f2a37; cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0 clamp(10px,1.2vw,18px);
      transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.12s;
    }
    .btn:hover{ transform: translateY(-2px); box-shadow: 0 14px 30px rgba(0,0,0,0.14); }
    .btn:active{ transform: scale(0.96); }
    .btn.primary{
      background: linear-gradient(145deg, rgba(124,58,237,0.12), rgba(124,58,237,0.18));
      border-color: rgba(124,58,237,0.26); color: #2f1d78;
    }
    .btn.secondary{
      background: linear-gradient(145deg, rgba(6,182,212,0.10), rgba(6,182,212,0.16));
      border-color: rgba(6,182,212,0.22); color: #0b5563;
    }
    .statusBox{
      height: min(78px,9.5vh); border-radius: 22px; border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft); background: rgba(255,255,255,0.92);
      display: flex; flex-direction: column; justify-content: center;
      padding: 6px clamp(10px,1.2vw,14px); gap: 4px;
    }
    .statusTop{
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      font-size: clamp(11px,1.4vh,16px); font-weight: 1000; text-transform: uppercase; color: #334155;
    }
    .statusValue{
      font-size: clamp(14px,1.8vh,22px); font-weight: 1000; text-transform: uppercase;
      color: #111827; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    @media (max-width: 900px){
      .rules{ grid-template-columns: 1fr; }
      .cloud,.sticker{ display: none; }
    }
    @media (max-height: 700px){
      .sticker{ display: none; }
      .ruleCard{ min-height: 0; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="frame" id="frame">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="sticker st1">⭐</div>
      <div class="sticker st2">🌈</div>
      <div class="sticker st3">☁️</div>

      <header class="header">
        <div class="title"><span>🤢</span> EVITA EL DOLOR DE BARRIGA</div>
        <div class="hint">
          TOCA LA COMIDA BUENA
          <div style="font-size:clamp(10px,1.1vw,14px);font-weight:1000;opacity:0.9;margin-top:3px">NO TOQUES LO QUE MOLESTA</div>
        </div>
        <div class="badge" id="badge">LISTO</div>
      </header>

      <main class="main">
        <section class="panel">
          <div class="rules">
            <div class="ruleCard">
              <div class="ruleText">TOCA ESTO</div>
              <div class="chips">
                <div class="chip good">🍎 MANZANA</div>
                <div class="chip good">💧 AGUA</div>
                <div class="chip good">🥦 VERDURAS</div>
              </div>
            </div>
            <div class="ruleCard">
              <div class="ruleText">NO TOQUES</div>
              <div class="chips">
                <div class="chip bad">🥤 REFRESCO</div>
                <div class="chip bad">🍬 CARAMELOS</div>
                <div class="chip bad">🍟 PATATAS</div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel playPanel">
          <div class="playfield" id="playfield" aria-label="Zona de juego">
            <div class="stomachDecor"></div>
            <div class="confetti" id="confetti"></div>

            <div class="overlay show" id="overlay">
              <div class="modal">
                <h2>¿LISTO?</h2>
                <p>TOCA LA COMIDA BUENA Y EVITA LO MALO</p>
                <button class="bigBtn" id="btnStart">▶ EMPEZAR</button>
              </div>
            </div>

            <div class="toast" id="toast"></div>
          </div>
        </section>
      </main>

      <div class="bottomBar" aria-label="Barra inferior">
        <button class="btn primary"   id="btnReset">🔄 REINICIAR</button>
        <button class="btn secondary" id="btnBack" >🏠 VOLVER</button>
        <div class="statusBox" role="status" aria-live="polite">
          <div class="statusTop">
            <span>ESTADO</span>
            <span id="miniRight">VIDAS: 3</span>
          </div>
          <div class="statusValue" id="statusText">TOCA EMPEZAR</div>
        </div>
      </div>

      <audio id="sndOk"  data-src="/asstests/aplausos.mp4" preload="none"></audio>
      <audio id="sndBad" data-src="/asstests/ohh.mp4"     preload="none"></audio>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      var playfield  = document.getElementById("playfield");
      var frame      = document.getElementById("frame");
      var overlay    = document.getElementById("overlay");
      var btnStart   = document.getElementById("btnStart");
      var btnReset   = document.getElementById("btnReset");
      var btnBack    = document.getElementById("btnBack");
      var toast      = document.getElementById("toast");
      var badge      = document.getElementById("badge");
      var statusText = document.getElementById("statusText");
      var miniRight  = document.getElementById("miniRight");
      var confetti   = document.getElementById("confetti");
      var sndOk      = document.getElementById("sndOk");
      var sndBad     = document.getElementById("sndBad");

      var goodList = [
        { id: "manzana", label: "MANZANA", emoji: "🍎" },
        { id: "agua",    label: "AGUA",    emoji: "💧" },
        { id: "verduras",label: "VERDURAS",emoji: "🥦" },
        { id: "yogur",   label: "YOGUR",   emoji: "🥛" },
        { id: "pan",     label: "PAN",     emoji: "🍞" },
        { id: "pescado", label: "PESCADO", emoji: "🐟" }
      ];
      var badList = [
        { id: "refresco", label: "REFRESCO", emoji: "🥤" },
        { id: "caramelos",label: "CARAMELOS",emoji: "🍬" },
        { id: "patatas",  label: "PATATAS",  emoji: "🍟" },
        { id: "tarta",    label: "TARTA",    emoji: "🍰" }
      ];

      var items      = [];
      var running    = false;
      var lives      = 3;
      var score      = 0;
      var spawnTimer = 0;
      var lastTime   = 0;

      function setStatus(t){ statusText.textContent = t; }
      function setBadge(t, cls){ badge.textContent = t; badge.className = "badge" + (cls ? " " + cls : ""); }

      function updateMini(){
        miniRight.textContent = "VIDAS: " + lives + "  PUNTOS: " + score;
      }

      function showToast(text, kind){
        toast.textContent = text;
        toast.className = "toast show " + (kind || "");
        clearTimeout(showToast._t);
        showToast._t = setTimeout(function(){ toast.className = "toast"; }, 650);
      }

      function _ensureOptionalAudio(a){
        if(!a) return false;
        if(a.getAttribute("data-disabled") === "1") return false;
        if(!a.src || a.src === location.href){
          var ds = a.getAttribute("data-src");
          if(ds){
            a.src = ds;
            a.addEventListener("error", function(){
              try{ a.setAttribute("data-disabled","1"); a.removeAttribute("src"); }catch(e){}
            }, { once: true });
          } else { return false; }
        }
        return !!a.src;
      }

      function playSound(ok){
        try{
          var a = ok ? sndOk : sndBad;
          if(!_ensureOptionalAudio(a)) return;
          a.currentTime = 0;
          a.play();
        }catch(e){}
      }

      function popConfetti(count){
        confetti.innerHTML = "";
        var n = count || 18;
        var colors = [
          "rgba(124,58,237,0.9)","rgba(6,182,212,0.9)","rgba(34,197,94,0.9)",
          "rgba(251,191,36,0.9)","rgba(255,255,255,0.9)"
        ];
        var rect = playfield.getBoundingClientRect();
        for(var i = 0; i < n; i++){
          var piece = document.createElement("i");
          piece.style.left = (rect.width * 0.5 + (Math.random() * 260 - 130)) + "px";
          piece.style.top  = (rect.height * 0.18 + (Math.random() * 70 - 35)) + "px";
          piece.style.background = colors[Math.floor(Math.random() * colors.length)];
          piece.style.animationDelay = (Math.random() * 120) + "ms";
          confetti.appendChild(piece);
        }
        setTimeout(function(){ confetti.innerHTML = ""; }, 980);
      }

      function rand(min, max){ return min + Math.random() * (max - min); }

      function pickItem(){
        if(Math.random() < 0.68){
          return { kind: "good", data: goodList[Math.floor(Math.random() * goodList.length)] };
        }
        return { kind: "bad", data: badList[Math.floor(Math.random() * badList.length)] };
      }

      function createItem(){
        var pick = pickItem();
        var el = document.createElement("div");
        el.className = "item " + pick.kind;
        el.setAttribute("data-kind", pick.kind);
        el.innerHTML = '<div class="emoji">' + pick.data.emoji + '</div>'
                     + '<div class="miniLabel">' + pick.data.label + '</div>';

        var r    = playfield.getBoundingClientRect();
        var size = el.offsetWidth || 120;
        var x    = rand(12, Math.max(12, r.width - size - 12));
        var y    = -160;
        var speed = rand(170, 280);

        el.style.setProperty("--x", x + "px");
        el.style.setProperty("--y", y + "px");
        el.style.transform = "translate(" + x + "px," + y + "px)";

        el.addEventListener("pointerdown", function(ev){
          if(!running) return;
          ev.preventDefault();
          handleTap(el);
        }, { passive: false });

        playfield.appendChild(el);
        items.push({ el: el, x: x, y: y, speed: speed, kind: pick.kind });
      }

      function removeItem(it){ try{ it.el.remove(); }catch(e){} }

      function handleTap(el){
        var i;
        for(i = 0; i < items.length; i++){ if(items[i].el === el) break; }
        if(i >= items.length) return;
        var it = items[i];
        it.el.style.pointerEvents = "none";
        it.el.classList.add("pop");

        if(it.kind === "good"){
          score++;
          playSound(true);
          popConfetti(14);
          showToast("¡BIEN!", "good");
          setStatus("¡GENIAL!");
          setBadge("JUGANDO", "ok");
        } else {
          lives--;
          playSound(false);
          showToast("OH NO", "bad");
          setStatus("ESO MOLESTA");
          setBadge("JUGANDO", "bad");
          frame.classList.remove("shake");
          void frame.offsetWidth;
          frame.classList.add("shake");
          if(lives <= 0){ lives = 0; endGame(); }
        }
        updateMini();

        setTimeout(function(){
          for(var idx = 0; idx < items.length; idx++){
            if(items[idx].el === el){ removeItem(items[idx]); items.splice(idx, 1); break; }
          }
        }, 220);
      }

      function tick(t){
        if(!running) return;
        if(!lastTime) lastTime = t;
        var dt = (t - lastTime) / 1000;
        lastTime = t;

        spawnTimer += dt;
        var spawnEvery = 0.78;
        if(score >= 10) spawnEvery = 0.70;
        if(score >= 20) spawnEvery = 0.62;

        while(spawnTimer >= spawnEvery){ spawnTimer -= spawnEvery; createItem(); }

        var r = playfield.getBoundingClientRect();
        for(var i = items.length - 1; i >= 0; i--){
          var it = items[i];
          it.y += it.speed * dt;
          it.el.style.setProperty("--y", it.y + "px");
          it.el.style.transform = "translate(" + it.x + "px," + it.y + "px)";
          if(it.y > r.height + 170){ removeItem(it); items.splice(i, 1); }
        }

        requestAnimationFrame(tick);
      }

      function startGame(){
        clearAll();
        running    = true;
        lives      = 3;
        score      = 0;
        spawnTimer = 0;
        lastTime   = 0;
        updateMini();
        setBadge("JUGANDO");
        setStatus("TOCA LA COMIDA BUENA");
        overlay.classList.remove("show");
        requestAnimationFrame(tick);
      }

      function endGame(){
        running = false;
        setBadge("FIN");
        setStatus("FIN");
        overlay.querySelector("h2").textContent = "FIN DEL JUEGO";
        overlay.querySelector("p").textContent  = "PUNTOS: " + score + " — TOCA REINICIAR";
        overlay.querySelector(".bigBtn").textContent = "🔄 REINICIAR";
        overlay.classList.add("show");
        showToast("FIN", "bad");
      }

      function clearAll(){
        items.forEach(function(it){ removeItem(it); });
        items = [];
        confetti.innerHTML = "";
      }

      function reset(){
        clearAll();
        running = false;
        lives   = 3;
        score   = 0;
        updateMini();
        setBadge("LISTO");
        setStatus("TOCA EMPEZAR");
        overlay.querySelector("h2").textContent = "¿LISTO?";
        overlay.querySelector("p").textContent  = "TOCA LA COMIDA BUENA Y EVITA LO MALO";
        overlay.querySelector(".bigBtn").textContent = "▶ EMPEZAR";
        overlay.classList.add("show");
      }

      function goBack(){
        try{
          if(document.referrer && (new URL(document.referrer)).origin === location.origin){
            history.back(); return;
          }
        }catch(e){}
        location.href = "index.html";
      }

      btnStart.addEventListener("click",  function(){ startGame(); });
      btnReset.addEventListener("click",  function(){ reset(); });
      btnBack.addEventListener("click",   function(){ goBack(); });

      playfield.addEventListener("pointerdown", function(ev){
        if(!running) return;
        ev.preventDefault();
      }, { passive: false });

      reset();
    })();
  </script>
</body>
</html>
