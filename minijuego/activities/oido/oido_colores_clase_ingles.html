<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OÍDO: COLORES EN INGLÉS EN LA CLASE</title>
  <style>
    :root{
      --panel-bg: rgba(255,255,255,0.88);
      --panel-border: rgba(255,255,255,0.9);
      --shadow: 0 18px 45px rgba(0,0,0,0.18);
      --shadow-soft: 0 10px 25px rgba(0,0,0,0.14);
      --radius-xl: 28px;
      --ink: #1f2a37;
      --muted: #3b556f;
      --bottom-h: 112px;
    }

    *{ box-sizing: border-box; }
    html, body{
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      background: #0b1220;
    }

    body::before{
      content: "";
      position: fixed;
      inset: -40px;
      background-image: url("assets/fondo_parque.webp");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      filter: blur(14px) saturate(1.2);
      transform: scale(1.08);
      z-index: -2;
    }
    body::after{
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
      z-index: -1;
    }

    .stage{
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }
    .frame{
      width: min(1920px, 100vw);
      height: min(1080px, 100vh);
      position: relative;
      border-radius: 34px;
      overflow: hidden;
    }

    .cloud{
      position: absolute;
      width: 280px;
      height: 120px;
      background: rgba(255,255,255,0.70);
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
      border: 2px solid rgba(255,255,255,0.6);
      opacity: 0.9;
      pointer-events: none;
    }
    .cloud::before, .cloud::after{
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.72);
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.55);
    }
    .cloud::before{ width: 120px; height: 90px; left: 40px; top: -28px; }
    .cloud::after { width: 150px; height: 105px; left: 120px; top: -38px; }
    .cloud.c1{ left: 24px; top: 24px; transform: rotate(-2deg); }
    .cloud.c2{ right: 24px; top: 56px; transform: rotate(3deg) scale(0.95); }

    .sticker{
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 30px;
      background: rgba(255,255,255,0.62);
      box-shadow: var(--shadow-soft);
      border: 2px dashed rgba(255,255,255,0.65);
      display: grid;
      place-items: center;
      font-size: 60px;
      pointer-events: none;
      opacity: 0.9;
    }
    .st1{ left: 32px; bottom: calc(var(--bottom-h) + 18px); transform: rotate(-8deg); }
    .st2{ right: 38px; bottom: calc(var(--bottom-h) + 26px); transform: rotate(10deg); }
    .st3{ left: 260px; top: 54px; transform: rotate(7deg) scale(0.85); opacity: 0.85; }

    .header{
      position: absolute;
      left: 22px;
      right: 22px;
      top: 18px;
      padding: 14px 16px;
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.78);
      border: 2px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .title{
      font-size: 42px;
      font-weight: 1000;
      letter-spacing: 1px;
      line-height: 1.05;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }
    .hint{
      font-size: 20px;
      font-weight: 950;
      color: var(--muted);
      text-transform: uppercase;
      text-align: right;
      line-height: 1.1;
    }
    .badge{
      font-size: 18px;
      font-weight: 1000;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(124,58,237,0.12);
      border: 2px solid rgba(124,58,237,0.28);
      color: #3b2a8f;
      text-transform: uppercase;
      white-space: nowrap;
      min-width: 140px;
      text-align: center;
    }

    .main{
      position: absolute;
      left: 22px;
      right: 22px;
      top: 112px;
      bottom: calc(var(--bottom-h) + 18px);
      display: grid;
      grid-template-rows: 1fr;
      gap: 14px;
    }

    .panel{
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 16px;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
    }

    .instruction{
      border-radius: 22px;
      background: rgba(255,255,255,0.74);
      border: 2px solid rgba(0,0,0,0.07);
      box-shadow: var(--shadow-soft);
      padding: 14px 16px;
      display: grid;
      align-content: center;
      gap: 8px;
      text-align: center;
    }
    .instruction .big{
      font-size: 34px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #22314a;
      line-height: 1.1;
    }
    .instruction .small{
      font-size: 20px;
      font-weight: 950;
      text-transform: uppercase;
      color: #334155;
      opacity: 0.94;
      line-height: 1.15;
    }

    .centerStage{
      border-radius: 26px;
      background: rgba(255,255,255,0.62);
      border: 2px solid rgba(0,0,0,0.06);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.45);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: center;
      overflow: hidden;
    }

    .colorCard{
      height: 100%;
      border-radius: 28px;
      background: rgba(255,255,255,0.95);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: 0 16px 34px rgba(0,0,0,0.16);
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }
    .word{
      font-size: 70px;
      font-weight: 1100;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
      color: #111827;
    }
    .swatch{
      border-radius: 26px;
      border: 3px solid rgba(0,0,0,0.08);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.4);
      position: relative;
      overflow: hidden;
    }
    .swatch::after{
      content:"";
      position:absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.55), rgba(255,255,255,0) 60%);
      pointer-events:none;
    }

    .actions{
      height: 100%;
      border-radius: 28px;
      background: rgba(255,255,255,0.95);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: 0 16px 34px rgba(0,0,0,0.16);
      padding: 18px;
      display: grid;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 14px;
      align-items: center;
    }
    .bigBtn{
      height: 96px;
      width: 100%;
      border-radius: 24px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(255,255,255,0.92);
      font-size: 30px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1f2a37;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 18px;
    }
    .bigBtn.primary{
      background: rgba(6,182,212,0.14);
      border-color: rgba(6,182,212,0.24);
      color: #0b5563;
    }
    .bigBtn.good{
      background: rgba(34,197,94,0.14);
      border-color: rgba(34,197,94,0.24);
      color: #14532d;
    }
    .bigBtn.bad{
      background: rgba(239,68,68,0.14);
      border-color: rgba(239,68,68,0.24);
      color: #7f1d1d;
    }
    .bigBtn:active{ transform: translateY(1px); }

    .toast{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 20px;
      border-radius: 22px;
      background: rgba(255,255,255,0.92);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow);
      font-size: 34px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 40;
      text-align: center;
      max-width: 86%;
    }
    .toast.show{
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.02);
    }
    .toast.good{ background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.28); color: #14532d; }
    .toast.bad{ background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.28); color: #7f1d1d; }

    .confetti{
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 35;
    }
    .confetti i{
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 4px;
      opacity: 0;
      animation: fall 900ms ease-out forwards;
    }
    @keyframes fall{
      0%{ transform: translateY(0) rotate(0deg) scale(0.9); opacity: 0; }
      10%{ opacity: 1; }
      100%{ transform: translateY(420px) rotate(360deg) scale(1.0); opacity: 0; }
    }

    .overlay{
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 50;
    }
    .overlay.show{
      opacity: 1;
      pointer-events: auto;
    }
    .modal{
      width: min(980px, 92%);
      border-radius: 30px;
      background: rgba(255,255,255,0.92);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow);
      padding: 22px 22px 18px 22px;
      text-align: center;
    }
    .modal h2{
      margin: 0 0 10px 0;
      font-size: 46px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .modal p{
      margin: 0 0 16px 0;
      font-size: 26px;
      font-weight: 950;
      text-transform: uppercase;
      color: #334155;
      line-height: 1.2;
    }
    .startBtn{
      height: 94px;
      width: 100%;
      border-radius: 24px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(124,58,237,0.14);
      color: #2f1d78;
      font-size: 34px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .startBtn:active{ transform: translateY(1px); }

    .bottomBar{
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--bottom-h);
      padding: 14px 18px;
      background: rgba(255,255,255,0.90);
      border-top: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 -18px 45px rgba(0,0,0,0.16);
      display: grid;
      grid-template-columns: 1fr 1fr 1.2fr;
      gap: 14px;
      align-items: center;
    }
    .btn{
      height: 78px;
      border-radius: 22px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(255,255,255,0.92);
      font-size: 28px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1f2a37;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 18px;
    }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      background: rgba(124,58,237,0.14);
      border-color: rgba(124,58,237,0.26);
      color: #2f1d78;
    }
    .btn.secondary{
      background: rgba(6,182,212,0.12);
      border-color: rgba(6,182,212,0.22);
      color: #0b5563;
    }
    .statusBox{
      height: 78px;
      border-radius: 22px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(255,255,255,0.92);
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      padding: 8px 14px;
      gap: 6px;
    }
    .statusTop{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 18px;
      font-weight: 1000;
      text-transform: uppercase;
      color: #334155;
    }
    .statusValue{
      font-size: 26px;
      font-weight: 1000;
      text-transform: uppercase;
      color: #111827;
      letter-spacing: 0.6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 1400px){
      .title{ font-size: 34px; }
      .hint{ font-size: 16px; }
      .word{ font-size: 60px; }
      .bigBtn{ font-size: 26px; height: 88px; }
      .instruction .big{ font-size: 30px; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="frame" id="frame">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="sticker st1">🎨</div>
      <div class="sticker st2">👀</div>
      <div class="sticker st3">☁️</div>

      <header class="header">
        <div class="title"><span style="font-size:46px">👂</span> OÍDO: COLORES</div>
        <div class="hint">
          ESCUCHA EL COLOR EN INGLÉS
          <div style="font-size:16px; font-weight:1000; opacity:0.9;">TOCA ALGO DE ESE COLOR EN LA CLASE</div>
        </div>
        <div class="badge" id="badge">LISTO</div>
      </header>

      <main class="main">
        <section class="panel" id="panel">
          <div class="instruction">
            <div class="big" id="instBig">TOCA EMPEZAR</div>
            <div class="small" id="instSmall">ESCUCHA, TOCA ALGO EN LA CLASE Y VUELVE PARA PULSAR HECHO</div>
          </div>

          <div class="centerStage">
            <div class="colorCard">
              <div class="word" id="word">RED</div>
              <div class="swatch" id="swatch"></div>
            </div>

            <div class="actions">
              <button class="bigBtn primary" id="btnListen">ESCUCHAR</button>
              <button class="bigBtn good" id="btnDone">HECHO</button>
              <button class="bigBtn bad" id="btnOops">ME EQUIVOQUÉ</button>
            </div>
          </div>

          <div style="height: 0; position: relative;">
            <div class="confetti" id="confetti"></div>
            <div class="toast" id="toast"></div>
            <div class="overlay show" id="overlay">
              <div class="modal">
                <h2>¿LISTO?</h2>
                <p>ESCUCHA EL COLOR EN INGLÉS, TOCA ALGO DE ESE COLOR EN LA CLASE Y PULSA HECHO</p>
                <button class="startBtn" id="btnStart">EMPEZAR</button>
              </div>
            </div>
          </div>
        </section>
      </main>

      <div class="bottomBar" aria-label="Barra inferior">
        <button class="btn primary" id="btnReset">REINICIAR</button>
        <button class="btn secondary" id="btnBack">VOLVER</button>
        <div class="statusBox" role="status" aria-live="polite">
          <div class="statusTop">
            <span>ESTADO</span>
            <span id="miniRight">HECHOS: 0</span>
          </div>
          <div class="statusValue" id="statusText">TOCA EMPEZAR</div>
        </div>
      </div>

      <audio id="sndOk" src="/asstests/aplausos.mp4" preload="auto"></audio>
      <audio id="sndBad" src="/asstests/ohh.mp4" preload="auto"></audio>
      <audio id="sndColor" preload="auto"></audio>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      var overlay = document.getElementById("overlay");
      var btnStart = document.getElementById("btnStart");
      var btnListen = document.getElementById("btnListen");
      var btnDone = document.getElementById("btnDone");
      var btnOops = document.getElementById("btnOops");
      var btnReset = document.getElementById("btnReset");
      var btnBack = document.getElementById("btnBack");

      var badge = document.getElementById("badge");
      var word = document.getElementById("word");
      var swatch = document.getElementById("swatch");
      var instBig = document.getElementById("instBig");
      var instSmall = document.getElementById("instSmall");
      var toast = document.getElementById("toast");
      var confetti = document.getElementById("confetti");
      var statusText = document.getElementById("statusText");
      var miniRight = document.getElementById("miniRight");

      var sndOk = document.getElementById("sndOk");
      var sndBad = document.getElementById("sndBad");
      var sndColor = document.getElementById("sndColor");

      var colors = [
        { key:"RED",    css:"#ef4444", audio:"assets/sonidos_colores/red.mp3" },
        { key:"BLUE",   css:"#3b82f6", audio:"assets/sonidos_colores/blue.mp3" },
        { key:"GREEN",  css:"#22c55e", audio:"assets/sonidos_colores/green.mp3" },
        { key:"YELLOW", css:"#facc15", audio:"assets/sonidos_colores/yellow.mp3" },
        { key:"ORANGE", css:"#fb923c", audio:"assets/sonidos_colores/orange.mp3" },
        { key:"PURPLE", css:"#a855f7", audio:"assets/sonidos_colores/purple.mp3" },
        { key:"PINK",   css:"#fb7185", audio:"assets/sonidos_colores/pink.mp3" },
        { key:"BLACK",  css:"#111827", audio:"assets/sonidos_colores/black.mp3" },
        { key:"WHITE",  css:"#ffffff", audio:"assets/sonidos_colores/white.mp3" }
      ];

      var current = null;
      var doneCount = 0;
      var started = false;

      function setStatus(t){
        statusText.textContent = t;
      }

      function showToast(text, kind){
        toast.textContent = text;
        toast.className = "toast show " + (kind || "");
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(function(){
          toast.className = "toast";
        }, 650);
      }

      function playSound(ok){
        try{
          var a = ok ? sndOk : sndBad;
          a.currentTime = 0;
          a.play();
        }catch(e){}
      }

      function popConfetti(count){
        confetti.innerHTML = "";
        var n = count || 18;
        var colors2 = [
          "rgba(124,58,237,0.9)",
          "rgba(6,182,212,0.9)",
          "rgba(34,197,94,0.9)",
          "rgba(251,191,36,0.9)",
          "rgba(255,255,255,0.9)"
        ];
        var rect = document.getElementById("panel").getBoundingClientRect();
        for(var i=0;i<n;i++){
          var piece = document.createElement("i");
          var x = rect.width*0.5 + (Math.random()*260 - 130);
          var y = rect.height*0.35 + (Math.random()*70 - 35);
          piece.style.left = x + "px";
          piece.style.top = y + "px";
          piece.style.background = colors2[Math.floor(Math.random()*colors2.length)];
          piece.style.transform = "translateY(0) rotate(" + (Math.random()*60) + "deg)";
          piece.style.animationDelay = (Math.random()*120) + "ms";
          confetti.appendChild(piece);
        }
        window.setTimeout(function(){ confetti.innerHTML = ""; }, 980);
      }

      function speak(text){
        if(!("speechSynthesis" in window)) return false;
        try{
          window.speechSynthesis.cancel();
          var u = new SpeechSynthesisUtterance(text);
          u.lang = "en-US";
          u.rate = 0.9;
          u.pitch = 1.0;
          window.speechSynthesis.speak(u);
          return true;
        }catch(e){
          return false;
        }
      }

      function tryPlayAudio(url){
        return new Promise(function(resolve){
          if(!url){ resolve(false); return; }
          try{
            sndColor.pause();
            sndColor.currentTime = 0;
            sndColor.src = url;
            var p = sndColor.play();
            if(p && typeof p.then === "function"){
              p.then(function(){ resolve(true); }).catch(function(){ resolve(false); });
            }else{
              resolve(true);
            }
          }catch(e){
            resolve(false);
          }
        });
      }

      function pickNew(){
        current = colors[Math.floor(Math.random()*colors.length)];
        word.textContent = current.key;
        swatch.style.background = current.css;
        swatch.style.borderColor = "rgba(0,0,0,0.08)";
        if(current.key === "WHITE"){
          swatch.style.borderColor = "rgba(0,0,0,0.18)";
        }
        badge.textContent = "LISTO";
        instBig.textContent = "TOCA ALGO DE ESTE COLOR";
        instSmall.textContent = "EN LA CLASE, BUSCA ALGO " + current.key + " Y VUELVE";
        setStatus("PULSA ESCUCHAR");
      }

      function listen(){
        if(!current) return;
        badge.textContent = "ESCUCHANDO";
        setStatus("ESCUCHA...");
        tryPlayAudio(current.audio).then(function(ok){
          if(!ok){
            speak(current.key);
          }
          window.setTimeout(function(){
            badge.textContent = "BUSCA";
            setStatus("TOCA ALGO EN LA CLASE");
          }, 450);
        });
      }

      function markDone(){
        if(!current) return;
        doneCount += 1;
        miniRight.textContent = "HECHOS: " + doneCount;
        playSound(true);
        popConfetti(18);
        showToast("¡GENIAL!", "good");
        badge.textContent = "HECHO";
        setStatus("OTRO COLOR");
        window.setTimeout(function(){
          pickNew();
          listen();
        }, 700);
      }

      function oops(){
        if(!current) return;
        playSound(false);
        showToast("PRUEBA OTRA VEZ", "bad");
        badge.textContent = "UPS";
        setStatus("ESCUCHA OTRA VEZ");
      }

      function reset(){
        started = false;
        doneCount = 0;
        miniRight.textContent = "HECHOS: 0";
        badge.textContent = "LISTO";
        setStatus("TOCA EMPEZAR");
        instBig.textContent = "TOCA EMPEZAR";
        instSmall.textContent = "ESCUCHA, TOCA ALGO EN LA CLASE Y VUELVE PARA PULSAR HECHO";
        word.textContent = "RED";
        swatch.style.background = "#ef4444";
        current = null;
        overlay.classList.add("show");
      }

      function goBack(){
        var ok = false;
        try{
          if(document.referrer){
            ok = (new URL(document.referrer)).origin === location.origin;
          }
        }catch(e){ ok = false; }
        if(ok) history.back();
        else location.href = "index.html";
      }

      btnStart.addEventListener("click", function(){
        overlay.classList.remove("show");
        started = true;
        pickNew();
        listen();
      });

      btnListen.addEventListener("click", function(){
        if(!started){
          overlay.classList.remove("show");
          started = true;
          pickNew();
        }
        listen();
      });

      btnDone.addEventListener("click", function(){
        if(!started) return;
        markDone();
      });

      btnOops.addEventListener("click", function(){
        if(!started) return;
        oops();
      });

      btnReset.addEventListener("click", function(){ reset(); });
      btnBack.addEventListener("click", function(){ goBack(); });

      reset();
    })();
  </script>
</body>
</html>
