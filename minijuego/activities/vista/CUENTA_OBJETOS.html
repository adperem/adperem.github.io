<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CUENTA LOS OBJETOS</title>
  <style>
    :root{
      --maxw: 1200px;
      --ui: rgba(255,255,255,.88);
      --stroke: rgba(0,0,0,.12);
      --shadow: 0 14px 30px rgba(0,0,0,.18);
      --radius: 26px;
      --radius2: 18px;
      --text: #19324d;
      --muted: rgba(25,50,77,.68);
    }
    *{ box-sizing: border-box; }
    html, body{ height: 100%; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      background: #bfe8ff;
    }

    .bg{ position: fixed; inset: 0; background: url("assets/fondo_parque.webp") center/cover no-repeat; transform: scale(1.05); filter: blur(10px); z-index: -2; }
    .bgOverlay{ position: fixed; inset: 0; background: radial-gradient(circle at 20% 10%, rgba(255,255,255,.55), rgba(255,255,255,.10) 55%, rgba(0,0,0,.05)); z-index: -1; }

    .decor{ position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .cloud{ position: absolute; width: 260px; opacity: .90; filter: drop-shadow(0 10px 12px rgba(0,0,0,.12)); }
    .cloud.c1{ left: 3vw; top: 3vh; transform: rotate(-3deg); }
    .cloud.c2{ right: 4vw; top: 6vh; transform: rotate(2deg); width: 300px; }
    .sticker{ position: absolute; width: 120px; opacity: .95; filter: drop-shadow(0 10px 12px rgba(0,0,0,.12)); }
    .sticker.s1{ left: 2vw; bottom: 18vh; transform: rotate(-8deg); }
    .sticker.s2{ right: 3vw; bottom: 22vh; transform: rotate(10deg); }
    .animal{ position: absolute; width: 170px; left: 50%; transform: translateX(-50%); bottom: 16vh; opacity: .95; filter: drop-shadow(0 12px 18px rgba(0,0,0,.15)); }

    .wrap{
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      gap: 12px;
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
    }

    .topArea{
      max-width: var(--maxw);
      width: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 12px;
      align-items: center;
    }
    .titleCard{
      background: var(--ui);
      border: 2px solid var(--stroke);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .titleLeft{ display: flex; flex-direction: column; gap: 6px; }
    .h1{ font-size: 26px; font-weight: 1000; letter-spacing: .6px; text-transform: uppercase; line-height: 1.05; }
    .hint{ font-size: 14px; font-weight: 900; color: var(--muted); letter-spacing: .8px; text-transform: uppercase; }
    .badge{
      background: rgba(255, 232, 165, .95);
      border: 2px solid rgba(0,0,0,.10);
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 1000;
      letter-spacing: .8px;
      text-transform: uppercase;
      box-shadow: 0 10px 18px rgba(0,0,0,.10);
      white-space: nowrap;
      font-size: 14px;
    }

    .statusCard{
      background: var(--ui);
      border: 2px solid var(--stroke);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      min-height: 82px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }
    .statusLine{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      text-transform: uppercase;
      font-weight: 1000;
      letter-spacing: .8px;
    }
    .pill{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.70);
      border: 2px solid rgba(0,0,0,.10);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 1000;
      letter-spacing: .8px;
      text-transform: uppercase;
    }
    .dot{ width: 10px; height: 10px; border-radius: 50%; background: rgba(0,0,0,.18); }

    .playWrap{
      max-width: var(--maxw);
      width: 100%;
      margin: 0 auto;
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 12px;
    }

    .field{
      background: rgba(255,255,255,.45);
      border: 2px solid rgba(255,255,255,.55);
      border-radius: var(--radius);
      box-shadow: 0 18px 40px rgba(0,0,0,.12);
      padding: 14px;
      position: relative;
      overflow: hidden;
      touch-action: pan-y;
    }

    .obj{
      position: absolute;
      width: 74px;
      height: 74px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.10));
      transform: rotate(var(--rot));
    }

    .flower{
      width: 66px;
      height: 66px;
      position: relative;
    }
    .flower .petal{
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      top: 50%;
      left: 50%;
      transform-origin: 0 0;
      border: 2px solid rgba(0,0,0,.10);
      box-shadow: 0 8px 12px rgba(0,0,0,.08);
      background: var(--c);
    }
    .flower .center{
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      background: #ffd36e;
      border: 2px solid rgba(0,0,0,.10);
      box-shadow: 0 8px 12px rgba(0,0,0,.08);
    }

    .answers{
      background: rgba(255,255,255,.70);
      border: 2px solid rgba(255,255,255,.55);
      border-radius: var(--radius);
      box-shadow: 0 14px 30px rgba(0,0,0,.10);
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      align-items: center;
    }

    .ansBtn{
      height: 88px;
      border-radius: var(--radius2);
      border: 2px solid rgba(0,0,0,.10);
      box-shadow: 0 12px 18px rgba(0,0,0,.10);
      background: rgba(255,255,255,.88);
      cursor: pointer;
      touch-action: manipulation;
      font-size: 34px;
      font-weight: 1000;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(25,50,77,.92);
      display: grid;
      place-items: center;
      transition: transform .10s ease, filter .10s ease;
    }
    .ansBtn:active{ transform: scale(.98); filter: brightness(.98); }

    .badFlash{ animation: badshake .28s ease-in-out 1; outline: 6px solid rgba(255, 107, 138, .55); outline-offset: -6px; }
    @keyframes badshake{
      0%{ transform: translateX(0); }
      25%{ transform: translateX(-6px); }
      50%{ transform: translateX(6px); }
      75%{ transform: translateX(-4px); }
      100%{ transform: translateX(0); }
    }
    .okPop{ animation: okpop .22s ease-in-out 1; outline: 6px solid rgba(46,229,157,.55); outline-offset: -6px; }
    @keyframes okpop{
      0%{ transform: scale(1); }
      60%{ transform: scale(1.03); }
      100%{ transform: scale(1); }
    }

    .bottomBar{
      max-width: var(--maxw);
      width: 100%;
      margin: 0 auto;
      background: var(--ui);
      border: 2px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      min-height: 92px;
    }
    .progressWrap{ display: grid; gap: 8px; }
    .progressText{
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      text-transform: uppercase; font-weight: 1000; letter-spacing: .8px; font-size: 14px;
    }
    .bar{
      height: 18px;
      border-radius: 999px;
      background: rgba(25,50,77,.10);
      border: 2px solid rgba(0,0,0,.08);
      overflow: hidden;
    }
    .barFill{
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(46,229,157,.95), rgba(163,232,255,.95));
      border-radius: 999px;
      transition: width .18s ease;
    }
    .btn{
      height: 64px;
      min-width: 170px;
      padding: 0 16px;
      border-radius: 18px;
      border: 2px solid rgba(0,0,0,.10);
      font-weight: 1000;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 14px 22px rgba(0,0,0,.12);
      background: rgba(255,255,255,.92);
      color: var(--text);
      touch-action: manipulation;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn:active{ transform: scale(.99); }
    .btn.primary{ background: rgba(255, 232, 165, .95); }
    .btn.secondary{ background: rgba(163, 232, 255, .92); }
    .mini{
      font-size: 12px;
      opacity: .9;
      font-weight: 1000;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .modal{
      position: fixed; inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: rgba(0,0,0,.28);
      z-index: 50;
    }
    .modal.show{ display: flex; }
    .modalCard{
      width: min(740px, 96vw);
      background: var(--ui);
      border: 2px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: 0 20px 55px rgba(0,0,0,.25);
      padding: 18px;
      display: grid;
      gap: 12px;
      text-align: center;
    }
    .modalTitle{ font-size: 30px; font-weight: 1000; letter-spacing: 1px; text-transform: uppercase; }
    .modalText{
      font-size: 16px; font-weight: 900; color: var(--muted);
      letter-spacing: .8px; text-transform: uppercase; line-height: 1.35;
    }
    .modalActions{ display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 6px; }

    @media (max-width: 1050px){
      .topArea{ grid-template-columns: 1fr; }
      .animal{ display: none; }
      .answers{ grid-template-columns: 1fr 1fr 1fr; }
    }
    @media (max-width: 760px){
      .btn{ min-width: 140px; }
      .ansBtn{ height: 82px; font-size: 32px; }
      .obj{ width: 68px; height: 68px; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="bgOverlay" aria-hidden="true"></div>

  <div class="decor" aria-hidden="true">
    <img class="cloud c1" src="assets/nube_1.png" alt="" onerror="this.style.display='none'">
    <img class="cloud c2" src="assets/nube_2.png" alt="" onerror="this.style.display='none'">
    <img class="sticker s1" src="assets/sticker_estrella.png" alt="" onerror="this.style.display='none'">
    <img class="sticker s2" src="assets/sticker_corazon.png" alt="" onerror="this.style.display='none'">
    <img class="animal" src="assets/animal_decorativo.png" alt="" onerror="this.style.display='none'">
  </div>

  <main class="wrap">
    <section class="topArea">
      <div class="titleCard">
        <div class="titleLeft">
          <div class="h1">CUENTA LOS OBJETOS</div>
          <div class="hint" id="question">¿CUÁNTAS FLORES HAY?</div>
        </div>
        <div class="badge" id="badge">FLORES</div>
      </div>

      <div class="statusCard">
        <div class="statusLine">
          <span>ACIERTOS</span>
          <span class="pill"><span class="dot"></span><span id="hits">0</span></span>
        </div>
        <div class="statusLine">
          <span>FALLOS</span>
          <span class="pill"><span class="dot"></span><span id="misses">0</span></span>
        </div>
      </div>
    </section>

    <section class="playWrap">
      <div class="field" id="field" aria-label="CAMPO"></div>
      <div class="answers" id="answers" aria-label="RESPUESTAS"></div>
    </section>

    <footer class="bottomBar">
      <div class="progressWrap">
        <div class="progressText">
          <span>PROGRESO</span>
          <span id="progressLabel">0 DE 10</span>
        </div>
        <div class="bar" role="progressbar" aria-valuemin="0" aria-valuemax="10" aria-valuenow="0">
          <div class="barFill" id="barFill"></div>
        </div>
      </div>

      <button class="btn primary" id="btnReset" type="button">
        <span>REINICIAR</span>
        <span class="mini">OTRA VEZ</span>
      </button>

      <button class="btn secondary" id="btnBack" type="button">
        <span>VOLVER</span>
        <span class="mini">MENÚ</span>
      </button>
    </footer>
  </main>

  <div class="modal" id="modal">
    <div class="modalCard" role="dialog" aria-modal="true" aria-label="FINAL">
      <div class="modalTitle">¡MUY BIEN!</div>
      <div class="modalText" id="modalText">HAS TERMINADO.</div>
      <div class="modalActions">
        <button class="btn primary" id="btnPlayAgain" type="button">REINICIAR</button>
        <button class="btn secondary" id="btnBack2" type="button">VOLVER</button>
      </div>
    </div>
  </div>

  <audio id="sndOk" src="/asstests/aplausos.mp4" preload="none"></audio>
  <audio id="sndBad" src="/asstests/ohh.mp4" preload="none"></audio>

  <script>
    (function(){
      "use strict";

      const field = document.getElementById("field");
      const answers = document.getElementById("answers");

      const hitsEl = document.getElementById("hits");
      const missesEl = document.getElementById("misses");

      const progressLabel = document.getElementById("progressLabel");
      const barFill = document.getElementById("barFill");

      const modal = document.getElementById("modal");
      const modalText = document.getElementById("modalText");

      const sndOk = document.getElementById("sndOk");
      const sndBad = document.getElementById("sndBad");

      const btnReset = document.getElementById("btnReset");
      const btnBack = document.getElementById("btnBack");
      const btnPlayAgain = document.getElementById("btnPlayAgain");
      const btnBack2 = document.getElementById("btnBack2");

      const TOTAL_ROUNDS = 10;
      const MIN_N = 3;
      const MAX_N = 9;

      const FLOWER_COLORS = ["#ff6b6b","#6ecbff","#7ee7a4","#ffd36e","#c7a6ff","#ffb36e"];

      const OBJECT_TYPES = [
        { name: "FLORES",      emoji: null,  make: makeFlower },
        { name: "ESTRELLAS",   emoji: "⭐",  make: null },
        { name: "CORAZONES",   emoji: "❤️",  make: null },
        { name: "MARIPOSAS",   emoji: "🦋",  make: null },
        { name: "SOLES",       emoji: "☀️",  make: null },
        { name: "LUNARES",     emoji: "🌙",  make: null },
        { name: "PECES",       emoji: "🐟",  make: null },
        { name: "MANZANAS",    emoji: "🍎",  make: null },
        { name: "GLOBOS",      emoji: "🎈",  make: null },
        { name: "PELOTAS",     emoji: "⚽",  make: null }
      ];

      let round = 0;
      let hits = 0;
      let misses = 0;
      let correctAnswer = 0;
      let locked = false;
      let currentObjType = 0;

      function playSound(a){
        try{ a.currentTime = 0; a.play(); }catch(e){}
      }

      function randInt(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }

      function shuffle(arr){
        for(let i = arr.length - 1; i > 0; i--){
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function updateUI(){
        hitsEl.textContent = String(hits);
        missesEl.textContent = String(misses);

        progressLabel.textContent = String(round) + " DE " + String(TOTAL_ROUNDS);

        const pct = Math.round((round / TOTAL_ROUNDS) * 100);
        barFill.style.width = pct + "%";

        const bar = document.querySelector(".bar[role='progressbar']");
        bar.setAttribute("aria-valuenow", String(round));
      }

      function makeFlower(color){
        const wrap = document.createElement("div");
        wrap.className = "flower";
        wrap.style.setProperty("--c", color);

        for(let i=0;i<6;i++){
          const p = document.createElement("div");
          p.className = "petal";
          const ang = i * 60;
          p.style.transform = "translate(-50%,-50%) rotate(" + ang + "deg) translate(22px) rotate(" + (-ang) + "deg)";
          wrap.appendChild(p);
        }
        const c = document.createElement("div");
        c.className = "center";
        wrap.appendChild(c);

        return wrap;
      }

      function makeEmoji(emoji){
        const span = document.createElement("span");
        span.style.fontSize = "52px";
        span.style.lineHeight = "1";
        span.textContent = emoji;
        return span;
      }

      function placeObjects(n){
        field.innerHTML = "";

        const r = field.getBoundingClientRect();
        const pad = 18;
        const objType = OBJECT_TYPES[currentObjType];

        const used = [];
        function okSpot(x,y){
          for(const u of used){
            const dx = x - u.x;
            const dy = y - u.y;
            if(Math.hypot(dx,dy) < 86) return false;
          }
          return true;
        }

        for(let i=0;i<n;i++){
          const obj = document.createElement("div");
          obj.className = "obj";
          obj.style.setProperty("--rot", (randInt(-12,12)) + "deg");

          if(objType.make){
            const c = FLOWER_COLORS[randInt(0, FLOWER_COLORS.length-1)];
            obj.appendChild(objType.make(c));
          } else {
            obj.appendChild(makeEmoji(objType.emoji));
          }

          let tries = 0;
          let x=0, y=0;
          while(tries < 60){
            x = randInt(pad, Math.max(pad, Math.floor(r.width) - pad - 74));
            y = randInt(pad, Math.max(pad, Math.floor(r.height) - pad - 74));
            if(okSpot(x,y)) break;
            tries++;
          }

          used.push({x,y});
          obj.style.left = x + "px";
          obj.style.top = y + "px";
          field.appendChild(obj);
        }
      }

      function buildAnswers(correct){
        answers.innerHTML = "";

        const a = correct;
        let b = a + (Math.random() < 0.5 ? -1 : 1);
        let c = a + (Math.random() < 0.5 ? -2 : 2);

        b = Math.min(MAX_N, Math.max(MIN_N, b));
        c = Math.min(MAX_N, Math.max(MIN_N, c));

        const set = new Set([a,b,c]);
        while(set.size < 3){
          set.add(randInt(MIN_N, MAX_N));
        }

        const opts = shuffle([...set]);

        opts.forEach((v) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "ansBtn";
          btn.textContent = String(v);

          btn.addEventListener("pointerdown", () => onAnswer(btn, v), { passive: true });
          answers.appendChild(btn);
        });
      }

      function onAnswer(btn, value){
        if(locked) return;
        locked = true;

        if(value === correctAnswer){
          hits += 1;
          playSound(sndOk);

          btn.classList.add("okPop");

          setTimeout(() => {
            round += 1;
            updateUI();

            if(round >= TOTAL_ROUNDS){
              showModal();
            }else{
              nextRound();
            }
            locked = false;
          }, 550);
        }else{
          misses += 1;
          playSound(sndBad);

          btn.classList.remove("badFlash");
          void btn.offsetWidth;
          btn.classList.add("badFlash");

          updateUI();

          setTimeout(() => { locked = false; }, 450);
        }
      }

      function showModal(){
        modalText.textContent = "HAS HECHO " + String(TOTAL_ROUNDS) + " DE " + String(TOTAL_ROUNDS) + " RONDAS.";
        modal.classList.add("show");
      }
      function hideModal(){ modal.classList.remove("show"); }

      function nextRound(){
        currentObjType = round % OBJECT_TYPES.length;
        const objType = OBJECT_TYPES[currentObjType];
        const questionEl = document.getElementById("question");
        const badgeEl = document.getElementById("badge");
        if(questionEl) questionEl.textContent = "¿CUÁNTAS " + objType.name + " HAY?";
        if(badgeEl) badgeEl.textContent = objType.name;

        const n = randInt(MIN_N, MAX_N);
        correctAnswer = n;
        placeObjects(n);
        buildAnswers(n);
      }

      function startGame(){
        hideModal();
        round = 0; hits = 0; misses = 0;
        currentObjType = 0;
        updateUI();
        nextRound();
      }

      function goBack(){
        if(window.history.length > 1){
          window.history.back();
        }else{
          window.location.href = "index.html";
        }
      }

      btnReset.addEventListener("pointerdown", () => startGame(), { passive: true });
      btnPlayAgain.addEventListener("pointerdown", () => startGame(), { passive: true });
      btnBack.addEventListener("pointerdown", () => goBack(), { passive: true });
      btnBack2.addEventListener("pointerdown", () => goBack(), { passive: true });

      startGame();
    })();
  </script>
<script src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script>
(function(){
  var _opts={folder:'svg',ext:'.svg'};
  function _p(el){try{twemoji.parse(el,_opts);}catch(e){}}
  if(document.readyState!=='loading')_p(document.body);
  else document.addEventListener('DOMContentLoaded',function(){_p(document.body);});
  new MutationObserver(function(ms){ms.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType===1)_p(n);else if(n.nodeType===3&&n.parentNode&&n.parentNode.nodeType===1)_p(n.parentNode);});});}).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>
</body>
</html>
