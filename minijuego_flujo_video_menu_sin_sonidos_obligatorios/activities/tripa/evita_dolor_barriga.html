<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVITA EL DOLOR DE BARRIGA</title>
  <style>
    :root{
      --panel-bg: rgba(255,255,255,0.88);
      --panel-border: rgba(255,255,255,0.9);
      --shadow: 0 18px 45px rgba(0,0,0,0.18);
      --shadow-soft: 0 10px 25px rgba(0,0,0,0.14);
      --radius-xl: 28px;
      --ink: #1f2a37;
      --muted: #3b556f;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --bottom-h: 112px;
    }

    *{ box-sizing: border-box; }
    html, body{
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      background: #0b1220;
    }

    body::before{
      content: "";
      position: fixed;
      inset: -40px;
      background-image: url("assets/fondo_parque.webp");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      filter: blur(14px) saturate(1.2);
      transform: scale(1.08);
      z-index: -2;
    }
    body::after{
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
      z-index: -1;
    }

    .stage{
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }
    .frame{
      width: min(1920px, 100vw);
      height: min(1080px, 100vh);
      position: relative;
      border-radius: 34px;
      overflow: hidden;
    }

    .cloud{
      position: absolute;
      width: 280px;
      height: 120px;
      background: rgba(255,255,255,0.70);
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
      border: 2px solid rgba(255,255,255,0.6);
      opacity: 0.9;
      pointer-events: none;
    }
    .cloud::before, .cloud::after{
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.72);
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.55);
    }
    .cloud::before{ width: 120px; height: 90px; left: 40px; top: -28px; }
    .cloud::after { width: 150px; height: 105px; left: 120px; top: -38px; }
    .cloud.c1{ left: 24px; top: 24px; transform: rotate(-2deg); }
    .cloud.c2{ right: 24px; top: 56px; transform: rotate(3deg) scale(0.95); }

    .sticker{
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 30px;
      background: rgba(255,255,255,0.62);
      box-shadow: var(--shadow-soft);
      border: 2px dashed rgba(255,255,255,0.65);
      display: grid;
      place-items: center;
      font-size: 60px;
      pointer-events: none;
      opacity: 0.9;
    }
    .st1{ left: 32px; bottom: calc(var(--bottom-h) + 18px); transform: rotate(-8deg); }
    .st2{ right: 38px; bottom: calc(var(--bottom-h) + 26px); transform: rotate(10deg); }
    .st3{ left: 260px; top: 54px; transform: rotate(7deg) scale(0.85); opacity: 0.85; }

    .header{
      position: absolute;
      left: 22px;
      right: 22px;
      top: 18px;
      padding: 14px 16px;
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.78);
      border: 2px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .title{
      font-size: 42px;
      font-weight: 1000;
      letter-spacing: 1px;
      line-height: 1.05;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }
    .hint{
      font-size: 20px;
      font-weight: 950;
      color: var(--muted);
      text-transform: uppercase;
      text-align: right;
      line-height: 1.1;
    }
    .badge{
      font-size: 18px;
      font-weight: 1000;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(124,58,237,0.12);
      border: 2px solid rgba(124,58,237,0.28);
      color: #3b2a8f;
      text-transform: uppercase;
      white-space: nowrap;
      min-width: 120px;
      text-align: center;
    }

    .main{
      position: absolute;
      left: 22px;
      right: 22px;
      top: 112px;
      bottom: calc(var(--bottom-h) + 18px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .panel{
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .rules{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .ruleCard{
      border-radius: 22px;
      background: rgba(255,255,255,0.74);
      border: 2px solid rgba(0,0,0,0.07);
      box-shadow: var(--shadow-soft);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 84px;
    }
    .ruleText{
      font-size: 24px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #22314a;
      line-height: 1.1;
    }
    .chips{
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .chip{
      font-size: 20px;
      font-weight: 1000;
      text-transform: uppercase;
      padding: 10px 12px;
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.9);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chip.good{ background: rgba(34,197,94,0.14); border-color: rgba(34,197,94,0.25); color: #14532d; }
    .chip.bad { background: rgba(239,68,68,0.14); border-color: rgba(239,68,68,0.25); color: #7f1d1d; }

    .playPanel{
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }
    .playfield{
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 26px;
      background: rgba(255,255,255,0.62);
      border: 2px solid rgba(0,0,0,0.06);
      overflow: hidden;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.45);
      touch-action: none;
    }

    .stomachDecor{
      position: absolute;
      left: 50%;
      bottom: -40px;
      transform: translateX(-50%);
      width: 620px;
      aspect-ratio: 1.1 / 1;
      border-radius: 50% 44% 52% 48% / 58% 50% 50% 42%;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.85), rgba(255,255,255,0) 55%),
                  linear-gradient(180deg, rgba(255,150,170,0.92), rgba(255,110,140,0.92));
      box-shadow: 0 22px 55px rgba(0,0,0,0.20);
      border: 3px solid rgba(255,255,255,0.75);
      opacity: 0.55;
      pointer-events: none;
    }
    .stomachDecor::before{
      content:"";
      position:absolute;
      inset: 16px;
      border-radius: inherit;
      border: 2px solid rgba(0,0,0,0.07);
      opacity: 0.75;
    }

    .item{
      position: absolute;
      width: 132px;
      height: 132px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      box-shadow: 0 16px 34px rgba(0,0,0,0.18);
      border: 2px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.95);
      will-change: transform;
      cursor: pointer;
      touch-action: none;
    }
    .item.good{ box-shadow: 0 16px 34px rgba(34,197,94,0.18), 0 16px 34px rgba(0,0,0,0.14); }
    .item.bad { box-shadow: 0 16px 34px rgba(239,68,68,0.18), 0 16px 34px rgba(0,0,0,0.14); }
    .emoji{
      font-size: 64px;
      line-height: 1;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,0.10));
    }
    .miniLabel{
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      font-size: 16px;
      font-weight: 1000;
      text-transform: uppercase;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.85);
      border: 2px solid rgba(0,0,0,0.08);
      letter-spacing: 0.6px;
      max-width: 88%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pop{
      animation: pop 220ms ease-out forwards;
    }
    @keyframes pop{
      0%{ transform: translate(var(--x), var(--y)) scale(1); opacity: 1; }
      100%{ transform: translate(var(--x), var(--y)) scale(1.18); opacity: 0; }
    }

    .overlay{
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 30;
    }
    .overlay.show{
      opacity: 1;
      pointer-events: auto;
    }
    .modal{
      width: min(920px, 92%);
      border-radius: 30px;
      background: rgba(255,255,255,0.92);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow);
      padding: 22px 22px 18px 22px;
      text-align: center;
    }
    .modal h2{
      margin: 0 0 10px 0;
      font-size: 46px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .modal p{
      margin: 0 0 16px 0;
      font-size: 26px;
      font-weight: 950;
      text-transform: uppercase;
      color: #334155;
      line-height: 1.2;
    }
    .bigBtn{
      height: 94px;
      width: 100%;
      border-radius: 24px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(124,58,237,0.14);
      color: #2f1d78;
      font-size: 34px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .bigBtn:active{ transform: translateY(1px); }

    .toast{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 20px;
      border-radius: 22px;
      background: rgba(255,255,255,0.92);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow);
      font-size: 34px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 40;
      text-align: center;
      max-width: 86%;
    }
    .toast.show{
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.02);
    }
    .toast.good{ background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.28); color: #14532d; }
    .toast.bad{ background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.28); color: #7f1d1d; }

    .confetti{
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 35;
    }
    .confetti i{
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 4px;
      opacity: 0;
      animation: fall 900ms ease-out forwards;
    }
    @keyframes fall{
      0%{ transform: translateY(0) rotate(0deg) scale(0.9); opacity: 0; }
      10%{ opacity: 1; }
      100%{ transform: translateY(420px) rotate(360deg) scale(1.0); opacity: 0; }
    }

    .bottomBar{
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--bottom-h);
      padding: 14px 18px;
      background: rgba(255,255,255,0.90);
      border-top: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 -18px 45px rgba(0,0,0,0.16);
      display: grid;
      grid-template-columns: 1fr 1fr 1.2fr;
      gap: 14px;
      align-items: center;
    }

    .btn{
      height: 78px;
      border-radius: 22px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(255,255,255,0.92);
      font-size: 28px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1f2a37;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 18px;
    }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      background: rgba(124,58,237,0.14);
      border-color: rgba(124,58,237,0.26);
      color: #2f1d78;
    }
    .btn.secondary{
      background: rgba(6,182,212,0.12);
      border-color: rgba(6,182,212,0.22);
      color: #0b5563;
    }

    .statusBox{
      height: 78px;
      border-radius: 22px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(255,255,255,0.92);
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      padding: 8px 14px;
      gap: 6px;
    }
    .statusTop{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 18px;
      font-weight: 1000;
      text-transform: uppercase;
      color: #334155;
    }
    .statusValue{
      font-size: 26px;
      font-weight: 1000;
      text-transform: uppercase;
      color: #111827;
      letter-spacing: 0.6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shake{
      animation: shake 220ms ease-in-out;
    }
    @keyframes shake{
      0%{ transform: translateX(0); }
      20%{ transform: translateX(-10px); }
      40%{ transform: translateX(10px); }
      60%{ transform: translateX(-8px); }
      80%{ transform: translateX(8px); }
      100%{ transform: translateX(0); }
    }

    @media (max-width: 1400px){
      .title{ font-size: 34px; }
      .hint{ font-size: 16px; }
      .ruleText{ font-size: 20px; }
      .chip{ font-size: 18px; }
      .item{ width: 118px; height: 118px; }
      .emoji{ font-size: 56px; }
      .stomachDecor{ width: 520px; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="frame" id="frame">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="sticker st1">⭐</div>
      <div class="sticker st2">🌈</div>
      <div class="sticker st3">☁️</div>

      <header class="header">
        <div class="title"><span style="font-size:46px">🤢</span> EVITA EL DOLOR DE BARRIGA</div>
        <div class="hint">
          TOCA LA COMIDA BUENA
          <div style="font-size:16px; font-weight:1000; opacity:0.9;">NO TOQUES LO QUE MOLESTA</div>
        </div>
        <div class="badge" id="badge">LISTO</div>
      </header>

      <main class="main">
        <section class="panel">
          <div class="rules">
            <div class="ruleCard">
              <div class="ruleText">TOCA ESTO</div>
              <div class="chips">
                <div class="chip good">🍎 MANZANA</div>
                <div class="chip good">💧 AGUA</div>
                <div class="chip good">🥦 VERDURAS</div>
              </div>
            </div>
            <div class="ruleCard">
              <div class="ruleText">NO TOQUES ESTO</div>
              <div class="chips">
                <div class="chip bad">🥤 REFRESCO</div>
                <div class="chip bad">🍬 CARAMELOS</div>
                <div class="chip bad">🍟 PATATAS</div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel playPanel">
          <div class="playfield" id="playfield" aria-label="Zona de juego">
            <div class="stomachDecor"></div>
            <div class="confetti" id="confetti"></div>

            <div class="overlay show" id="overlay">
              <div class="modal">
                <h2>¿LISTO?</h2>
                <p>TOCA LA COMIDA BUENA Y EVITA LO MALO</p>
                <button class="bigBtn" id="btnStart">EMPEZAR</button>
              </div>
            </div>

            <div class="toast" id="toast"></div>
          </div>
        </section>
      </main>

      <div class="bottomBar" aria-label="Barra inferior">
        <button class="btn primary" id="btnReset">REINICIAR</button>
        <button class="btn secondary" id="btnBack">VOLVER</button>
        <div class="statusBox" role="status" aria-live="polite">
          <div class="statusTop">
            <span>ESTADO</span>
            <span id="miniRight">VIDAS: 3</span>
          </div>
          <div class="statusValue" id="statusText">TOCA EMPEZAR</div>
        </div>
      </div>

      <audio id="sndOk" data-src="/asstests/aplausos.mp4" preload="none"></audio>
      <audio id="sndBad" data-src="/asstests/ohh.mp4" preload="none"></audio>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      var playfield = document.getElementById("playfield");
      var frame = document.getElementById("frame");
      var overlay = document.getElementById("overlay");
      var btnStart = document.getElementById("btnStart");
      var btnReset = document.getElementById("btnReset");
      var btnBack = document.getElementById("btnBack");
      var toast = document.getElementById("toast");
      var badge = document.getElementById("badge");
      var statusText = document.getElementById("statusText");
      var miniRight = document.getElementById("miniRight");
      var confetti = document.getElementById("confetti");

      var sndOk = document.getElementById("sndOk");
      var sndBad = document.getElementById("sndBad");

      
      function _ensureOptionalAudio(a){
        if(!a) return false;
        if(a.getAttribute("data-disabled") === "1") return false;
        if(!a.src || a.src === location.href){
          var ds = a.getAttribute("data-src");
          if(ds){
            a.src = ds;
            a.addEventListener("error", function(){
              try{ a.setAttribute("data-disabled","1"); a.removeAttribute("src"); a.src = ""; }catch(e){}
            }, { once: true });
          }else{
            return false;
          }
        }
        return !!a.src;
      }
var goodList = [
        { id: "manzana", label: "MANZANA", emoji: "🍎" },
        { id: "agua", label: "AGUA", emoji: "💧" },
        { id: "verduras", label: "VERDURAS", emoji: "🥦" },
        { id: "yogur", label: "YOGUR", emoji: "🥛" },
        { id: "pan", label: "PAN", emoji: "🍞" },
        { id: "pescado", label: "PESCADO", emoji: "🐟" }
      ];
      var badList = [
        { id: "refresco", label: "REFRESCO", emoji: "🥤" },
        { id: "caramelos", label: "CARAMELOS", emoji: "🍬" },
        { id: "patatas", label: "PATATAS", emoji: "🍟" },
        { id: "tarta", label: "TARTA", emoji: "🍰" }
      ];

      var items = [];
      var running = false;
      var lives = 3;
      var score = 0;
      var spawnTimer = 0;
      var lastTime = 0;

      function setStatus(t){
        statusText.textContent = t;
      }

      function setBadge(t){
        badge.textContent = t;
      }

      function updateMini(){
        miniRight.textContent = "VIDAS: " + lives + "  PUNTOS: " + score;
      }

      function showToast(text, kind){
        toast.textContent = text;
        toast.className = "toast show " + (kind || "");
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(function(){
          toast.className = "toast";
        }, 650);
      }

      function playSound(ok){
        try{
          var a = ok ? sndOk : sndBad;
          
          
          if(!_ensureOptionalAudio(a)) return;
if(!_ensureOptionalAudio(a)) return;
a.currentTime = 0;
          a.play();
        }catch(e){}
      }

      function popConfetti(count){
        confetti.innerHTML = "";
        var n = count || 18;
        var colors = [
          "rgba(124,58,237,0.9)",
          "rgba(6,182,212,0.9)",
          "rgba(34,197,94,0.9)",
          "rgba(251,191,36,0.9)",
          "rgba(255,255,255,0.9)"
        ];
        var rect = playfield.getBoundingClientRect();
        for(var i=0;i<n;i++){
          var piece = document.createElement("i");
          var x = rect.width*0.5 + (Math.random()*260 - 130);
          var y = rect.height*0.18 + (Math.random()*70 - 35);
          piece.style.left = x + "px";
          piece.style.top = y + "px";
          piece.style.background = colors[Math.floor(Math.random()*colors.length)];
          piece.style.transform = "translateY(0) rotate(" + (Math.random()*60) + "deg)";
          piece.style.animationDelay = (Math.random()*120) + "ms";
          confetti.appendChild(piece);
        }
        window.setTimeout(function(){ confetti.innerHTML = ""; }, 980);
      }

      function rand(min, max){
        return min + Math.random() * (max - min);
      }

      function pickItem(){
        var isGood = Math.random() < 0.68;
        if(isGood){
          var g = goodList[Math.floor(Math.random()*goodList.length)];
          return { kind: "good", data: g };
        }
        var b = badList[Math.floor(Math.random()*badList.length)];
        return { kind: "bad", data: b };
      }

      function createItem(){
        var pick = pickItem();
        var el = document.createElement("div");
        el.className = "item " + pick.kind;
        el.setAttribute("data-kind", pick.kind);
        el.innerHTML = '<div class="emoji">' + pick.data.emoji + '</div><div class="miniLabel">' + pick.data.label + '</div>';

        var r = playfield.getBoundingClientRect();
        var size = 132;
        var x = rand(12, Math.max(12, r.width - size - 12));
        var y = -160;
        var speed = rand(170, 280);

        el.style.setProperty("--x", x + "px");
        el.style.setProperty("--y", y + "px");
        el.style.transform = "translate(" + x + "px," + y + "px)";

        el.addEventListener("pointerdown", function(ev){
          if(!running) return;
          ev.preventDefault();
          handleTap(el);
        }, { passive: false });

        playfield.appendChild(el);
        items.push({ el: el, x: x, y: y, speed: speed, kind: pick.kind });
      }

      function removeItem(it){
        try{ it.el.remove(); }catch(e){}
      }

      function handleTap(el){
        var i;
        for(i=0;i<items.length;i++){
          if(items[i].el === el) break;
        }
        if(i >= items.length) return;

        var it = items[i];
        it.el.style.pointerEvents = "none";
        it.el.classList.add("pop");

        if(it.kind === "good"){
          score += 1;
          playSound(true);
          popConfetti(14);
          showToast("¡BIEN!", "good");
          setStatus("¡GENIAL!");
        }else{
          lives -= 1;
          playSound(false);
          showToast("OH NO", "bad");
          setStatus("ESO MOLESTA");
          frame.classList.remove("shake");
          void frame.offsetWidth;
          frame.classList.add("shake");
          if(lives <= 0){
            lives = 0;
            endGame();
          }
        }
        updateMini();

        window.setTimeout(function(){
          var idx;
          for(idx=0;idx<items.length;idx++){
            if(items[idx].el === el){
              removeItem(items[idx]);
              items.splice(idx, 1);
              break;
            }
          }
        }, 220);
      }

      function tick(t){
        if(!running) return;
        if(!lastTime) lastTime = t;
        var dt = (t - lastTime) / 1000;
        lastTime = t;

        spawnTimer += dt;
        var spawnEvery = 0.78;
        if(score >= 10) spawnEvery = 0.70;
        if(score >= 20) spawnEvery = 0.62;

        while(spawnTimer >= spawnEvery){
          spawnTimer -= spawnEvery;
          createItem();
        }

        var r = playfield.getBoundingClientRect();
        var i = items.length - 1;
        while(i >= 0){
          var it = items[i];
          it.y += it.speed * dt;
          it.el.style.setProperty("--y", it.y + "px");
          it.el.style.transform = "translate(" + it.x + "px," + it.y + "px)";

          if(it.y > r.height + 170){
            removeItem(it);
            items.splice(i, 1);
          }
          i -= 1;
        }

        requestAnimationFrame(tick);
      }

      function startGame(){
        clearAll();
        running = true;
        lives = 3;
        score = 0;
        spawnTimer = 0;
        lastTime = 0;
        updateMini();
        setBadge("JUGANDO");
        setStatus("TOCA LA COMIDA BUENA");
        overlay.classList.remove("show");
        requestAnimationFrame(tick);
      }

      function endGame(){
        running = false;
        setBadge("TERMINADO");
        setStatus("FIN");
        overlay.querySelector("h2").textContent = "FIN";
        overlay.querySelector("p").textContent = "PUNTOS: " + score + "  TOCA REINICIAR";
        overlay.classList.add("show");
        showToast("FIN", "bad");
      }

      function clearAll(){
        for(var i=0;i<items.length;i++){
          removeItem(items[i]);
        }
        items = [];
        confetti.innerHTML = "";
      }

      function reset(){
        overlay.querySelector("h2").textContent = "¿LISTO?";
        overlay.querySelector("p").textContent = "TOCA LA COMIDA BUENA Y EVITA LO MALO";
        overlay.classList.add("show");
        running = false;
        lives = 3;
        score = 0;
        updateMini();
        setBadge("LISTO");
        setStatus("TOCA EMPEZAR");
        clearAll();
      }

      function goBack(){
        var ok = false;
        try{
          if(document.referrer){
            ok = (new URL(document.referrer)).origin === location.origin;
          }
        }catch(e){ ok = false; }
        if(ok) history.back();
        else location.href = "index.html";
      }

      btnStart.addEventListener("click", function(){ startGame(); });
      btnReset.addEventListener("click", function(){ reset(); });
      btnBack.addEventListener("click", function(){ goBack(); });

      playfield.addEventListener("pointerdown", function(ev){
        if(!running) return;
        ev.preventDefault();
      }, { passive: false });

      reset();
    })();
  </script>
</body>
</html>
