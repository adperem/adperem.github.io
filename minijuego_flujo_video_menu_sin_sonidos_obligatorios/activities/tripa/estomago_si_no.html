<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EL ESTÓMAGO: SÍ / NO</title>
  <style>
    :root{
      --panel-bg: rgba(255,255,255,0.88);
      --panel-border: rgba(255,255,255,0.9);
      --shadow: 0 18px 45px rgba(0,0,0,0.18);
      --shadow-soft: 0 10px 25px rgba(0,0,0,0.14);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --ink: #1f2a37;
      --muted: #3b556f;
      --good: #16a34a;
      --bad: #ef4444;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --card: rgba(255,255,255,0.92);
      --stroke: rgba(0,0,0,0.08);
      --glow: 0 0 0 6px rgba(124, 58, 237, 0.18);
      --focus: 0 0 0 6px rgba(6, 182, 212, 0.20);
      --bottom-h: 124px;
    }

    *{ box-sizing: border-box; }
    html, body{
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      background: #0b1220;
    }

    /* FONDO FIJO, SIEMPRE DIFUMINADO */
    body::before{
      content: "";
      position: fixed;
      inset: -40px;
      background-image: url("assets/fondo_parque.webp");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      filter: blur(14px) saturate(1.2);
      transform: scale(1.08);
      z-index: -2;
    }
    body::after{
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
      z-index: -1;
    }

    /* CONTENEDOR 16:9, PRIORIDAD 1920x1080 */
    .stage{
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }
    .frame{
      width: min(1920px, 100vw);
      height: min(1080px, 100vh);
      position: relative;
      border-radius: 34px;
      overflow: hidden;
    }

    /* DECORACIÓN SUAVE */
    .cloud{
      position: absolute;
      width: 280px;
      height: 120px;
      background: rgba(255,255,255,0.70);
      border-radius: 999px;
      filter: blur(0px);
      box-shadow: var(--shadow-soft);
      border: 2px solid rgba(255,255,255,0.6);
      opacity: 0.9;
      pointer-events: none;
    }
    .cloud::before, .cloud::after{
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.72);
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.55);
    }
    .cloud::before{ width: 120px; height: 90px; left: 40px; top: -28px; }
    .cloud::after { width: 150px; height: 105px; left: 120px; top: -38px; }
    .cloud.c1{ left: 24px; top: 24px; transform: rotate(-2deg); }
    .cloud.c2{ right: 24px; top: 56px; transform: rotate(3deg) scale(0.95); }
    .sticker{
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 30px;
      background: rgba(255,255,255,0.62);
      box-shadow: var(--shadow-soft);
      border: 2px dashed rgba(255,255,255,0.65);
      display: grid;
      place-items: center;
      font-size: 60px;
      pointer-events: none;
      opacity: 0.9;
    }
    .st1{ left: 32px; bottom: calc(var(--bottom-h) + 24px); transform: rotate(-8deg); }
    .st2{ right: 38px; bottom: calc(var(--bottom-h) + 34px); transform: rotate(10deg); }
    .st3{ left: 260px; top: 54px; transform: rotate(7deg) scale(0.85); opacity: 0.85; }

    /* HEADER */
    .header{
      position: absolute;
      left: 22px;
      right: 22px;
      top: 18px;
      padding: 16px 18px;
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.78);
      border: 2px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .title{
      font-size: 44px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1.05;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .badge{
      font-size: 20px;
      font-weight: 900;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(124,58,237,0.12);
      border: 2px solid rgba(124,58,237,0.28);
      color: #3b2a8f;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .hint{
      font-size: 22px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      text-align: right;
      line-height: 1.15;
    }

    /* MAIN */
    .main{
      position: absolute;
      left: 22px;
      right: 22px;
      top: 120px;
      bottom: calc(var(--bottom-h) + 18px + 220px + 18px);
      display: grid;
      grid-template-columns: 1fr 1.15fr 1fr;
      gap: 18px;
    }

    .panel{
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 18px;
      position: relative;
      overflow: hidden;
    }
    .panel h2{
      margin: 0 0 12px 0;
      font-size: 34px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dropzone{
      height: calc(100% - 56px);
      border-radius: 22px;
      border: 3px dashed rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.70);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.5);
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: 110px;
      gap: 12px;
      align-content: start;
      position: relative;
    }
    .dropzone.good{ outline: 0; }
    .dropzone.bad{ outline: 0; }

    .dropzone.highlight{
      border-color: rgba(6,182,212,0.55);
      box-shadow: inset 0 0 0 2px rgba(6,182,212,0.22), var(--focus);
    }

    .zone-label{
      position: absolute;
      right: 14px;
      top: 14px;
      font-size: 18px;
      font-weight: 950;
      text-transform: uppercase;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.85);
      border: 2px solid rgba(0,0,0,0.08);
      opacity: 0.9;
    }
    .zone-good{ color: #14532d; background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.25); }
    .zone-bad { color: #7f1d1d; background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.25); }

    /* CENTRO: ESTÓMAGO */
    .center{
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .stomachCard{
      flex: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
    }
    .instruction{
      font-size: 28px;
      font-weight: 950;
      text-transform: uppercase;
      text-align: center;
      color: #22314a;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(124,58,237,0.10);
      border: 2px solid rgba(124,58,237,0.20);
    }

    .stomachWrap{
      display: grid;
      place-items: center;
      position: relative;
      border-radius: 26px;
      background: rgba(255,255,255,0.55);
      border: 2px solid rgba(0,0,0,0.06);
      overflow: hidden;
      min-height: 320px;
    }

    .stomach{
      width: min(520px, 95%);
      aspect-ratio: 1.08 / 1;
      border-radius: 50% 44% 52% 48% / 58% 50% 50% 42%;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.85), rgba(255,255,255,0) 55%),
                  linear-gradient(180deg, rgba(255,150,170,0.95), rgba(255,110,140,0.95));
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
      border: 3px solid rgba(255,255,255,0.75);
      position: relative;
      transform: rotate(-10deg) scale(0.82);
    }
    .stomach::before{
      content:"";
      position:absolute;
      inset: 14px;
      border-radius: inherit;
      border: 2px solid rgba(0,0,0,0.07);
      opacity: 0.8;
    }

    .face{
      position: absolute;
      left: 50%;
      top: 46%;
      transform: translate(-50%, -50%) rotate(10deg);
      width: 58%;
      height: 52%;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 14px;
      align-items: center;
      justify-items: center;
    }
    .eyes{
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 14px;
    }
    .eye{
      width: 84px;
      height: 84px;
      background: rgba(255,255,255,0.95);
      border: 3px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      box-shadow: 0 10px 18px rgba(0,0,0,0.12);
      position: relative;
      overflow: hidden;
    }
    .pupil{
      width: 28px;
      height: 28px;
      background: rgba(25,25,35,0.92);
      border-radius: 999px;
      position: absolute;
      left: 28px;
      top: 30px;
      box-shadow: 0 0 0 8px rgba(0,0,0,0.05);
    }
    .mouth{
      width: 140px;
      height: 60px;
      border-radius: 0 0 999px 999px;
      background: rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
      border: 3px solid rgba(0,0,0,0.08);
    }
    .tongue{
      position: absolute;
      left: 50%;
      bottom: -14px;
      transform: translateX(-50%);
      width: 90px;
      height: 54px;
      border-radius: 999px;
      background: rgba(255,110,140,0.85);
      border: 3px solid rgba(0,0,0,0.06);
    }
    .cheek{
      position: absolute;
      width: 62px;
      height: 34px;
      background: rgba(255,255,255,0.45);
      border-radius: 999px;
      top: 60%;
      filter: blur(0.2px);
      opacity: 0.8;
    }
    .cheek.left{ left: 10%; transform: rotate(-10deg) scale(0.82); }
    .cheek.right{ right: 10%; transform: rotate(10deg); }

    .bubble{
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.35);
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      opacity: 0;
      pointer-events: none;
    }

    .stomachState{
      font-size: 26px;
      font-weight: 950;
      text-transform: uppercase;
      text-align: center;
      padding: 12px 14px;
      border-radius: 18px;
      border: 2px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.70);
      color: #1f2a37;
    }
    .stomachState.good{ background: rgba(34,197,94,0.14); border-color: rgba(34,197,94,0.25); color: #14532d; }
    .stomachState.bad{ background: rgba(239,68,68,0.14); border-color: rgba(239,68,68,0.25); color: #7f1d1d; }

    /* BANDEJA DE COMIDAS */
    .tray{
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: calc(var(--bottom-h) + 18px);
      height: 220px;
      background: rgba(255,255,255,0.80);
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 14px 14px 16px 14px;
      overflow: hidden;
    }
    .trayTitle{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 6px 10px 6px;
    }
    .trayTitle h3{
      margin: 0;
      font-size: 28px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .pill{
      font-size: 18px;
      font-weight: 950;
      text-transform: uppercase;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(6,182,212,0.12);
      border: 2px solid rgba(6,182,212,0.22);
      color: #0b5563;
      white-space: nowrap;
    }

    .foodRow{
      height: calc(100% - 46px);
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 12px;
      align-items: center;
      padding: 0 6px;
    }

    .food{
      height: 150px;
      border-radius: 24px;
      background: var(--card);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: 0 12px 26px rgba(0,0,0,0.14);
      display: grid;
      grid-template-rows: 1fr auto;
      align-items: center;
      justify-items: center;
      padding: 10px;
      cursor: grab;
      touch-action: none;
      position: relative;
      transform: translate3d(0,0,0);
    }
    .food:active{ cursor: grabbing; }
    .food .emoji{
      font-size: 62px;
      line-height: 1;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,0.10));
    }
    .food .label{
      width: 100%;
      text-align: center;
      font-size: 18px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #243244;
      padding: 8px 6px;
      border-radius: 14px;
      background: rgba(124,58,237,0.08);
      border: 2px solid rgba(124,58,237,0.14);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .food.disabled{
      opacity: 0.55;
      filter: grayscale(0.2);
      cursor: default;
    }

    .food.dragging{
      z-index: 30;
      box-shadow: 0 20px 50px rgba(0,0,0,0.28);
      border-color: rgba(6,182,212,0.35);
      outline: none;
    }

    /* COMIDA COLOCADA EN ZONA */
    .placed{
      height: 110px;
      border-radius: 18px;
      background: rgba(255,255,255,0.92);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: 0 12px 22px rgba(0,0,0,0.10);
      display: grid;
      grid-template-columns: 90px 1fr;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
    }
    .placed .emoji{
      font-size: 56px;
      text-align: center;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.10));
    }
    .placed .label{
      font-size: 22px;
      font-weight: 950;
      text-transform: uppercase;
      color: #243244;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(0,0,0,0.06);
      border: 2px solid rgba(0,0,0,0.06);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* BARRA INFERIOR OBLIGATORIA */
    .bottomBar{
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--bottom-h);
      padding: 16px 22px;
      background: rgba(255,255,255,0.90);
      border-top: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 -18px 45px rgba(0,0,0,0.16);
      display: grid;
      grid-template-columns: 1fr 1fr 1.2fr;
      gap: 16px;
      align-items: center;
    }

    .btn{
      height: 88px;
      border-radius: 22px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(255,255,255,0.92);
      font-size: 30px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1f2a37;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 18px;
    }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      background: rgba(124,58,237,0.14);
      border-color: rgba(124,58,237,0.26);
      color: #2f1d78;
    }
    .btn.secondary{
      background: rgba(6,182,212,0.12);
      border-color: rgba(6,182,212,0.22);
      color: #0b5563;
    }

    .statusBox{
      height: 88px;
      border-radius: 22px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow-soft);
      background: rgba(255,255,255,0.92);
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      padding: 8px 16px;
      gap: 6px;
    }
    .statusTop{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 18px;
      font-weight: 950;
      text-transform: uppercase;
      color: #334155;
    }
    .statusValue{
      font-size: 30px;
      font-weight: 1000;
      text-transform: uppercase;
      color: #111827;
      letter-spacing: 0.6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* TOAST */
    .toast{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 18px 22px;
      border-radius: 22px;
      background: rgba(255,255,255,0.92);
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: var(--shadow);
      font-size: 34px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 50;
      text-align: center;
      max-width: 86%;
    }
    .toast.show{
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.02);
    }
    .toast.good{ background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.28); color: #14532d; }
    .toast.bad{ background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.28); color: #7f1d1d; }

    /* CONFETI SIMPLE */
    .confetti{
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 40;
    }
    .confetti i{
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 4px;
      opacity: 0;
      animation: pop 900ms ease-out forwards;
    }
    @keyframes pop{
      0%{ transform: translateY(0) rotate(0deg) scale(0.9); opacity: 0; }
      10%{ opacity: 1; }
      100%{ transform: translateY(420px) rotate(360deg) scale(1.0); opacity: 0; }
    }

    /* RESPONSIVE: MANTENER TODO EN PANTALLA SIN CORTES */
    @media (max-width: 1400px){
      .title{ font-size: 36px; }
      .hint{ font-size: 18px; }
      .foodRow{ grid-template-columns: repeat(5, minmax(0, 1fr)); grid-auto-rows: 150px; overflow: hidden; }
      .tray{ height: 320px; }
      .main{ bottom: calc(var(--bottom-h) + 356px); }
    }
  

    /* ESCALA GLOBAL: TODO MÁS PEQUEÑO (SIN ROMPER LAYOUT) */
    :root{
      --S: 0.88;
      --bottom-h: 110px; /* override */
    }
    .header{ padding: 12px 14px; }
    .title{ font-size: 38px; }
    .hint{ font-size: 18px; }
    .badge{ font-size: 18px; padding: 8px 12px; }

    .main{
      top: 112px;
      gap: 14px;
      bottom: calc(var(--bottom-h) + 18px + 190px + 18px);
    }

    .panel{ padding: 14px; }
    .panel h2{ font-size: 28px; margin-bottom: 10px; }

    .dropzone{
      padding: 12px;
      grid-auto-rows: 96px;
      gap: 10px;
    }
    .zone-label{ font-size: 16px; padding: 7px 10px; }

    .instruction{ font-size: 24px; padding: 10px 12px; }
    .stomachWrap{ min-height: 280px; }
    .stomach{ width: min(440px, 92%); }
    .eye{ width: 74px; height: 74px; }
    .mouth{ width: 128px; height: 54px; }

    .stomachState{ font-size: 22px; padding: 10px 12px; }

    .tray{
      height: 190px;
      padding: 12px 12px 14px 12px;
    }
    .trayTitle h3{ font-size: 24px; }
    .pill{ font-size: 16px; padding: 7px 10px; }

    .foodRow{
      gap: 10px;
      height: calc(100% - 42px);
    }
    .food{
      height: 130px;
      border-radius: 20px;
      padding: 8px;
    }
    .food .emoji{ font-size: 54px; }
    .food .label{ font-size: 16px; padding: 6px 6px; border-radius: 12px; }

    .placed{
      height: 96px;
      border-radius: 16px;
      grid-template-columns: 78px 1fr;
      padding: 8px 10px;
      gap: 10px;
    }
    .placed .emoji{ font-size: 48px; }
    .placed .label{ font-size: 20px; padding: 8px 10px; border-radius: 14px; }

    .bottomBar{
      height: var(--bottom-h);
      padding: 14px 18px;
      gap: 14px;
    }
    .btn{
      height: 76px;
      font-size: 26px;
      border-radius: 20px;
    }
    .statusBox{
      height: 76px;
      border-radius: 20px;
      padding: 6px 14px;
    }
    .statusValue{ font-size: 26px; }

    /* RESPONSIVE */
    @media (max-width: 1400px){
      .tray{ height: 280px; }
      .main{ bottom: calc(var(--bottom-h) + 18px + 280px + 18px); }
    }

</style>
</head>
<body>
  <div class="stage">
    <div class="frame" id="frame">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="sticker st1">⭐</div>
      <div class="sticker st2">🌈</div>
      <div class="sticker st3">☁️</div>

      <header class="header">
        <div class="title">
          <span style="font-size:46px">🫶</span>
          EL ESTÓMAGO: SÍ / NO
        </div>
        <div class="hint">
          ARRASTRA CADA COMIDA A SU BANDEJA
          <div style="font-size:18px; font-weight:900; opacity:0.9;">(TOCA Y ARRASTRA CON EL DEDO)</div>
        </div>
        <div class="badge" id="badge">LISTO</div>
      </header>

      <main class="main">
        <section class="panel" aria-label="Bandeja sí">
          <h2>✅ A MI ESTÓMAGO SÍ</h2>
          <div class="dropzone good" id="zoneYes" data-zone="yes">
            <div class="zone-label zone-good">ME SIENTA BIEN</div>
          </div>
        </section>

        <section class="panel center stomachCard" aria-label="Estómago">
          <div class="instruction" id="instruction">ARRASTRA LAS COMIDAS</div>

          <div class="stomachWrap">
            <div class="stomach" id="stomach">
              <div class="face">
                <div class="eyes">
                  <div class="eye"><div class="pupil" id="p1"></div></div>
                  <div class="eye"><div class="pupil" id="p2"></div></div>
                </div>
                <div class="mouth" id="mouth"><div class="tongue"></div></div>
              </div>
              <div class="cheek left"></div>
              <div class="cheek right"></div>
            </div>

            <div class="bubble" id="b1"></div>
            <div class="bubble" id="b2"></div>
            <div class="bubble" id="b3"></div>
          </div>

          <div class="stomachState" id="stomachState">ESTOY LISTO PARA COMER</div>
        </section>

        <section class="panel" aria-label="Bandeja no">
          <h2>❌ A MI ESTÓMAGO NO</h2>
          <div class="dropzone bad" id="zoneNo" data-zone="no">
            <div class="zone-label zone-bad">ME MOLESTA</div>
          </div>
        </section>
      </main>

      <section class="tray" aria-label="Comidas">
        <div class="trayTitle">
          <h3>COMIDAS</h3>
          <div class="pill" id="remainingPill">QUEDAN: 10</div>
        </div>
        <div class="foodRow" id="foodRow">
          <!-- COMIDAS GENERADAS POR JS -->
        </div>
      </section>

      <div class="bottomBar" aria-label="Barra inferior">
        <button class="btn primary" id="btnReset">REINICIAR</button>
        <button class="btn secondary" id="btnBack">VOLVER</button>
        <div class="statusBox" role="status" aria-live="polite">
          <div class="statusTop">
            <span>ESTADO</span>
            <span id="scoreMini">0 / 10</span>
          </div>
          <div class="statusValue" id="statusText">ARRASTRA Y SUELTA</div>
        </div>
      </div>

      <div class="toast" id="toast"></div>
      <div class="confetti" id="confetti"></div>

      <audio id="sndOk" data-src="/asstests/aplausos.mp4" preload="none"></audio>
      <audio id="sndBad" data-src="/asstests/ohh.mp4" preload="none"></audio>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      const foods = [
        { id: "manzana",  label: "MANZANA",   emoji: "🍎", correct: "yes" },
        { id: "agua",     label: "AGUA",      emoji: "💧", correct: "yes" },
        { id: "pan",      label: "PAN",       emoji: "🍞", correct: "yes" },
        { id: "verduras", label: "VERDURAS",  emoji: "🥦", correct: "yes" },
        { id: "yogur",    label: "YOGUR",     emoji: "🥛", correct: "yes" },
        { id: "pescado",  label: "PESCADO",   emoji: "🐟", correct: "yes" },

        { id: "refresco", label: "REFRESCO",  emoji: "🥤", correct: "no" },
        { id: "caramelos",label: "CARAMELOS", emoji: "🍬", correct: "no" },
        { id: "patatas",  label: "PATATAS",   emoji: "🍟", correct: "no" },
        { id: "tarta",    label: "TARTA",     emoji: "🍰", correct: "no" }
      ];

      const frame = document.getElementById("frame");
      const foodRow = document.getElementById("foodRow");
      const zoneYes = document.getElementById("zoneYes");
      const zoneNo = document.getElementById("zoneNo");
      const toast = document.getElementById("toast");
      const confetti = document.getElementById("confetti");
      const statusText = document.getElementById("statusText");
      const scoreMini = document.getElementById("scoreMini");
      const badge = document.getElementById("badge");
      const remainingPill = document.getElementById("remainingPill");

      const stomachState = document.getElementById("stomachState");
      const mouth = document.getElementById("mouth");
      const p1 = document.getElementById("p1");
      const p2 = document.getElementById("p2");
      const b1 = document.getElementById("b1");
      const b2 = document.getElementById("b2");
      const b3 = document.getElementById("b3");

      const sndOk = document.getElementById("sndOk");
      const sndBad = document.getElementById("sndBad");

      let solved = 0;
      let total = foods.length;

      let drag = {
        el: null,
        id: null,
        startX: 0,
        startY: 0,
        baseLeft: 0,
        baseTop: 0,
        pointerId: null
      };

      function shuffle(arr){
        const a = arr.slice();
        for(let i=a.length-1;i>0;i--){
          const j = Math.floor(Math.random()*(i+1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function setStatus(text){
        statusText.textContent = text;
      }

      function updateCounters(){
        scoreMini.textContent = solved + " / " + total;
        remainingPill.textContent = "QUEDAN: " + (total - solved);
      }

      function showToast(text, kind){
        toast.textContent = text;
        toast.className = "toast show " + (kind || "");
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(() => {
          toast.className = "toast";
        }, 700);
      }

      
      function _ensureOptionalAudio(a){
        if(!a) return false;
        if(a.getAttribute("data-disabled") === "1") return false;
        if(!a.src || a.src === location.href){
          var ds = a.getAttribute("data-src");
          if(ds){
            a.src = ds;
            a.addEventListener("error", function(){
              try{ a.setAttribute("data-disabled","1"); a.removeAttribute("src"); a.src = ""; }catch(e){}
            }, { once: true });
          }else{
            return false;
          }
        }
        return !!a.src;
      }
function playSound(ok){
        try{
          const a = ok ? sndOk : sndBad;
          
          
          if(!_ensureOptionalAudio(a)) return;
if(!_ensureOptionalAudio(a)) return;
a.currentTime = 0;
          a.play();
        }catch(e){}
      }

      function rectsOverlap(r1, r2){
        return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
      }

      function highlightZone(zone, on){
        if(on) zone.classList.add("highlight");
        else zone.classList.remove("highlight");
      }

      function setStomachMood(kind){
        stomachState.classList.remove("good", "bad");
        mouth.style.borderRadius = "0 0 999px 999px";
        mouth.style.height = "60px";
        b1.style.opacity = "0";
        b2.style.opacity = "0";
        b3.style.opacity = "0";

        if(kind === "good"){
          stomachState.classList.add("good");
          stomachState.textContent = "¡ME SIENTO BIEN!";
          blink();
          popConfetti();
        }else if(kind === "bad"){
          stomachState.classList.add("bad");
          stomachState.textContent = "AY... ¡ESO MOLESTA!";
          mouth.style.height = "48px";
          mouth.style.borderRadius = "999px";
          showBubbles();
        }else if(kind === "win"){
          stomachState.classList.add("good");
          stomachState.textContent = "¡GENIAL! ¡LO HAS HECHO!";
          blink(true);
          popConfetti(40);
        }else{
          stomachState.textContent = "ESTOY LISTO PARA COMER";
        }
      }

      function blink(big){
        const y = big ? 22 : 30;
        p1.style.top = y + "px";
        p2.style.top = y + "px";
        window.setTimeout(() => {
          p1.style.top = "30px";
          p2.style.top = "30px";
        }, 140);
      }

      function showBubbles(){
        const wrapRect = document.querySelector(".stomachWrap").getBoundingClientRect();
        const pts = [
          { el: b1, x: wrapRect.left + wrapRect.width*0.25, y: wrapRect.top + wrapRect.height*0.62 },
          { el: b2, x: wrapRect.left + wrapRect.width*0.55, y: wrapRect.top + wrapRect.height*0.54 },
          { el: b3, x: wrapRect.left + wrapRect.width*0.70, y: wrapRect.top + wrapRect.height*0.67 }
        ];
        pts.forEach((p, idx) => {
          p.el.style.left = (p.x - wrapRect.left) + "px";
          p.el.style.top = (p.y - wrapRect.top) + "px";
          p.el.style.opacity = "1";
          p.el.style.transform = "translate(-50%, -50%) scale(" + (1 + idx*0.15) + ")";
        });
        window.setTimeout(() => {
          b1.style.opacity = "0";
          b2.style.opacity = "0";
          b3.style.opacity = "0";
        }, 650);
      }

      function popConfetti(count){
        confetti.innerHTML = "";
        const n = count || 22;
        const colors = [
          "rgba(124,58,237,0.9)",
          "rgba(6,182,212,0.9)",
          "rgba(34,197,94,0.9)",
          "rgba(251,191,36,0.9)",
          "rgba(239,68,68,0.9)",
          "rgba(255,255,255,0.9)"
        ];
        const rect = frame.getBoundingClientRect();
        for(let i=0;i<n;i++){
          const piece = document.createElement("i");
          const x = rect.width*0.5 + (Math.random()*260 - 130);
          const y = rect.height*0.42 + (Math.random()*70 - 35);
          piece.style.left = x + "px";
          piece.style.top = y + "px";
          piece.style.background = colors[Math.floor(Math.random()*colors.length)];
          piece.style.transform = "translateY(0) rotate(" + (Math.random()*60) + "deg)";
          piece.style.animationDelay = (Math.random()*120) + "ms";
          confetti.appendChild(piece);
        }
        window.setTimeout(() => confetti.innerHTML = "", 980);
      }

      function buildFoods(){
        foodRow.innerHTML = "";
        const list = shuffle(foods);
        list.forEach(item => {
          const card = document.createElement("div");
          card.className = "food";
          card.setAttribute("data-id", item.id);
          card.setAttribute("data-correct", item.correct);
          card.innerHTML = `
            <div class="emoji">${item.emoji}</div>
            <div class="label">${item.label}</div>
          `;
          foodRow.appendChild(card);
          enableDrag(card);
        });
      }

      function enableDrag(el){
        el.addEventListener("pointerdown", (ev) => {
          if(el.classList.contains("disabled")) return;
          ev.preventDefault();

          drag.el = el;
          drag.id = el.getAttribute("data-id");
          drag.pointerId = ev.pointerId;
          el.setPointerCapture(ev.pointerId);

          const r = el.getBoundingClientRect();
          const fr = frame.getBoundingClientRect();
          drag.baseLeft = r.left - fr.left;
          drag.baseTop = r.top - fr.top;

          drag.startX = ev.clientX;
          drag.startY = ev.clientY;

          el.classList.add("dragging");
          el.style.position = "absolute";
          el.style.left = drag.baseLeft + "px";
          el.style.top = drag.baseTop + "px";
          el.style.width = r.width + "px";
          el.style.height = r.height + "px";
          el.style.margin = "0";

          frame.appendChild(el);

          setStatus("SUELTA EN LA BANDEJA CORRECTA");
          badge.textContent = "JUGANDO";
        }, { passive: false });

        el.addEventListener("pointermove", (ev) => {
          if(!drag.el || drag.el !== el) return;
          ev.preventDefault();

          const dx = ev.clientX - drag.startX;
          const dy = ev.clientY - drag.startY;

          const left = drag.baseLeft + dx;
          const top  = drag.baseTop + dy;

          el.style.left = left + "px";
          el.style.top  = top + "px";

          const rEl = el.getBoundingClientRect();
          const rYes = zoneYes.getBoundingClientRect();
          const rNo = zoneNo.getBoundingClientRect();

          highlightZone(zoneYes, rectsOverlap(rEl, rYes));
          highlightZone(zoneNo, rectsOverlap(rEl, rNo));
        }, { passive: false });

        el.addEventListener("pointerup", (ev) => {
          if(!drag.el || drag.el !== el) return;
          ev.preventDefault();

          highlightZone(zoneYes, false);
          highlightZone(zoneNo, false);

          const rEl = el.getBoundingClientRect();
          const rYes = zoneYes.getBoundingClientRect();
          const rNo = zoneNo.getBoundingClientRect();

          let droppedZone = null;
          if(rectsOverlap(rEl, rYes)) droppedZone = "yes";
          else if(rectsOverlap(rEl, rNo)) droppedZone = "no";

          const correct = el.getAttribute("data-correct");

          if(droppedZone && droppedZone === correct){
            placeCard(el, droppedZone);
            solved += 1;
            updateCounters();
            playSound(true);
            showToast("¡BIEN!", "good");
            setStomachMood("good");
            setStatus("¡CORRECTO!");
            if(solved === total){
              badge.textContent = "TERMINADO";
              setStatus("¡ENHORABUENA!");
              showToast("¡LO HAS CONSEGUIDO!", "good");
              setStomachMood("win");
            }
          }else{
            playSound(false);
            showToast("INTENTA OTRA VEZ", "bad");
            setStomachMood("bad");
            setStatus("UPS... PRUEBA DE NUEVO");
            snapBack(el);
          }

          drag.el.classList.remove("dragging");
          try{ drag.el.releasePointerCapture(drag.pointerId); }catch(e){}
          drag.el = null;
          drag.pointerId = null;
        }, { passive: false });

        el.addEventListener("pointercancel", (ev) => {
          if(!drag.el || drag.el !== el) return;
          highlightZone(zoneYes, false);
          highlightZone(zoneNo, false);
          snapBack(el);
          drag.el.classList.remove("dragging");
          drag.el = null;
          drag.pointerId = null;
        }, { passive: false });
      }

      function snapBack(el){
        el.classList.remove("dragging");
        el.style.transition = "transform 120ms ease, left 140ms ease, top 140ms ease";
        el.style.transform = "scale(0.98)";
        window.setTimeout(() => {
          el.style.transition = "";
          el.style.transform = "";
          rebuildToTray(el);
        }, 160);
      }

      function rebuildToTray(el){
        const id = el.getAttribute("data-id");
        const original = foods.find(f => f.id === id);
        const fresh = document.createElement("div");
        fresh.className = "food";
        fresh.setAttribute("data-id", original.id);
        fresh.setAttribute("data-correct", original.correct);
        fresh.innerHTML = `
          <div class="emoji">${original.emoji}</div>
          <div class="label">${original.label}</div>
        `;
        enableDrag(fresh);
        foodRow.appendChild(fresh);
        el.remove();
      }

      function placeCard(el, zone){
        el.classList.add("disabled");
        el.style.position = "";
        el.style.left = "";
        el.style.top = "";
        el.style.width = "";
        el.style.height = "";
        el.style.margin = "";
        el.style.transform = "";
        el.style.transition = "";
        el.classList.remove("food");
        el.classList.add("placed");
        const emoji = el.querySelector(".emoji")?.textContent || "";
        const label = el.querySelector(".label")?.textContent || "";
        el.innerHTML = `
          <div class="emoji">${emoji}</div>
          <div class="label">${label}</div>
        `;

        if(zone === "yes") zoneYes.appendChild(el);
        else zoneNo.appendChild(el);
      }

      function reset(){
        solved = 0;
        badge.textContent = "LISTO";
        setStatus("ARRASTRA Y SUELTA");
        updateCounters();
        setStomachMood("neutral");
        buildFoods();
        zoneYes.querySelectorAll(".placed").forEach(n => n.remove());
        zoneNo.querySelectorAll(".placed").forEach(n => n.remove());
      }

      function goBack(){
        const sameOrigin = document.referrer && (new URL(document.referrer)).origin === location.origin;
        if(sameOrigin) history.back();
        else location.href = "index.html";
      }

      // BOTONES
      document.getElementById("btnReset").addEventListener("click", reset);
      document.getElementById("btnBack").addEventListener("click", goBack);

      // ANIMACIÓN OJOS MIRANDO
      function trackEyes(){
        const wrap = document.querySelector(".stomachWrap");
        const r = wrap.getBoundingClientRect();
        const cx = r.left + r.width/2;
        const cy = r.top + r.height/2;

        function move(ev){
          const x = ev.clientX ?? cx;
          const y = ev.clientY ?? cy;
          const dx = Math.max(-18, Math.min(18, (x - cx) / 18));
          const dy = Math.max(-14, Math.min(14, (y - cy) / 22));
          p1.style.left = (28 + dx) + "px";
          p1.style.top  = (30 + dy) + "px";
          p2.style.left = (28 + dx) + "px";
          p2.style.top  = (30 + dy) + "px";
        }

        window.addEventListener("pointermove", move, { passive: true });
        window.addEventListener("pointerdown", move, { passive: true });
      }

      // INICIO
      updateCounters();
      buildFoods();
      trackEyes();
      setStomachMood("neutral");
    })();
  </script>
</body>
</html>
