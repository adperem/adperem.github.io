---
layout: default
---

<div class="container container--narrow">
  <div class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="page-desc">{{ page.description }}</p>
    {% endif %}
  </div>
  <div class="post-body">
    {{ content }}
  </div>
</div>
